name: Deploy TKE Production

on:
  workflow_dispatch:
    inputs:
      cloud_image:
        description: OPL Cloud control-plane image ref pushed to TCR.
        required: true
        type: string
      workspace_image:
        description: one-person-lab-app workspace runtime image ref pushed to TCR.
        required: true
        type: string
      exercise_rollback:
        description: Restore the previous Cloud/App image set, verify it, then reapply the candidate set.
        required: false
        default: false
        type: boolean
      bootstrap_mode:
        description: Deploy endpoints for read-only Cloud readiness; this cannot complete a release.
        required: false
        default: false
        type: boolean
permissions:
  contents: read

concurrency:
  group: production-resource-verification
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy OPL Cloud to TKE
    runs-on: [self-hosted, tencent-cloud, opl-cloud, tke-vpc]
    environment: production
    outputs:
      rollback_image_set: ${{ steps.rollback_snapshot.outputs.artifact-id }}
    env:
      OPL_RUNTIME_PROVIDER: tencent-tke
      OPL_K8S_NAMESPACE: ${{ vars.OPL_K8S_NAMESPACE || 'opl-cloud' }}
      OPL_PUBLIC_URL: ${{ vars.OPL_PUBLIC_URL || 'https://cloud.medopl.cn' }}
      OPL_CONSOLE_DOMAIN: ${{ vars.OPL_CONSOLE_DOMAIN || 'cloud.medopl.cn' }}
      OPL_WORKSPACE_DOMAIN: ${{ vars.OPL_WORKSPACE_DOMAIN || 'workspace.medopl.cn' }}
      OPL_CLOUD_IMAGE: ${{ inputs.cloud_image }}
      OPL_WORKSPACE_IMAGE: ${{ inputs.workspace_image }}
      OPL_EXERCISE_ROLLBACK: ${{ inputs.exercise_rollback }}
      OPL_BOOTSTRAP_MODE: ${{ inputs.bootstrap_mode }}
      OPL_IMAGE_PULL_SECRET_NAME: ${{ vars.OPL_IMAGE_PULL_SECRET_NAME || 'tcr-pull-secret' }}
      OPL_WORKSPACE_STORAGE_CLASS: ${{ vars.OPL_WORKSPACE_STORAGE_CLASS || 'cbs' }}
      OPL_TENCENT_PROVISIONER_BIN: ${{ vars.OPL_TENCENT_PROVISIONER_BIN || '/usr/local/bin/opl-tencent-provisioner' }}
      OPL_TENCENT_ZONE: ${{ vars.OPL_TENCENT_ZONE || 'na-siliconvalley-1' }}
      OPL_CONSOLE_TLS_SECRET_NAME: ${{ vars.OPL_CONSOLE_TLS_SECRET_NAME || 'opl-cloud-console-medopl-cn-tls' }}
      OPL_WORKSPACE_TLS_SECRET_NAME: ${{ vars.OPL_WORKSPACE_TLS_SECRET_NAME || 'opl-cloud-workspace-medopl-cn-tls' }}
      OPL_TLS_SOURCE_NAMESPACE: ${{ vars.OPL_TLS_SOURCE_NAMESPACE || '' }}
      OPL_TLS_SOURCE_SECRET_NAME: ${{ vars.OPL_TLS_SOURCE_SECRET_NAME || '' }}
      OPL_INGRESS_CLASS: ${{ vars.OPL_INGRESS_CLASS || 'qcloud' }}
      OPL_WORKSPACE_WEBUI_PORT: ${{ vars.OPL_WORKSPACE_WEBUI_PORT || '3000' }}
      OPL_WORKSPACE_DATA_DIR: ${{ vars.OPL_WORKSPACE_DATA_DIR || '/data' }}
      OPL_WORKSPACE_PROJECTS_DIR: ${{ vars.OPL_WORKSPACE_PROJECTS_DIR || '/projects' }}
      OPL_MONTHLY_BILLING_WORKER_ENABLED: ${{ inputs.bootstrap_mode && '0' || vars.OPL_MONTHLY_BILLING_WORKER_ENABLED || '1' }}
      OPL_MONTHLY_BILLING_INTERVAL_MS: ${{ vars.OPL_MONTHLY_BILLING_INTERVAL_MS || '3600000' }}
      OPL_BASIC_COMPUTE_INSTANCE_TYPE: ${{ vars.OPL_BASIC_COMPUTE_INSTANCE_TYPE }}
      OPL_PRO_COMPUTE_INSTANCE_TYPE: ${{ vars.OPL_PRO_COMPUTE_INSTANCE_TYPE || 'SA5.2XLARGE16' }}
      OPL_CODEX_MODEL: ${{ vars.OPL_CODEX_MODEL || 'gpt-5.5' }}
      OPL_CODEX_REASONING_EFFORT: ${{ vars.OPL_CODEX_REASONING_EFFORT || 'xhigh' }}
      OPL_SUB2API_BASE_URL: ${{ vars.OPL_SUB2API_BASE_URL || 'https://gflabtoken.cn' }}
      OPL_SUB2API_REQUEST_TIMEOUT_MS: ${{ vars.OPL_SUB2API_REQUEST_TIMEOUT_MS || '5000' }}
      TENCENTCLOUD_SECRET_ID: ${{ secrets.TENCENT_MUTATION_SECRET_ID }}
      TENCENTCLOUD_SECRET_KEY: ${{ secrets.TENCENT_MUTATION_SECRET_KEY }}
      TENCENTCLOUD_REGION: ${{ vars.TENCENTCLOUD_REGION || 'na-siliconvalley' }}
      TENCENT_DEPLOY_CLUSTER_ID: ${{ vars.TENCENT_DEPLOY_CLUSTER_ID }}
      TENCENT_CVM_SUBNET_ID: ${{ vars.TENCENT_CVM_SUBNET_ID }}
      TENCENT_CVM_SECURITY_GROUP_IDS: ${{ vars.TENCENT_CVM_SECURITY_GROUP_IDS }}
      TENCENT_CVM_SYSTEM_DISK_TYPE: ${{ vars.TENCENT_CVM_SYSTEM_DISK_TYPE || 'CLOUD_BSSD' }}
      TENCENT_CVM_SYSTEM_DISK_SIZE_GB: ${{ vars.TENCENT_CVM_SYSTEM_DISK_SIZE_GB || '50' }}
      RUN_TENCENT_CREATE_RELEASE_EXECUTION: ${{ vars.RUN_TENCENT_CREATE_RELEASE_EXECUTION || '0' }}
      TENCENT_TCR_REGISTRY: ${{ vars.TENCENT_TCR_REGISTRY || 'uswccr.ccs.tencentyun.com' }}
      TENCENT_TCR_NAMESPACE: ${{ vars.TENCENT_TCR_NAMESPACE || 'oplcloud' }}
      TENCENT_TCR_REGION: ${{ vars.TENCENT_TCR_REGION || 'na-siliconvalley' }}
      TENCENT_DEPLOY_KUBECONFIG_REF: /var/run/opl-cloud/kubeconfig/kubeconfig
      TENCENT_DEPLOY_KUBECONFIG_PATH: ${{ vars.TENCENT_DEPLOY_KUBECONFIG_PATH || '/home/actions/.secrets/medopl/v22/kubeconfig-package-d-deploy' }}
      TENCENT_DEPLOY_KUBECONFIG_B64: ${{ secrets.TENCENT_DEPLOY_KUBECONFIG_B64 }}
      TENCENT_DEPLOY_KUBECONFIG: ${{ secrets.TENCENT_DEPLOY_KUBECONFIG }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      OPL_SUB2API_ADMIN_EMAIL: ${{ secrets.OPL_SUB2API_ADMIN_EMAIL }}
      OPL_SUB2API_ADMIN_PASSWORD: ${{ secrets.OPL_SUB2API_ADMIN_PASSWORD }}
      OPL_INTERNAL_SERVICE_TOKEN: ${{ secrets.OPL_INTERNAL_SERVICE_TOKEN }}
      OPL_AIONUI_ADMIN_PASSWORD_SEED: ${{ secrets.OPL_AIONUI_ADMIN_PASSWORD_SEED }}
      TCR_USERNAME: ${{ secrets.TCR_USERNAME }}
      TCR_PASSWORD: ${{ secrets.TCR_PASSWORD }}
      OPL_TLS_CERT_ID: ${{ secrets.OPL_TLS_CERT_ID || vars.OPL_TLS_CERT_ID || '' }}
      OPL_CONSOLE_TLS_CERT_ID: ${{ secrets.OPL_CONSOLE_TLS_CERT_ID || vars.OPL_CONSOLE_TLS_CERT_ID || '' }}
      OPL_WORKSPACE_TLS_CERT_ID: ${{ secrets.OPL_WORKSPACE_TLS_CERT_ID || vars.OPL_WORKSPACE_TLS_CERT_ID || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Prepare kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          secret_dir="$(mktemp -d)"
          echo "OPL_DEPLOY_SECRET_DIR=$secret_dir" >> "$GITHUB_ENV"
          chmod 700 "$secret_dir"
          kubeconfig="$secret_dir/kubeconfig"
          if [ -f "$TENCENT_DEPLOY_KUBECONFIG_PATH" ]; then
            cp "$TENCENT_DEPLOY_KUBECONFIG_PATH" "$kubeconfig"
          elif [ -n "${TENCENT_DEPLOY_KUBECONFIG_B64:-}" ]; then
            printf '%s' "$TENCENT_DEPLOY_KUBECONFIG_B64" | base64 -d > "$kubeconfig"
          elif [ -n "${TENCENT_DEPLOY_KUBECONFIG:-}" ]; then
            printf '%s' "$TENCENT_DEPLOY_KUBECONFIG" > "$kubeconfig"
          else
            echo "No deploy kubeconfig was provided." >&2
            exit 1
          fi
          chmod 600 "$kubeconfig"
          echo "KUBECONFIG=$kubeconfig" >> "$GITHUB_ENV"

      - name: Check deployment inputs
        shell: bash
        run: |
          set -euo pipefail
          required=(
            OPL_CLOUD_IMAGE
            OPL_WORKSPACE_IMAGE
            DATABASE_URL
            OPL_SUB2API_ADMIN_EMAIL
            OPL_SUB2API_ADMIN_PASSWORD
            OPL_AIONUI_ADMIN_PASSWORD_SEED
            TCR_USERNAME
            TCR_PASSWORD
            TENCENTCLOUD_SECRET_ID
            TENCENTCLOUD_SECRET_KEY
            TENCENTCLOUD_REGION
            OPL_TENCENT_ZONE
            TENCENT_DEPLOY_CLUSTER_ID
            TENCENT_CVM_SUBNET_ID
            TENCENT_CVM_SECURITY_GROUP_IDS
            RUN_TENCENT_CREATE_RELEASE_EXECUTION
          )
          missing=()
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              missing+=("$key")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required deploy inputs: %s\n' "${missing[*]}" >&2
            exit 1
          fi
          validate_image_ref() {
            name="$1"
            image="$2"
            case "$image" in
              "$TENCENT_TCR_REGISTRY"/*) ;;
              *) echo "$name must point to $TENCENT_TCR_REGISTRY." >&2; exit 1 ;;
            esac
            repository="${image%@*}"
            digest="${image#*@}"
            if [ "$repository" = "$image" ] || [[ "${repository##*/}" == *:* ]] || ! printf '%s' "$digest" | grep -Eq '^sha256:[0-9a-f]{64}$'; then
              echo "$name must use repository@sha256 with a 64-character digest." >&2
              exit 1
            fi
          }
          validate_image_ref OPL_CLOUD_IMAGE "$OPL_CLOUD_IMAGE"
          validate_image_ref OPL_WORKSPACE_IMAGE "$OPL_WORKSPACE_IMAGE"

      - name: Verify TKE access
        shell: bash
        run: |
          set -euo pipefail
          kubectl --kubeconfig "$KUBECONFIG" get ns
          kubectl --kubeconfig "$KUBECONFIG" get storageclass

      - name: Check TLS certificate inputs
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${OPL_TLS_CERT_ID:-}" ]; then
            exit 0
          fi
          if [ -n "${OPL_CONSOLE_TLS_CERT_ID:-}" ] && [ -n "${OPL_WORKSPACE_TLS_CERT_ID:-}" ]; then
            exit 0
          fi
          if [ -n "${OPL_TLS_SOURCE_NAMESPACE:-}" ] && [ -n "${OPL_TLS_SOURCE_SECRET_NAME:-}" ]; then
            exit 0
          fi
          if kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get secret "$OPL_CONSOLE_TLS_SECRET_NAME" >/dev/null 2>&1 \
            && kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get secret "$OPL_WORKSPACE_TLS_SECRET_NAME" >/dev/null 2>&1; then
            exit 0
          fi
          echo "Missing TKE TLS certificate input: set OPL_TLS_CERT_ID, or set both OPL_CONSOLE_TLS_CERT_ID and OPL_WORKSPACE_TLS_CERT_ID, or set OPL_TLS_SOURCE_NAMESPACE/OPL_TLS_SOURCE_SECRET_NAME." >&2
          exit 1

      - name: Install Kubernetes secrets
        shell: bash
        run: |
          set -euo pipefail
          secret_dir="$OPL_DEPLOY_SECRET_DIR"
          docker_config="$secret_dir/docker-config.json"
          printf '%s' "$DATABASE_URL" > "$secret_dir/database-url"
          printf '%s:%s' "$TCR_USERNAME" "$TCR_PASSWORD" | base64 | tr -d '\n' > "$secret_dir/tcr-auth"
          cat > "$docker_config" <<JSON
          {"auths":{"$TENCENT_TCR_REGISTRY":{"username":"$TCR_USERNAME","password":"$TCR_PASSWORD","auth":"$(cat "$secret_dir/tcr-auth")"}}}
          JSON
          chmod 600 "$secret_dir"/*

          kubectl --kubeconfig "$KUBECONFIG" create namespace "$OPL_K8S_NAMESPACE" --dry-run=client -o yaml | kubectl --kubeconfig "$KUBECONFIG" apply -f -
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" create secret generic opl-cloud-database \
            --from-file=DATABASE_URL="$secret_dir/database-url" \
            --dry-run=client -o yaml | kubectl --kubeconfig "$KUBECONFIG" apply -f -
          if [ -n "${OPL_INTERNAL_SERVICE_TOKEN:-}" ]; then
            printf '%s' "$OPL_INTERNAL_SERVICE_TOKEN" > "$secret_dir/internal-service-token"
          elif kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get secret opl-cloud-internal-service >/dev/null 2>&1; then
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get secret opl-cloud-internal-service -o jsonpath='{.data.OPL_INTERNAL_SERVICE_TOKEN}' \
              | base64 -d > "$secret_dir/internal-service-token"
          else
            openssl rand -hex 32 > "$secret_dir/internal-service-token"
          fi
          tr -d '\r\n' < "$secret_dir/internal-service-token" > "$secret_dir/internal-service-token.normalized"
          mv "$secret_dir/internal-service-token.normalized" "$secret_dir/internal-service-token"
          if [ ! -s "$secret_dir/internal-service-token" ]; then
            echo "OPL_INTERNAL_SERVICE_TOKEN must not be empty." >&2
            exit 1
          fi
          chmod 600 "$secret_dir/internal-service-token"
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" create secret generic opl-cloud-internal-service \
            --from-file=OPL_INTERNAL_SERVICE_TOKEN="$secret_dir/internal-service-token" \
            --dry-run=client -o yaml | kubectl --kubeconfig "$KUBECONFIG" apply -f -
          printf '%s' "$OPL_SUB2API_ADMIN_EMAIL" > "$secret_dir/sub2api-admin-email"
          printf '%s' "$OPL_SUB2API_ADMIN_PASSWORD" > "$secret_dir/sub2api-admin-password"
          chmod 600 "$secret_dir/sub2api-admin-email" "$secret_dir/sub2api-admin-password"
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" create secret generic opl-cloud-sub2api \
            --from-file=OPL_SUB2API_ADMIN_EMAIL="$secret_dir/sub2api-admin-email" \
            --from-file=OPL_SUB2API_ADMIN_PASSWORD="$secret_dir/sub2api-admin-password" \
            --dry-run=client -o yaml | kubectl --kubeconfig "$KUBECONFIG" apply -f -
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" create secret generic opl-cloud-deploy-kubeconfig \
            --from-file=kubeconfig="$KUBECONFIG" \
            --dry-run=client -o yaml | kubectl --kubeconfig "$KUBECONFIG" apply -f -
          printf '%s' "$OPL_AIONUI_ADMIN_PASSWORD_SEED" > "$secret_dir/aionui-admin-password-seed"
          chmod 600 "$secret_dir/aionui-admin-password-seed"
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" create secret generic opl-cloud-aionui \
            --from-file=OPL_AIONUI_ADMIN_PASSWORD_SEED="$secret_dir/aionui-admin-password-seed" \
            --dry-run=client -o yaml | kubectl --kubeconfig "$KUBECONFIG" apply -f -
          printf '%s' "$TENCENTCLOUD_SECRET_ID" > "$secret_dir/tencentcloud-secret-id"
          printf '%s' "$TENCENTCLOUD_SECRET_KEY" > "$secret_dir/tencentcloud-secret-key"
          chmod 600 "$secret_dir/tencentcloud-secret-id" "$secret_dir/tencentcloud-secret-key"
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" create secret generic opl-cloud-tencent-mutation \
            --from-file=TENCENTCLOUD_SECRET_ID="$secret_dir/tencentcloud-secret-id" \
            --from-file=TENCENTCLOUD_SECRET_KEY="$secret_dir/tencentcloud-secret-key" \
            --dry-run=client -o yaml | kubectl --kubeconfig "$KUBECONFIG" apply -f -
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" create secret generic "$OPL_IMAGE_PULL_SECRET_NAME" \
            --type=kubernetes.io/dockerconfigjson \
            --from-file=.dockerconfigjson="$docker_config" \
            --dry-run=client -o yaml | kubectl --kubeconfig "$KUBECONFIG" apply -f -

      - name: Install and verify TLS secret
        shell: bash
        run: |
          set -euo pipefail
          secret_dir="$OPL_DEPLOY_SECRET_DIR"

          install_qcloud_cert_secret() {
            secret_name="$1"
            cert_id="$2"
            cert_file="$secret_dir/$secret_name-qcloud-cert-id"
            printf '%s' "$cert_id" > "$cert_file"
            chmod 600 "$cert_file"
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" create secret generic "$secret_name" \
              --type=Opaque \
              --from-file=qcloud_cert_id="$cert_file" \
              --dry-run=client -o yaml | kubectl --kubeconfig "$KUBECONFIG" apply -f -
          }

          copy_qcloud_cert_secret() {
            source_namespace="$1"
            source_secret="$2"
            target_secret="$3"
            kubectl --kubeconfig "$KUBECONFIG" -n "$source_namespace" get secret "$source_secret" -o json \
              | TARGET_SECRET_NAME="$target_secret" node -e '
                  const fs = require("node:fs");
                  const secret = JSON.parse(fs.readFileSync(0, "utf8"));
                  delete secret.metadata.uid;
                  delete secret.metadata.resourceVersion;
                  delete secret.metadata.creationTimestamp;
                  delete secret.metadata.managedFields;
                  delete secret.metadata.annotations?.["kubectl.kubernetes.io/last-applied-configuration"];
                  secret.metadata.namespace = process.env.OPL_K8S_NAMESPACE;
                  secret.metadata.name = process.env.TARGET_SECRET_NAME;
                  process.stdout.write(JSON.stringify(secret));
                ' \
              | kubectl --kubeconfig "$KUBECONFIG" apply -f -
          }

          verify_qcloud_cert_secret() {
            secret_name="$1"
            secret_type="$(kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get secret "$secret_name" -o jsonpath='{.type}')"
            if [ "$secret_type" != "Opaque" ]; then
              echo "TKE qcloud Ingress TLS secret $secret_name must be type Opaque." >&2
              exit 1
            fi
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get secret "$secret_name" -o jsonpath='{.data.qcloud_cert_id}' \
              | base64 -d > "$secret_dir/$secret_name-qcloud-cert-id"
            if [ ! -s "$secret_dir/$secret_name-qcloud-cert-id" ]; then
              echo "TKE qcloud Ingress TLS secret $secret_name must contain qcloud_cert_id." >&2
              exit 1
            fi
          }

          if [ -n "${OPL_TLS_CERT_ID:-}" ]; then
            install_qcloud_cert_secret "$OPL_CONSOLE_TLS_SECRET_NAME" "$OPL_TLS_CERT_ID"
            install_qcloud_cert_secret "$OPL_WORKSPACE_TLS_SECRET_NAME" "$OPL_TLS_CERT_ID"
          elif [ -n "${OPL_CONSOLE_TLS_CERT_ID:-}" ] && [ -n "${OPL_WORKSPACE_TLS_CERT_ID:-}" ]; then
            install_qcloud_cert_secret "$OPL_CONSOLE_TLS_SECRET_NAME" "$OPL_CONSOLE_TLS_CERT_ID"
            install_qcloud_cert_secret "$OPL_WORKSPACE_TLS_SECRET_NAME" "$OPL_WORKSPACE_TLS_CERT_ID"
          elif [ -n "${OPL_TLS_SOURCE_NAMESPACE:-}" ] && [ -n "${OPL_TLS_SOURCE_SECRET_NAME:-}" ]; then
            copy_qcloud_cert_secret "$OPL_TLS_SOURCE_NAMESPACE" "$OPL_TLS_SOURCE_SECRET_NAME" "$OPL_CONSOLE_TLS_SECRET_NAME"
            copy_qcloud_cert_secret "$OPL_TLS_SOURCE_NAMESPACE" "$OPL_TLS_SOURCE_SECRET_NAME" "$OPL_WORKSPACE_TLS_SECRET_NAME"
          elif kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get secret "$OPL_CONSOLE_TLS_SECRET_NAME" >/dev/null 2>&1 \
            && kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get secret "$OPL_WORKSPACE_TLS_SECRET_NAME" >/dev/null 2>&1; then
            echo "Using existing TKE TLS certificate secrets."
          else
            echo "Missing TKE TLS certificate input: set OPL_TLS_CERT_ID, or set both OPL_CONSOLE_TLS_CERT_ID and OPL_WORKSPACE_TLS_CERT_ID, or set OPL_TLS_SOURCE_NAMESPACE/OPL_TLS_SOURCE_SECRET_NAME." >&2
            exit 1
          fi

          verify_qcloud_cert_secret "$OPL_CONSOLE_TLS_SECRET_NAME"
          verify_qcloud_cert_secret "$OPL_WORKSPACE_TLS_SECRET_NAME"

      - name: Capture rollback image set
        shell: bash
        run: |
          set -euo pipefail
          rollback_dir="$OPL_DEPLOY_SECRET_DIR/previous-images"
          mkdir -p "$rollback_dir"
          for item in \
            "opl-cloud-control-plane:control-plane" \
            "opl-cloud-ledger:ledger" \
            "opl-cloud-fabric:fabric"; do
            deployment="${item%%:*}"
            container="${item##*:}"
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get "deployment/$deployment" \
              -o "jsonpath={.spec.template.spec.containers[?(@.name=='$container')].image}" > "$rollback_dir/$deployment"
            test -s "$rollback_dir/$deployment"
          done
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get configmap opl-cloud-config \
            -o jsonpath='{.data.OPL_WORKSPACE_IMAGE}' > "$rollback_dir/OPL_WORKSPACE_IMAGE"
          test -s "$rollback_dir/OPL_WORKSPACE_IMAGE"

          workspace_images="$rollback_dir/workspace-images.tsv"
          source tools/tke-image-rollout.sh
          list_workspace_images > "$workspace_images"

      - name: Upload rollback image set
        id: rollback_snapshot
        uses: actions/upload-artifact@v4
        with:
          name: production-rollback-images-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.OPL_DEPLOY_SECRET_DIR }}/previous-images
          if-no-files-found: error
          retention-days: 1

      - name: Render and apply manifest
        shell: bash
        run: |
          set -Eeuo pipefail
          rollback_dir="$OPL_DEPLOY_SECRET_DIR/previous-images"
          workspace_images="$rollback_dir/workspace-images.tsv"
          for file in opl-cloud-control-plane opl-cloud-ledger opl-cloud-fabric OPL_WORKSPACE_IMAGE; do
            test -s "$rollback_dir/$file"
          done
          test -f "$workspace_images"
          source tools/tke-image-rollout.sh
          restore_deployed_images() {
            if [ "${OPL_BOOTSTRAP_MODE:-false}" = "true" ]; then
              restore_previous_bootstrap_images
            else
              restore_previous_images
            fi
          }
          apply_deployed_images() {
            if [ "${OPL_BOOTSTRAP_MODE:-false}" = "true" ]; then
              apply_bootstrap_images
            else
              apply_candidate_images
            fi
          }
          rollback_images() {
            original_status="$?"
            trap - ERR
            if ! restore_deployed_images; then
              echo "Rollback did not restore the complete previous Cloud/App image set." >&2
              exit 1
            fi
            exit "$original_status"
          }
          trap rollback_images ERR

          node tools/render-tke-manifest.ts --manifest deploy/tke/opl-cloud.k8s.json --out "$OPL_DEPLOY_SECRET_DIR/opl-cloud.ingress-bootstrap.json"
          node tools/render-tke-manifest.ts --manifest deploy/tke/opl-cloud.k8s.json --skip-shared-ingress --out "$OPL_DEPLOY_SECRET_DIR/opl-cloud.rendered.json"
          if ! kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get ingress opl-cloud >/dev/null 2>&1; then
            kubectl --kubeconfig "$KUBECONFIG" apply -f "$OPL_DEPLOY_SECRET_DIR/opl-cloud.ingress-bootstrap.json"
          fi
          kubectl --kubeconfig "$KUBECONFIG" apply -f "$OPL_DEPLOY_SECRET_DIR/opl-cloud.rendered.json"
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" annotate ingress opl-cloud ingress.cloud.tencent.com/tke-service-config=opl-cloud-ingress-config --overwrite
          apply_deployed_images
          if [ "$OPL_EXERCISE_ROLLBACK" = "true" ]; then
            restore_deployed_images
            apply_deployed_images
          fi
          trap - ERR

      - name: Show ingress target
        shell: bash
        run: |
          set -euo pipefail
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get ingress opl-cloud -o wide
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get ingress opl-cloud -o jsonpath='{.status.loadBalancer.ingress[*].ip}{"\n"}'

      - name: Remove deployment secrets
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          secret_dir="${OPL_DEPLOY_SECRET_DIR:-}"
          if [ -z "$secret_dir" ]; then
            exit 0
          fi
          case "$secret_dir" in
            "$RUNNER_TEMP"/*|/tmp/*) ;;
            *) echo "Refusing to remove unexpected deployment secret path." >&2; exit 1 ;;
          esac
          if [ -d "$secret_dir" ]; then
            find "$secret_dir" -mindepth 1 -delete
            rmdir "$secret_dir"
          fi

  bootstrap-readiness:
    name: Verify bootstrap Cloud readiness
    needs: deploy
    if: ${{ inputs.bootstrap_mode && needs.deploy.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production
    env:
      OPL_CONSOLE_ORIGIN: ${{ vars.OPL_PUBLIC_URL || 'https://cloud.medopl.cn' }}

    steps:
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify bootstrap Cloud readiness remains release incomplete
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const origin = process.env.OPL_CONSOLE_ORIGIN.replace(/\/+$/, "");
          const response = await fetch(`${origin}/api/production/readiness`, {
            method: "GET",
            signal: AbortSignal.timeout(30_000)
          });
          const readiness = await response.json();
          if (!response.ok || readiness.cloudImagesReady !== true || readiness.workspaceImagesReady !== false ||
              readiness.immutableImagesReady !== false || readiness.ready !== false) {
            throw new Error("bootstrap_cloud_readiness_invalid");
          }
          console.log(JSON.stringify({ releaseComplete: false, readiness: {
            ready: false,
            cloudImagesReady: true,
            workspaceImagesReady: false,
            immutableImagesReady: false
          }}));
          console.error("Bootstrap Cloud readiness passed; release incomplete.");
          NODE

  release-gate:
    name: Require a completed ordinary release
    needs: [deploy, bootstrap-readiness]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production

    steps:
      - name: Require completed ordinary release
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ inputs.bootstrap_mode }}" = "true" ]; then
            echo '{"releaseComplete":false,"reason":"bootstrap release incomplete"}' >&2
            exit 1
          fi
          if [ "${{ needs.deploy.result }}" != "success" ]; then
            echo '{"releaseComplete":false,"reason":"ordinary release incomplete"}' >&2
            exit 1
          fi
          echo '{"releaseComplete":true}'

  retire-legacy-workspace-secret:
    name: Retire legacy global Workspace secret
    needs: deploy
    if: ${{ !inputs.bootstrap_mode && needs.deploy.result == 'success' }}
    runs-on: [self-hosted, tencent-cloud, opl-cloud, tke-vpc]
    timeout-minutes: 10
    environment: production
    env:
      OPL_K8S_NAMESPACE: ${{ vars.OPL_K8S_NAMESPACE || 'opl-cloud' }}
      TENCENT_DEPLOY_KUBECONFIG_PATH: ${{ vars.TENCENT_DEPLOY_KUBECONFIG_PATH || '/home/actions/.secrets/medopl/v22/kubeconfig-package-d-deploy' }}
      TENCENT_DEPLOY_KUBECONFIG_B64: ${{ secrets.TENCENT_DEPLOY_KUBECONFIG_B64 }}
      TENCENT_DEPLOY_KUBECONFIG: ${{ secrets.TENCENT_DEPLOY_KUBECONFIG }}

    steps:
      - name: Prepare cleanup kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          secret_dir="$(mktemp -d)"
          echo "OPL_LEGACY_SECRET_CLEANUP_DIR=$secret_dir" >> "$GITHUB_ENV"
          chmod 700 "$secret_dir"
          kubeconfig="$secret_dir/kubeconfig"
          if [ -f "$TENCENT_DEPLOY_KUBECONFIG_PATH" ]; then
            cp "$TENCENT_DEPLOY_KUBECONFIG_PATH" "$kubeconfig"
          elif [ -n "${TENCENT_DEPLOY_KUBECONFIG_B64:-}" ]; then
            printf '%s' "$TENCENT_DEPLOY_KUBECONFIG_B64" | base64 -d > "$kubeconfig"
          elif [ -n "${TENCENT_DEPLOY_KUBECONFIG:-}" ]; then
            printf '%s' "$TENCENT_DEPLOY_KUBECONFIG" > "$kubeconfig"
          else
            echo "No deploy kubeconfig was provided for legacy Secret cleanup." >&2
            exit 1
          fi
          chmod 600 "$kubeconfig"
          echo "KUBECONFIG=$kubeconfig" >> "$GITHUB_ENV"

      - name: Retire legacy global Workspace secret
        shell: bash
        run: |
          set -euo pipefail
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" delete secret opl-cloud-workspace-codex --ignore-not-found
          remaining="$(kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get secret opl-cloud-workspace-codex --ignore-not-found -o name)"
          if [ -n "$remaining" ]; then
            echo "Legacy global Workspace Secret still exists after cleanup." >&2
            exit 1
          fi

      - name: Remove cleanup kubeconfig
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          secret_dir="${OPL_LEGACY_SECRET_CLEANUP_DIR:-}"
          if [ -z "$secret_dir" ]; then
            exit 0
          fi
          case "$secret_dir" in
            "$RUNNER_TEMP"/*|/tmp/*) ;;
            *) echo "Refusing to remove unexpected cleanup secret path." >&2; exit 1 ;;
          esac
          if [ -d "$secret_dir" ]; then
            find "$secret_dir" -mindepth 1 -delete
            rmdir "$secret_dir"
          fi

  rollback-live-qa:
    name: Roll back images after deploy failure
    needs: [deploy, bootstrap-readiness]
    if: ${{ always() && needs.deploy.outputs.rollback_image_set != '' && ((inputs.bootstrap_mode && (needs.deploy.result != 'success' || needs.bootstrap-readiness.result != 'success')) || (!inputs.bootstrap_mode && needs.deploy.result != 'success')) }}
    runs-on: [self-hosted, tencent-cloud, opl-cloud, tke-vpc]
    timeout-minutes: 20
    environment: production
    env:
      OPL_K8S_NAMESPACE: ${{ vars.OPL_K8S_NAMESPACE || 'opl-cloud' }}
      TENCENT_DEPLOY_KUBECONFIG_PATH: ${{ vars.TENCENT_DEPLOY_KUBECONFIG_PATH || '/home/actions/.secrets/medopl/v22/kubeconfig-package-d-deploy' }}
      TENCENT_DEPLOY_KUBECONFIG_B64: ${{ secrets.TENCENT_DEPLOY_KUBECONFIG_B64 }}
      TENCENT_DEPLOY_KUBECONFIG: ${{ secrets.TENCENT_DEPLOY_KUBECONFIG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Prepare rollback kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          secret_dir="$(mktemp -d)"
          echo "OPL_ROLLBACK_SECRET_DIR=$secret_dir" >> "$GITHUB_ENV"
          chmod 700 "$secret_dir"
          kubeconfig="$secret_dir/kubeconfig"
          if [ -f "$TENCENT_DEPLOY_KUBECONFIG_PATH" ]; then
            cp "$TENCENT_DEPLOY_KUBECONFIG_PATH" "$kubeconfig"
          elif [ -n "${TENCENT_DEPLOY_KUBECONFIG_B64:-}" ]; then
            printf '%s' "$TENCENT_DEPLOY_KUBECONFIG_B64" | base64 -d > "$kubeconfig"
          elif [ -n "${TENCENT_DEPLOY_KUBECONFIG:-}" ]; then
            printf '%s' "$TENCENT_DEPLOY_KUBECONFIG" > "$kubeconfig"
          else
            echo "No deploy kubeconfig was provided for rollback." >&2
            exit 1
          fi
          chmod 600 "$kubeconfig"
          echo "KUBECONFIG=$kubeconfig" >> "$GITHUB_ENV"

      - name: Download rollback image set
        uses: actions/download-artifact@v4
        with:
          name: production-rollback-images-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/production-rollback-images

      - name: Restore previous Cloud and App images
        shell: bash
        run: |
          set -Eeuo pipefail
          rollback_dir="$RUNNER_TEMP/production-rollback-images"
          workspace_images="$rollback_dir/workspace-images.tsv"
          for file in opl-cloud-control-plane opl-cloud-ledger opl-cloud-fabric OPL_WORKSPACE_IMAGE; do
            test -s "$rollback_dir/$file"
          done
          test -f "$workspace_images"
          source tools/tke-image-rollout.sh
          if [ "${{ inputs.bootstrap_mode }}" = "true" ]; then
            restore_command=restore_previous_bootstrap_images
          else
            restore_command=restore_previous_images
          fi
          if ! "$restore_command"; then
            echo "Rollback did not restore the complete previous Cloud/App image set." >&2
            exit 1
          fi

      - name: Remove rollback kubeconfig
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          secret_dir="${OPL_ROLLBACK_SECRET_DIR:-}"
          if [ -z "$secret_dir" ]; then
            exit 0
          fi
          case "$secret_dir" in
            "$RUNNER_TEMP"/*|/tmp/*) ;;
            *) echo "Refusing to remove unexpected rollback secret path." >&2; exit 1 ;;
          esac
          if [ -d "$secret_dir" ]; then
            find "$secret_dir" -mindepth 1 -delete
            rmdir "$secret_dir"
          fi
