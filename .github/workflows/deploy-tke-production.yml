name: Deploy TKE Production

on:
  workflow_dispatch:
    inputs:
      cloud_image:
        description: OPL Cloud control-plane image ref pushed to TCR.
        required: true
        type: string
      workspace_image:
        description: one-person-lab-app workspace runtime image ref pushed to TCR.
        required: true
        type: string
      exercise_rollback:
        description: Restore the previous Cloud/App image set, verify it, then reapply the candidate set.
        required: false
        default: false
        type: boolean
      bootstrap_mode:
        description: Deploy endpoints for read-only Cloud readiness; this cannot complete a release.
        required: false
        default: false
        type: boolean
      diagnostics_only:
        description: Read production TKE state without changing workloads or provider resources.
        required: false
        default: false
        type: boolean
      roll_forward_mode:
        description: Pin the approved candidate without rollback; diagnose Control Plane first, then promote all Cloud services.
        required: false
        default: none
        type: choice
        options:
          - none
          - control-plane
          - all-cloud
      repair_postgres_transport:
        description: Restore PGSSLMODE=disable only after the sanitized diagnostic confirms the approved RFC1918 non-TLS transport.
        required: false
        default: false
        type: boolean
      inspect_primary_workspace_conflict:
        description: Create and verify a private PostgreSQL backup, then read only the rows blocking the primary Workspace migration.
        required: false
        default: false
        type: boolean
      repair_primary_workspace_conflict:
        description: After the same-run backup and inspection, archive and remove only the verified 34 terminal duplicate Workspaces.
        required: false
        default: false
        type: boolean
permissions:
  contents: read

concurrency:
  group: production-resource-verification
  cancel-in-progress: false

jobs:
  diagnose:
    name: Read production TKE diagnostics
    if: ${{ inputs.diagnostics_only && inputs.roll_forward_mode == 'none' }}
    runs-on: [self-hosted, tencent-cloud, opl-cloud, tke-vpc]
    environment: production
    env:
      OPL_K8S_NAMESPACE: ${{ vars.OPL_K8S_NAMESPACE || 'opl-cloud' }}
      TENCENT_DEPLOY_KUBECONFIG_PATH: ${{ vars.TENCENT_DEPLOY_KUBECONFIG_PATH || '/home/actions/.secrets/medopl/v22/kubeconfig-package-d-deploy' }}
      TENCENT_DEPLOY_KUBECONFIG_B64: ${{ secrets.TENCENT_DEPLOY_KUBECONFIG_B64 }}
      TENCENT_DEPLOY_KUBECONFIG: ${{ secrets.TENCENT_DEPLOY_KUBECONFIG }}

    steps:
      - name: Prepare diagnostics kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          secret_dir="$(mktemp -d)"
          echo "OPL_DIAGNOSTICS_SECRET_DIR=$secret_dir" >> "$GITHUB_ENV"
          chmod 700 "$secret_dir"
          kubeconfig="$secret_dir/kubeconfig"
          if [ -f "$TENCENT_DEPLOY_KUBECONFIG_PATH" ]; then
            cp "$TENCENT_DEPLOY_KUBECONFIG_PATH" "$kubeconfig"
          elif [ -n "${TENCENT_DEPLOY_KUBECONFIG_B64:-}" ]; then
            printf '%s' "$TENCENT_DEPLOY_KUBECONFIG_B64" | base64 -d > "$kubeconfig"
          elif [ -n "${TENCENT_DEPLOY_KUBECONFIG:-}" ]; then
            printf '%s' "$TENCENT_DEPLOY_KUBECONFIG" > "$kubeconfig"
          else
            echo "No deploy kubeconfig was provided for diagnostics." >&2
            exit 1
          fi
          chmod 600 "$kubeconfig"
          echo "KUBECONFIG=$kubeconfig" >> "$GITHUB_ENV"

      - name: Read cluster diagnostics
        shell: bash
        run: |
          set -euo pipefail
          kubectl --kubeconfig "$KUBECONFIG" get nodes -o wide
          kubectl --kubeconfig "$KUBECONFIG" describe nodes
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get deploy,rs,pod -o wide
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get events --sort-by=.metadata.creationTimestamp
          for component in control-plane ledger fabric; do
            while IFS= read -r pod; do
              [ -n "$pod" ] || continue
              kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" describe "$pod"
              kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" logs "$pod" --all-containers --tail=200 || true
              kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" logs "$pod" --all-containers --previous --tail=200 || true
            done < <(kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get pod \
              -l "app.kubernetes.io/name=opl-cloud,app.kubernetes.io/component=$component" -o name)
          done

      - name: Remove diagnostics kubeconfig
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          secret_dir="${OPL_DIAGNOSTICS_SECRET_DIR:-}"
          if [ -z "$secret_dir" ]; then
            exit 0
          fi
          case "$secret_dir" in
            "$RUNNER_TEMP"/*|/tmp/*) ;;
            *) echo "Refusing to remove unexpected diagnostics path." >&2; exit 1 ;;
          esac
          if [ -d "$secret_dir" ]; then
            find "$secret_dir" -mindepth 1 -delete
            rmdir "$secret_dir"
          fi

  roll-forward:
    name: Roll forward approved Cloud candidate
    if: ${{ inputs.roll_forward_mode != 'none' }}
    runs-on: [self-hosted, tencent-cloud, opl-cloud, tke-vpc]
    timeout-minutes: 15
    environment: production
    env:
      OPL_K8S_NAMESPACE: ${{ vars.OPL_K8S_NAMESPACE || 'opl-cloud' }}
      OPL_PUBLIC_URL: ${{ vars.OPL_PUBLIC_URL || 'https://cloud.medopl.cn' }}
      OPL_CANDIDATE_IMAGE: uswccr.ccs.tencentyun.com/oplcloud/opl-cloud@sha256:1c68bd613223ce06ffd1042ec226144830f1533c937569e886cd07ade97b5ca5
      OPL_POSTGRES_CLIENT_IMAGE: quay.io/sclorg/postgresql-16-c9s@sha256:cf7fb6396ee839019b6fef1838474e5b752828a512bb27030f13a28f42ec5617
      TENCENT_DEPLOY_KUBECONFIG_PATH: ${{ vars.TENCENT_DEPLOY_KUBECONFIG_PATH || '/home/actions/.secrets/medopl/v22/kubeconfig-package-d-deploy' }}
      TENCENT_DEPLOY_KUBECONFIG_B64: ${{ secrets.TENCENT_DEPLOY_KUBECONFIG_B64 }}
      TENCENT_DEPLOY_KUBECONFIG: ${{ secrets.TENCENT_DEPLOY_KUBECONFIG }}

    steps:
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Prepare recovery kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          secret_dir="$(mktemp -d)"
          echo "OPL_RECOVERY_SECRET_DIR=$secret_dir" >> "$GITHUB_ENV"
          chmod 700 "$secret_dir"
          kubeconfig="$secret_dir/kubeconfig"
          if [ -f "$TENCENT_DEPLOY_KUBECONFIG_PATH" ]; then
            cp "$TENCENT_DEPLOY_KUBECONFIG_PATH" "$kubeconfig"
          elif [ -n "${TENCENT_DEPLOY_KUBECONFIG_B64:-}" ]; then
            printf '%s' "$TENCENT_DEPLOY_KUBECONFIG_B64" | base64 -d > "$kubeconfig"
          elif [ -n "${TENCENT_DEPLOY_KUBECONFIG:-}" ]; then
            printf '%s' "$TENCENT_DEPLOY_KUBECONFIG" > "$kubeconfig"
          else
            echo "No deploy kubeconfig was provided for roll-forward recovery." >&2
            exit 1
          fi
          chmod 600 "$kubeconfig"
          echo "KUBECONFIG=$kubeconfig" >> "$GITHUB_ENV"

      - name: Read sanitized PostgreSQL transport
        id: postgres_transport
        shell: bash
        run: |
          set -euo pipefail
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" \
            get configmap/opl-cloud-config secret/opl-cloud-database -o json \
            | node -e '
              const { isIP } = require("node:net");
              const resources = JSON.parse(require("node:fs").readFileSync(0, "utf8"));
              const items = resources.items || [];
              const config = items.find((item) => item.kind === "ConfigMap" && item.metadata?.name === "opl-cloud-config");
              const secret = items.find((item) => item.kind === "Secret" && item.metadata?.name === "opl-cloud-database");
              const configMode = config?.data?.PGSSLMODE;
              const databaseURL = Buffer.from(secret?.data?.DATABASE_URL || "", "base64").toString("utf8").trim();
              let hostKind = "invalid";
              let sslmode = "invalid";

              const classifyHost = (rawHost) => {
                const host = String(rawHost || "").trim().replace(/^\[|\]$/g, "");
                if (!host) return "empty";
                if (host.includes(",")) return "multiple";
                if (host.startsWith("/") || host.startsWith("@")) return "socket";
                if (isIP(host) === 6) return "ipv6";
                if (isIP(host) !== 4) return "non_literal";
                const [a, b] = host.split(".").map(Number);
                return a === 10 || a === 172 && b >= 16 && b <= 31 || a === 192 && b === 168
                  ? "rfc1918_ipv4"
                  : "public_ipv4";
              };
              const classifyMode = (values) => {
                if (values.length === 0) return "absent";
                if (values.length > 1) return "multiple";
                return new Set(["disable", "allow", "prefer", "require", "verify-ca", "verify-full"]).has(values[0])
                  ? values[0]
                  : "other";
              };

              if (/^postgres(?:ql)?:\/\//.test(databaseURL)) {
                try {
                  const parsed = new URL(databaseURL);
                  const queryHosts = parsed.searchParams.getAll("host");
                  hostKind = queryHosts.length > 1 ? "multiple" : classifyHost(queryHosts[0] || parsed.hostname);
                  sslmode = classifyMode(parsed.searchParams.getAll("sslmode"));
                } catch {}
              } else if (databaseURL) {
                hostKind = "keyword_or_invalid";
                sslmode = "unknown";
              }

              const configModeClass = configMode === undefined ? "absent" : configMode === "disable" ? "disable" : "other";
              console.log(`configMapPGSSLMODE=${configModeClass}`);
              console.log(`databaseURLHostKind=${hostKind}`);
              console.log(`databaseURLSslmode=${sslmode}`);
              require("node:fs").appendFileSync(process.env.GITHUB_OUTPUT, [
                `config_mode=${configModeClass}`,
                `host_kind=${hostKind}`,
                `sslmode=${sslmode}`
              ].join("\n") + "\n");
            '

      - name: Repair approved private PostgreSQL transport
        if: ${{ inputs.repair_postgres_transport && !inputs.diagnostics_only && inputs.roll_forward_mode == 'control-plane' }}
        shell: bash
        env:
          OPL_RECOVERY_PG_CONFIG_MODE: ${{ steps.postgres_transport.outputs.config_mode }}
          OPL_RECOVERY_DATABASE_HOST_KIND: ${{ steps.postgres_transport.outputs.host_kind }}
          OPL_RECOVERY_DATABASE_SSLMODE: ${{ steps.postgres_transport.outputs.sslmode }}
        run: |
          set -euo pipefail
          case "$OPL_RECOVERY_PG_CONFIG_MODE" in
            absent|disable) ;;
            *) echo "Refusing PostgreSQL transport repair: ConfigMap mode is not absent/disable." >&2; exit 1 ;;
          esac
          if [ "$OPL_RECOVERY_DATABASE_HOST_KIND" != "rfc1918_ipv4" ]; then
            echo "Refusing PostgreSQL transport repair: DATABASE_URL host is not one RFC1918 IPv4 literal." >&2
            exit 1
          fi
          case "$OPL_RECOVERY_DATABASE_SSLMODE" in
            absent|disable) ;;
            *) echo "Refusing PostgreSQL transport repair: DATABASE_URL sslmode is not absent/disable." >&2; exit 1 ;;
          esac
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" patch configmap/opl-cloud-config \
            --type merge -p '{"data":{"PGSSLMODE":"disable"}}'
          readback="$(kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" \
            get configmap/opl-cloud-config -o jsonpath='{.data.PGSSLMODE}')"
          if [ "$readback" != "disable" ]; then
            echo "PostgreSQL transport ConfigMap readback mismatch." >&2
            exit 1
          fi
          echo "PostgreSQL transport ConfigMap repaired and read back."

      - name: Back up and inspect primary Workspace conflict
        if: ${{ inputs.inspect_primary_workspace_conflict && !inputs.diagnostics_only && inputs.roll_forward_mode == 'control-plane' }}
        shell: bash
        env:
          PGSSLMODE: disable
        run: |
          set -euo pipefail
          umask 077
          backup_root="/home/actions/.secrets/medopl/v22/postgres-backups"
          install -d -m 700 "$backup_root"
          backup_file="$backup_root/opl-cloud-before-primary-workspace-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.dump"
          postgres_client_pod="opl-postgres-recovery-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          retain_postgres_client=false
          cleanup_postgres_client() {
            if [ "$retain_postgres_client" = "true" ]; then
              return
            fi
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" \
              delete "pod/$postgres_client_pod" --wait=false >/dev/null 2>&1 || true
          }
          trap cleanup_postgres_client EXIT
          cat <<EOF | kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" create -f -
          apiVersion: v1
          kind: Pod
          metadata:
            name: $postgres_client_pod
            labels:
              app.kubernetes.io/name: opl-cloud
              app.kubernetes.io/component: postgres-recovery
          spec:
            automountServiceAccountToken: false
            restartPolicy: Never
            imagePullSecrets:
              - name: tcr-pull-secret
            securityContext:
              runAsNonRoot: true
              runAsUser: 26
              runAsGroup: 26
              fsGroup: 26
              seccompProfile:
                type: RuntimeDefault
            initContainers:
              - name: database-url-normalizer
                image: $OPL_CANDIDATE_IMAGE
                imagePullPolicy: IfNotPresent
                command: ["node", "-e"]
                args:
                  - |
                    const { readFileSync, writeFileSync } = require("node:fs");
                    try {
                      const raw = readFileSync("/run/opl-postgres/DATABASE_URL", "utf8").trim();
                      const normalized = new URL(raw).toString();
                      writeFileSync("/work/database-url", normalized, { mode: 0o600 });
                    } catch {
                      console.error("DATABASE_URL normalization failed.");
                      process.exit(1);
                    }
                securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  capabilities:
                    drop: ["ALL"]
                volumeMounts:
                  - name: database-secret
                    mountPath: /run/opl-postgres
                    readOnly: true
                  - name: work
                    mountPath: /work
            containers:
              - name: postgres-client
                image: $OPL_POSTGRES_CLIENT_IMAGE
                imagePullPolicy: IfNotPresent
                command: ["/bin/bash", "-ceu", "--"]
                args:
                  - "while :; do sleep 3600; done"
                env:
                  - name: PGSSLMODE
                    value: disable
                  - name: TMPDIR
                    value: /work
                securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  capabilities:
                    drop: ["ALL"]
                volumeMounts:
                  - name: work
                    mountPath: /work
                  - name: tmp
                    mountPath: /tmp
            volumes:
              - name: database-secret
                secret:
                  secretName: opl-cloud-database
                  defaultMode: 0440
              - name: work
                emptyDir: {}
              - name: tmp
                emptyDir: {}
          EOF
          if ! kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" \
            wait --for=condition=Ready "pod/$postgres_client_pod" --timeout=120s; then
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" describe "pod/$postgres_client_pod" || true
            exit 1
          fi
          install -m 600 /dev/null "$backup_file"
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" exec "$postgres_client_pod" \
            -c postgres-client -- /bin/bash -ceu \
            'umask 077; DATABASE_URL="$(cat /work/database-url)"; pg_dump --format=custom --no-owner --no-acl --file=/work/backup.dump "$DATABASE_URL"; test -s /work/backup.dump; pg_restore --list /work/backup.dump >/dev/null'
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" exec "$postgres_client_pod" \
            -c postgres-client -- cat /work/backup.dump > "$backup_file"
          test -s "$backup_file"
          chmod 600 "$backup_file"
          backup_bytes="$(wc -c < "$backup_file" | tr -d ' ')"
          backup_sha256="$(sha256sum "$backup_file" | cut -d ' ' -f 1)"
          remote_backup="$(kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" exec "$postgres_client_pod" \
            -c postgres-client -- /bin/bash -ceu 'printf "%s %s" "$(wc -c < /work/backup.dump)" "$(sha256sum /work/backup.dump | cut -d " " -f 1)"')"
          if [ "$remote_backup" != "$backup_bytes $backup_sha256" ]; then
            echo "PostgreSQL backup readback mismatch." >&2
            exit 1
          fi
          printf 'backupFile=%s\nbackupBytes=%s\nbackupSha256=%s\n' "$backup_file" "$backup_bytes" "$backup_sha256"

          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" exec --stdin "$postgres_client_pod" \
            -c postgres-client -- /bin/bash -ceu 'DATABASE_URL="$(cat /work/database-url)"; psql "$DATABASE_URL" -X --set ON_ERROR_STOP=1 --csv' <<'SQL'
          WITH duplicate_accounts AS (
            SELECT
              COALESCE(NULLIF(account_id, ''), owner_account_id) AS account_key,
              count(*) AS workspace_count
            FROM control_plane_workspaces
            WHERE COALESCE(NULLIF(account_id, ''), owner_account_id) <> ''
            GROUP BY COALESCE(NULLIF(account_id, ''), owner_account_id)
            HAVING count(*) > 1
          )
          SELECT
            duplicate_accounts.account_key,
            duplicate_accounts.workspace_count,
            workspaces.id AS workspace_id,
            workspaces.created_at,
            workspaces.updated_at,
            workspaces.state,
            workspaces.status,
            workspaces.current_compute_allocation_id,
            workspaces.storage_id,
            workspaces.current_attachment_id,
            workspaces.runtime_id,
            (SELECT count(*) FROM control_plane_compute_allocations computes WHERE computes.workspace_id = workspaces.id) AS compute_rows,
            (SELECT count(*) FROM control_plane_storage_volumes storage WHERE storage.workspace_id = workspaces.id) AS storage_rows,
            (SELECT count(*) FROM control_plane_storage_attachments attachments WHERE attachments.workspace_id = workspaces.id) AS attachment_rows,
            (SELECT count(*) FROM control_plane_runtime_operations operations WHERE operations.workspace_id = workspaces.id) AS operation_rows
          FROM duplicate_accounts
          JOIN control_plane_workspaces workspaces
            ON COALESCE(NULLIF(workspaces.account_id, ''), workspaces.owner_account_id) = duplicate_accounts.account_key
          ORDER BY duplicate_accounts.account_key, workspaces.created_at, workspaces.id;

          SELECT format(
            'SELECT %L AS reference_table, count(*) AS reference_rows, count(DISTINCT workspace_id) AS referenced_workspaces FROM %I.%I WHERE workspace_id IN (SELECT workspaces.id FROM control_plane_workspaces workspaces JOIN (SELECT COALESCE(NULLIF(account_id, ''''), owner_account_id) AS account_key FROM control_plane_workspaces WHERE COALESCE(NULLIF(account_id, ''''), owner_account_id) <> '''' GROUP BY COALESCE(NULLIF(account_id, ''''), owner_account_id) HAVING count(*) > 1) duplicate_accounts ON COALESCE(NULLIF(workspaces.account_id, ''''), workspaces.owner_account_id) = duplicate_accounts.account_key);',
            table_schema || '.' || table_name,
            table_schema,
            table_name
          )
          FROM information_schema.columns
          WHERE table_schema = 'public'
            AND table_name LIKE 'control_plane_%'
            AND column_name = 'workspace_id'
          ORDER BY table_name
          \gexec

          WITH duplicate_accounts AS (
            SELECT COALESCE(NULLIF(account_id, ''), owner_account_id) AS account_key
            FROM control_plane_workspaces
            WHERE COALESCE(NULLIF(account_id, ''), owner_account_id) <> ''
            GROUP BY COALESCE(NULLIF(account_id, ''), owner_account_id)
            HAVING count(*) > 1
          ), duplicate_workspaces AS (
            SELECT workspaces.id
            FROM control_plane_workspaces workspaces
            JOIN duplicate_accounts
              ON COALESCE(NULLIF(workspaces.account_id, ''), workspaces.owner_account_id) = duplicate_accounts.account_key
          )
          SELECT
            operations.workspace_id,
            operations.action,
            operations.status,
            count(*) AS operation_count,
            bool_and(COALESCE(operations.result, '') <> '') AS result_present,
            sum(octet_length(COALESCE(operations.result, ''))) AS result_bytes
          FROM control_plane_runtime_operations operations
          JOIN duplicate_workspaces ON duplicate_workspaces.id = operations.workspace_id
          GROUP BY operations.workspace_id, operations.action, operations.status
          ORDER BY operations.workspace_id, operations.action, operations.status;
          SQL
          if [ "${{ inputs.repair_primary_workspace_conflict }}" = "true" ]; then
            retain_postgres_client=true
            printf 'OPL_PRIMARY_WORKSPACE_BACKUP_FILE=%s\nOPL_POSTGRES_RECOVERY_POD=%s\n' \
              "$backup_file" "$postgres_client_pod" >> "$GITHUB_ENV"
          fi

      - name: Repair verified primary Workspace conflict
        if: ${{ inputs.repair_primary_workspace_conflict && !inputs.diagnostics_only && inputs.roll_forward_mode == 'control-plane' }}
        shell: bash
        env:
          PGSSLMODE: disable
        run: |
          set -euo pipefail
          postgres_client_pod="${OPL_POSTGRES_RECOVERY_POD:-}"
          cleanup_postgres_client() {
            if [ -n "$postgres_client_pod" ]; then
              kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" \
                delete "pod/$postgres_client_pod" --wait=false >/dev/null 2>&1 || true
            fi
          }
          trap cleanup_postgres_client EXIT

          if [ "${{ inputs.inspect_primary_workspace_conflict }}" != "true" ]; then
            echo "Refusing primary Workspace repair without same-run inspection and backup." >&2
            exit 1
          fi
          approved_backup="/home/actions/.secrets/medopl/v22/postgres-backups/opl-cloud-before-primary-workspace-29824127440-1.dump"
          approved_backup_sha256="3f9478e071595d8f0af275e2eebc351b4a828fc54319ece39318f88b35569b33"
          if [ ! -s "$approved_backup" ]; then
            echo "Refusing primary Workspace repair: approved backup is missing." >&2
            exit 1
          fi
          actual_approved_backup_sha256="$(sha256sum "$approved_backup" | cut -d ' ' -f 1)"
          if [ "$actual_approved_backup_sha256" != "$approved_backup_sha256" ]; then
            echo "Refusing primary Workspace repair: approved backup SHA256 mismatch." >&2
            exit 1
          fi
          backup_file="${OPL_PRIMARY_WORKSPACE_BACKUP_FILE:-}"
          expected_backup="/home/actions/.secrets/medopl/v22/postgres-backups/opl-cloud-before-primary-workspace-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.dump"
          expected_pod="opl-postgres-recovery-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          if [ "$backup_file" != "$expected_backup" ] || [ ! -s "$backup_file" ] || [ "$postgres_client_pod" != "$expected_pod" ]; then
            echo "Refusing primary Workspace repair without the verified same-run backup client." >&2
            exit 1
          fi
          local_backup="$(wc -c < "$backup_file" | tr -d ' ') $(sha256sum "$backup_file" | cut -d ' ' -f 1)"
          remote_backup="$(kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" exec "$postgres_client_pod" \
            -c postgres-client -- /bin/bash -ceu 'pg_restore --list /work/backup.dump >/dev/null; printf "%s %s" "$(wc -c < /work/backup.dump)" "$(sha256sum /work/backup.dump | cut -d " " -f 1)"')"
          if [ "$remote_backup" != "$local_backup" ]; then
            echo "Refusing primary Workspace repair: backup readback changed." >&2
            exit 1
          fi

          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" exec --stdin "$postgres_client_pod" \
            -c postgres-client -- /bin/bash -ceu 'DATABASE_URL="$(cat /work/database-url)"; psql "$DATABASE_URL" -X --set ON_ERROR_STOP=1' <<'SQL'
          BEGIN;
          CREATE TEMP TABLE opl_primary_workspace_repair_ids (
            id TEXT PRIMARY KEY,
            account_id TEXT NOT NULL
          ) ON COMMIT DROP;
          INSERT INTO opl_primary_workspace_repair_ids (id, account_id) VALUES
            ('ws_1783882834034413362', 'acct-production-owner'),
            ('ws_1783883757382965976', 'acct-production-owner'),
