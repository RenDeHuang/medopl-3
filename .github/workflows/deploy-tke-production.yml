            ('ws_1783886628705368207', 'acct-production-owner'),
            ('ws_1783886986856289941', 'acct-production-owner'),
            ('ws_1783888297749360763', 'acct-production-owner'),
            ('ws_1783888656851127208', 'acct-production-owner'),
            ('ws_1783889444787312647', 'acct-production-owner'),
            ('ws_1783889795524148996', 'acct-production-owner'),
            ('ws_1783890447574981128', 'acct-production-owner'),
            ('ws_1783890801197068999', 'acct-production-owner'),
