name: Deploy TKE Production

on:
  workflow_dispatch:
    inputs:
      cloud_image:
        description: OPL Cloud control-plane image ref pushed to TCR.
        required: true
        type: string
      workspace_image:
        description: one-person-lab-app workspace runtime image ref pushed to TCR.
        required: true
        type: string
      exercise_rollback:
        description: Restore the previous Cloud/App image set, verify it, then reapply the candidate set.
        required: false
        default: false
        type: boolean
      bootstrap_mode:
        description: Deploy endpoints for read-only Cloud readiness; this cannot complete a release.
        required: false
        default: false
        type: boolean
      diagnostics_only:
        description: Read production TKE state without changing workloads or provider resources.
        required: false
        default: false
        type: boolean
      roll_forward_mode:
        description: Pin the approved candidate without rollback; diagnose Control Plane first, then promote all Cloud services.
        required: false
        default: none
        type: choice
        options:
          - none
          - control-plane
          - all-cloud
      repair_postgres_transport:
        description: Restore PGSSLMODE=disable only after the sanitized diagnostic confirms the approved RFC1918 non-TLS transport.
        required: false
        default: false
        type: boolean
      inspect_primary_workspace_conflict:
        description: Create and verify a private PostgreSQL backup, then read only the rows blocking the primary Workspace migration.
        required: false
        default: false
        type: boolean
      repair_primary_workspace_conflict:
        description: After the same-run backup and inspection, archive and remove only the verified 34 terminal duplicate Workspaces.
        required: false
        default: false
        type: boolean
      inspect_customer_identity_hard_cut:
        description: Back up PostgreSQL, inspect every customer identity hard-cut precondition, and perform GET-only Sub2API readback.
        required: false
        default: false
        type: boolean
      reset_prelaunch_control_plane_data:
        description: After a verified same-run backup, clear every public control_plane_% table before rolling the approved candidate forward.
        required: false
        default: false
        type: boolean
permissions:
  contents: read

concurrency:
  group: production-resource-verification
  cancel-in-progress: false

jobs:
  diagnose:
    name: Read production TKE diagnostics
    if: ${{ inputs.diagnostics_only && inputs.roll_forward_mode == 'none' }}
    runs-on: [self-hosted, tencent-cloud, opl-cloud, tke-vpc]
    environment: production
    env:
      OPL_K8S_NAMESPACE: ${{ vars.OPL_K8S_NAMESPACE || 'opl-cloud' }}
      TENCENT_DEPLOY_KUBECONFIG_PATH: ${{ vars.TENCENT_DEPLOY_KUBECONFIG_PATH || '/home/actions/.secrets/medopl/v22/kubeconfig-package-d-deploy' }}
      TENCENT_DEPLOY_KUBECONFIG_B64: ${{ secrets.TENCENT_DEPLOY_KUBECONFIG_B64 }}
      TENCENT_DEPLOY_KUBECONFIG: ${{ secrets.TENCENT_DEPLOY_KUBECONFIG }}

    steps:
      - name: Prepare diagnostics kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          secret_dir="$(mktemp -d)"
          echo "OPL_DIAGNOSTICS_SECRET_DIR=$secret_dir" >> "$GITHUB_ENV"
          chmod 700 "$secret_dir"
          kubeconfig="$secret_dir/kubeconfig"
          if [ -f "$TENCENT_DEPLOY_KUBECONFIG_PATH" ]; then
            cp "$TENCENT_DEPLOY_KUBECONFIG_PATH" "$kubeconfig"
          elif [ -n "${TENCENT_DEPLOY_KUBECONFIG_B64:-}" ]; then
            printf '%s' "$TENCENT_DEPLOY_KUBECONFIG_B64" | base64 -d > "$kubeconfig"
          elif [ -n "${TENCENT_DEPLOY_KUBECONFIG:-}" ]; then
            printf '%s' "$TENCENT_DEPLOY_KUBECONFIG" > "$kubeconfig"
          else
            echo "No deploy kubeconfig was provided for diagnostics." >&2
            exit 1
          fi
          chmod 600 "$kubeconfig"
          echo "KUBECONFIG=$kubeconfig" >> "$GITHUB_ENV"

      - name: Read cluster diagnostics
        shell: bash
        run: |
          set -euo pipefail
          kubectl --kubeconfig "$KUBECONFIG" get nodes -o wide
          kubectl --kubeconfig "$KUBECONFIG" describe nodes
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get deploy,rs,pod -o wide
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get events --sort-by=.metadata.creationTimestamp
          for component in control-plane ledger fabric; do
            while IFS= read -r pod; do
              [ -n "$pod" ] || continue
              kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" describe "$pod"
              kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" logs "$pod" --all-containers --tail=200 || true
              kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" logs "$pod" --all-containers --previous --tail=200 || true
            done < <(kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get pod \
              -l "app.kubernetes.io/name=opl-cloud,app.kubernetes.io/component=$component" -o name)
          done

      - name: Remove diagnostics kubeconfig
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          secret_dir="${OPL_DIAGNOSTICS_SECRET_DIR:-}"
          if [ -z "$secret_dir" ]; then
            exit 0
          fi
          case "$secret_dir" in
            "$RUNNER_TEMP"/*|/tmp/*) ;;
            *) echo "Refusing to remove unexpected diagnostics path." >&2; exit 1 ;;
          esac
          if [ -d "$secret_dir" ]; then
            find "$secret_dir" -mindepth 1 -delete
            rmdir "$secret_dir"
          fi

  roll-forward:
    name: Roll forward approved Cloud candidate
    if: ${{ inputs.roll_forward_mode != 'none' }}
    runs-on: [self-hosted, tencent-cloud, opl-cloud, tke-vpc]
    timeout-minutes: 15
    environment: production
    env:
      OPL_K8S_NAMESPACE: ${{ vars.OPL_K8S_NAMESPACE || 'opl-cloud' }}
      OPL_PUBLIC_URL: ${{ vars.OPL_PUBLIC_URL || 'https://cloud.medopl.cn' }}
      OPL_CANDIDATE_IMAGE: uswccr.ccs.tencentyun.com/oplcloud/opl-cloud@sha256:1c68bd613223ce06ffd1042ec226144830f1533c937569e886cd07ade97b5ca5
      OPL_POSTGRES_CLIENT_IMAGE: quay.io/sclorg/postgresql-16-c9s@sha256:cf7fb6396ee839019b6fef1838474e5b752828a512bb27030f13a28f42ec5617
      TENCENT_DEPLOY_KUBECONFIG_PATH: ${{ vars.TENCENT_DEPLOY_KUBECONFIG_PATH || '/home/actions/.secrets/medopl/v22/kubeconfig-package-d-deploy' }}
      TENCENT_DEPLOY_KUBECONFIG_B64: ${{ secrets.TENCENT_DEPLOY_KUBECONFIG_B64 }}
      TENCENT_DEPLOY_KUBECONFIG: ${{ secrets.TENCENT_DEPLOY_KUBECONFIG }}

    steps:
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Prepare recovery kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          secret_dir="$(mktemp -d)"
          echo "OPL_RECOVERY_SECRET_DIR=$secret_dir" >> "$GITHUB_ENV"
          chmod 700 "$secret_dir"
          kubeconfig="$secret_dir/kubeconfig"
          if [ -f "$TENCENT_DEPLOY_KUBECONFIG_PATH" ]; then
            cp "$TENCENT_DEPLOY_KUBECONFIG_PATH" "$kubeconfig"
          elif [ -n "${TENCENT_DEPLOY_KUBECONFIG_B64:-}" ]; then
            printf '%s' "$TENCENT_DEPLOY_KUBECONFIG_B64" | base64 -d > "$kubeconfig"
          elif [ -n "${TENCENT_DEPLOY_KUBECONFIG:-}" ]; then
            printf '%s' "$TENCENT_DEPLOY_KUBECONFIG" > "$kubeconfig"
          else
            echo "No deploy kubeconfig was provided for roll-forward recovery." >&2
            exit 1
          fi
          chmod 600 "$kubeconfig"
          echo "KUBECONFIG=$kubeconfig" >> "$GITHUB_ENV"

      - name: Read sanitized PostgreSQL transport
        id: postgres_transport
        shell: bash
        run: |
          set -euo pipefail
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" \
            get configmap/opl-cloud-config secret/opl-cloud-database -o json \
            | node -e '
              const { isIP } = require("node:net");
              const resources = JSON.parse(require("node:fs").readFileSync(0, "utf8"));
              const items = resources.items || [];
              const config = items.find((item) => item.kind === "ConfigMap" && item.metadata?.name === "opl-cloud-config");
              const secret = items.find((item) => item.kind === "Secret" && item.metadata?.name === "opl-cloud-database");
              const configMode = config?.data?.PGSSLMODE;
              const databaseURL = Buffer.from(secret?.data?.DATABASE_URL || "", "base64").toString("utf8").trim();
              let hostKind = "invalid";
              let sslmode = "invalid";

              const classifyHost = (rawHost) => {
                const host = String(rawHost || "").trim().replace(/^\[|\]$/g, "");
                if (!host) return "empty";
                if (host.includes(",")) return "multiple";
                if (host.startsWith("/") || host.startsWith("@")) return "socket";
                if (isIP(host) === 6) return "ipv6";
                if (isIP(host) !== 4) return "non_literal";
                const [a, b] = host.split(".").map(Number);
                return a === 10 || a === 172 && b >= 16 && b <= 31 || a === 192 && b === 168
                  ? "rfc1918_ipv4"
                  : "public_ipv4";
              };
              const classifyMode = (values) => {
                if (values.length === 0) return "absent";
                if (values.length > 1) return "multiple";
                return new Set(["disable", "allow", "prefer", "require", "verify-ca", "verify-full"]).has(values[0])
                  ? values[0]
                  : "other";
              };

              if (/^postgres(?:ql)?:\/\//.test(databaseURL)) {
                try {
                  const parsed = new URL(databaseURL);
                  const queryHosts = parsed.searchParams.getAll("host");
                  hostKind = queryHosts.length > 1 ? "multiple" : classifyHost(queryHosts[0] || parsed.hostname);
                  sslmode = classifyMode(parsed.searchParams.getAll("sslmode"));
                } catch {}
              } else if (databaseURL) {
                hostKind = "keyword_or_invalid";
                sslmode = "unknown";
              }

              const configModeClass = configMode === undefined ? "absent" : configMode === "disable" ? "disable" : "other";
              console.log(`configMapPGSSLMODE=${configModeClass}`);
              console.log(`databaseURLHostKind=${hostKind}`);
              console.log(`databaseURLSslmode=${sslmode}`);
              require("node:fs").appendFileSync(process.env.GITHUB_OUTPUT, [
                `config_mode=${configModeClass}`,
                `host_kind=${hostKind}`,
                `sslmode=${sslmode}`
              ].join("\n") + "\n");
            '

      - name: Repair approved private PostgreSQL transport
        if: ${{ inputs.repair_postgres_transport && !inputs.diagnostics_only && inputs.roll_forward_mode == 'control-plane' }}
        shell: bash
        env:
          OPL_RECOVERY_PG_CONFIG_MODE: ${{ steps.postgres_transport.outputs.config_mode }}
          OPL_RECOVERY_DATABASE_HOST_KIND: ${{ steps.postgres_transport.outputs.host_kind }}
          OPL_RECOVERY_DATABASE_SSLMODE: ${{ steps.postgres_transport.outputs.sslmode }}
        run: |
          set -euo pipefail
          case "$OPL_RECOVERY_PG_CONFIG_MODE" in
            absent|disable) ;;
            *) echo "Refusing PostgreSQL transport repair: ConfigMap mode is not absent/disable." >&2; exit 1 ;;
          esac
          if [ "$OPL_RECOVERY_DATABASE_HOST_KIND" != "rfc1918_ipv4" ]; then
            echo "Refusing PostgreSQL transport repair: DATABASE_URL host is not one RFC1918 IPv4 literal." >&2
            exit 1
          fi
          case "$OPL_RECOVERY_DATABASE_SSLMODE" in
            absent|disable) ;;
            *) echo "Refusing PostgreSQL transport repair: DATABASE_URL sslmode is not absent/disable." >&2; exit 1 ;;
          esac
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" patch configmap/opl-cloud-config \
            --type merge -p '{"data":{"PGSSLMODE":"disable"}}'
          readback="$(kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" \
            get configmap/opl-cloud-config -o jsonpath='{.data.PGSSLMODE}')"
          if [ "$readback" != "disable" ]; then
            echo "PostgreSQL transport ConfigMap readback mismatch." >&2
            exit 1
          fi
          echo "PostgreSQL transport ConfigMap repaired and read back."

      - name: Back up and inspect primary Workspace conflict
        if: ${{ (inputs.inspect_primary_workspace_conflict || inputs.inspect_customer_identity_hard_cut) && !inputs.diagnostics_only && inputs.roll_forward_mode == 'control-plane' }}
        shell: bash
        env:
          PGSSLMODE: disable
        run: |
          set -euo pipefail
          umask 077
          if [ "${{ inputs.reset_prelaunch_control_plane_data }}" = "true" ] && { \
            [ "${{ inputs.roll_forward_mode }}" != "control-plane" ] || \
            [ "${{ inputs.inspect_primary_workspace_conflict }}" != "true" ] || \
            [ "${{ inputs.repair_postgres_transport }}" = "true" ] || \
            [ "${{ inputs.repair_primary_workspace_conflict }}" = "true" ] || \
            [ "${{ inputs.inspect_customer_identity_hard_cut }}" = "true" ]; }; then
            echo "Refusing prelaunch reset without control-plane roll-forward, same-run backup, and every other repair disabled." >&2
            exit 1
          fi
          backup_root="/home/actions/.secrets/medopl/v22/postgres-backups"
          install -d -m 700 "$backup_root"
          backup_file="$backup_root/opl-cloud-before-primary-workspace-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.dump"
          postgres_client_pod="opl-postgres-recovery-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          reset_requested="${{ inputs.reset_prelaunch_control_plane_data }}"
          retain_postgres_client=false
          restore_control_plane=false
          cleanup_postgres_client() {
            if [ "$retain_postgres_client" = "true" ]; then
              return
            fi
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" \
              delete "pod/$postgres_client_pod" --wait=false >/dev/null 2>&1 || true
          }
          control_plane_pod_count() {
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get pods \
              -l 'app.kubernetes.io/name=opl-cloud,app.kubernetes.io/component=control-plane' -o name \
              | awk 'NF { count++ } END { print count + 0 }'
          }
          show_control_plane_state() {
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" \
              get deployment/opl-cloud-control-plane -o wide || true
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get pods \
              -l 'app.kubernetes.io/name=opl-cloud,app.kubernetes.io/component=control-plane' -o wide || true
          }
          wait_for_control_plane_zero() {
            local attempt=""
            local deployment_state=""
            local spec_replicas=""
            local status_replicas=""
            local ready_replicas=""
            local available_replicas=""
            local pods=""
            for attempt in $(seq 1 24); do
              deployment_state="$(kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" \
                get deployment/opl-cloud-control-plane \
                -o jsonpath='{.spec.replicas}{"|"}{.status.replicas}{"|"}{.status.readyReplicas}{"|"}{.status.availableReplicas}')"
              IFS='|' read -r spec_replicas status_replicas ready_replicas available_replicas <<< "$deployment_state"
              status_replicas="${status_replicas:-0}"
              ready_replicas="${ready_replicas:-0}"
              available_replicas="${available_replicas:-0}"
              pods="$(control_plane_pod_count)"
              if [ "$spec_replicas" = "0" ] && [ "$status_replicas" = "0" ] \
                && [ "$ready_replicas" = "0" ] && [ "$available_replicas" = "0" ] \
                && [ "$pods" = "0" ]; then
                return 0
              fi
              sleep 5
            done
            echo "Control Plane did not reach zero replicas and zero pods within 120 seconds." >&2
            return 1
          }
          cleanup_recovery() {
            local exit_status=$?
            trap - EXIT
            if [ "$reset_requested" = "true" ]; then
              if [ "$restore_control_plane" = "true" ]; then
                kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" scale \
                  deployment/opl-cloud-control-plane --replicas=1 || true
              fi
              show_control_plane_state
            fi
            cleanup_postgres_client
            exit "$exit_status"
          }
          trap cleanup_recovery EXIT

          if [ "$reset_requested" = "true" ]; then
            desired_replicas="$(kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" \
              get deployment/opl-cloud-control-plane -o jsonpath='{.spec.replicas}')"
            current_control_plane_image="$(kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" \
              get deployment/opl-cloud-control-plane -o jsonpath="{.spec.template.spec.containers[?(@.name=='control-plane')].image}")"
            current_control_plane_pods="$(control_plane_pod_count)"
            if [ "$current_control_plane_image" != "$OPL_CANDIDATE_IMAGE" ]; then
              echo "Refusing prelaunch reset: Control Plane image is not the approved candidate." >&2
              exit 1
            fi
            if [ "$desired_replicas" = "0" ]; then
              if [ "$current_control_plane_pods" != "0" ]; then
                echo "Refusing prelaunch reset: interrupted recovery still has Control Plane pods." >&2
                exit 1
              fi
              echo "interruptedResetRecovery=true"
            elif [ "$desired_replicas" != "1" ]; then
              echo "Refusing prelaunch reset: unsupported Control Plane replica state $desired_replicas." >&2
              exit 1
            fi
            restore_control_plane=true
          fi
          cat <<EOF | kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" create -f -
          apiVersion: v1
          kind: Pod
          metadata:
            name: $postgres_client_pod
            labels:
              app.kubernetes.io/name: opl-cloud
              app.kubernetes.io/component: postgres-recovery
          spec:
            automountServiceAccountToken: false
            restartPolicy: Never
            imagePullSecrets:
              - name: tcr-pull-secret
            securityContext:
              runAsNonRoot: true
              runAsUser: 26
              runAsGroup: 26
              fsGroup: 26
              seccompProfile:
                type: RuntimeDefault
            initContainers:
              - name: database-url-normalizer
                image: $OPL_CANDIDATE_IMAGE
                imagePullPolicy: IfNotPresent
                command: ["node", "-e"]
                args:
                  - |
                    const { readFileSync, writeFileSync } = require("node:fs");
                    try {
                      const raw = readFileSync("/run/opl-postgres/DATABASE_URL", "utf8").trim();
                      const normalized = new URL(raw).toString();
                      writeFileSync("/work/database-url", normalized, { mode: 0o600 });
                    } catch {
                      console.error("DATABASE_URL normalization failed.");
                      process.exit(1);
                    }
                securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  capabilities:
                    drop: ["ALL"]
                volumeMounts:
                  - name: database-secret
                    mountPath: /run/opl-postgres
                    readOnly: true
                  - name: work
                    mountPath: /work
            containers:
              - name: postgres-client
                image: $OPL_POSTGRES_CLIENT_IMAGE
                imagePullPolicy: IfNotPresent
                command: ["/bin/bash", "-ceu", "--"]
                args:
                  - "while :; do sleep 3600; done"
                env:
                  - name: PGSSLMODE
                    value: disable
                  - name: TMPDIR
                    value: /work
                securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  capabilities:
                    drop: ["ALL"]
                volumeMounts:
                  - name: work
                    mountPath: /work
                  - name: tmp
                    mountPath: /tmp
            volumes:
              - name: database-secret
                secret:
                  secretName: opl-cloud-database
                  defaultMode: 0440
              - name: work
                emptyDir: {}
              - name: tmp
                emptyDir: {}
          EOF
          if ! kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" \
            wait --for=condition=Ready "pod/$postgres_client_pod" --timeout=120s; then
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" describe "pod/$postgres_client_pod" || true
            exit 1
          fi
          install -m 600 /dev/null "$backup_file"
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" exec "$postgres_client_pod" \
            -c postgres-client -- /bin/bash -ceu \
            'umask 077; DATABASE_URL="$(cat /work/database-url)"; pg_dump --format=custom --no-owner --no-acl --file=/work/backup.dump "$DATABASE_URL"; test -s /work/backup.dump; pg_restore --list /work/backup.dump >/dev/null'
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" exec "$postgres_client_pod" \
            -c postgres-client -- cat /work/backup.dump > "$backup_file"
          test -s "$backup_file"
          chmod 600 "$backup_file"
          backup_bytes="$(wc -c < "$backup_file" | tr -d ' ')"
          backup_sha256="$(sha256sum "$backup_file" | cut -d ' ' -f 1)"
          remote_backup="$(kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" exec "$postgres_client_pod" \
            -c postgres-client -- /bin/bash -ceu 'printf "%s %s" "$(wc -c < /work/backup.dump)" "$(sha256sum /work/backup.dump | cut -d " " -f 1)"')"
          if [ "$remote_backup" != "$backup_bytes $backup_sha256" ]; then
            echo "PostgreSQL backup readback mismatch." >&2
            exit 1
          fi
          printf 'backupFile=%s\nbackupBytes=%s\nbackupSha256=%s\n' "$backup_file" "$backup_bytes" "$backup_sha256"

          if [ "${{ inputs.inspect_primary_workspace_conflict }}" = "true" ]; then
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" exec --stdin "$postgres_client_pod" \
              -c postgres-client -- /bin/bash -ceu 'DATABASE_URL="$(cat /work/database-url)"; psql "$DATABASE_URL" -X --set ON_ERROR_STOP=1 --csv' <<'SQL'
          WITH duplicate_accounts AS (
            SELECT
              COALESCE(NULLIF(account_id, ''), owner_account_id) AS account_key,
              count(*) AS workspace_count
            FROM control_plane_workspaces
            WHERE COALESCE(NULLIF(account_id, ''), owner_account_id) <> ''
            GROUP BY COALESCE(NULLIF(account_id, ''), owner_account_id)
            HAVING count(*) > 1
          )
          SELECT
            duplicate_accounts.account_key,
            duplicate_accounts.workspace_count,
            workspaces.id AS workspace_id,
            workspaces.created_at,
            workspaces.updated_at,
            workspaces.state,
            workspaces.status,
            workspaces.current_compute_allocation_id,
            workspaces.storage_id,
            workspaces.current_attachment_id,
            workspaces.runtime_id,
            (SELECT count(*) FROM control_plane_compute_allocations computes WHERE computes.workspace_id = workspaces.id) AS compute_rows,
            (SELECT count(*) FROM control_plane_storage_volumes storage WHERE storage.workspace_id = workspaces.id) AS storage_rows,
            (SELECT count(*) FROM control_plane_storage_attachments attachments WHERE attachments.workspace_id = workspaces.id) AS attachment_rows,
            (SELECT count(*) FROM control_plane_runtime_operations operations WHERE operations.workspace_id = workspaces.id) AS operation_rows
          FROM duplicate_accounts
          JOIN control_plane_workspaces workspaces
            ON COALESCE(NULLIF(workspaces.account_id, ''), workspaces.owner_account_id) = duplicate_accounts.account_key
          ORDER BY duplicate_accounts.account_key, workspaces.created_at, workspaces.id;

          SELECT format(
            'SELECT %L AS reference_table, count(*) AS reference_rows, count(DISTINCT workspace_id) AS referenced_workspaces FROM %I.%I WHERE workspace_id IN (SELECT workspaces.id FROM control_plane_workspaces workspaces JOIN (SELECT COALESCE(NULLIF(account_id, ''''), owner_account_id) AS account_key FROM control_plane_workspaces WHERE COALESCE(NULLIF(account_id, ''''), owner_account_id) <> '''' GROUP BY COALESCE(NULLIF(account_id, ''''), owner_account_id) HAVING count(*) > 1) duplicate_accounts ON COALESCE(NULLIF(workspaces.account_id, ''''), workspaces.owner_account_id) = duplicate_accounts.account_key);',
            table_schema || '.' || table_name,
            table_schema,
            table_name
          )
          FROM information_schema.columns
          WHERE table_schema = 'public'
            AND table_name LIKE 'control_plane_%'
            AND column_name = 'workspace_id'
          ORDER BY table_name
          \gexec

          WITH duplicate_accounts AS (
            SELECT COALESCE(NULLIF(account_id, ''), owner_account_id) AS account_key
            FROM control_plane_workspaces
            WHERE COALESCE(NULLIF(account_id, ''), owner_account_id) <> ''
            GROUP BY COALESCE(NULLIF(account_id, ''), owner_account_id)
            HAVING count(*) > 1
          ), duplicate_workspaces AS (
            SELECT workspaces.id
            FROM control_plane_workspaces workspaces
            JOIN duplicate_accounts
              ON COALESCE(NULLIF(workspaces.account_id, ''), workspaces.owner_account_id) = duplicate_accounts.account_key
          )
          SELECT
            operations.workspace_id,
            operations.action,
            operations.status,
            count(*) AS operation_count,
            bool_and(COALESCE(operations.result, '') <> '') AS result_present,
            sum(octet_length(COALESCE(operations.result, ''))) AS result_bytes
          FROM control_plane_runtime_operations operations
          JOIN duplicate_workspaces ON duplicate_workspaces.id = operations.workspace_id
          GROUP BY operations.workspace_id, operations.action, operations.status
          ORDER BY operations.workspace_id, operations.action, operations.status;
          SQL
          fi

          if [ "${{ inputs.reset_prelaunch_control_plane_data }}" = "true" ]; then
            reset_replicas="$(kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" \
              get deployment/opl-cloud-control-plane -o jsonpath='{.spec.replicas}')"
            reset_control_plane_image="$(kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" \
              get deployment/opl-cloud-control-plane -o jsonpath="{.spec.template.spec.containers[?(@.name=='control-plane')].image}")"
            if [ "$reset_replicas" != "$desired_replicas" ] || \
              [ "$reset_control_plane_image" != "$OPL_CANDIDATE_IMAGE" ]; then
              echo "Refusing prelaunch reset: Control Plane state changed after backup." >&2
              exit 1
            fi
            if [ "$desired_replicas" = "1" ]; then
              kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" scale \
                deployment/opl-cloud-control-plane --replicas=0
            elif [ "$(control_plane_pod_count)" != "0" ]; then
              echo "Refusing prelaunch reset: interrupted recovery gained a Control Plane pod." >&2
              exit 1
            fi
            wait_for_control_plane_zero
            echo "controlPlaneSuspended=replicas:0 pods:0"

            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" exec --stdin "$postgres_client_pod" \
              -c postgres-client -- /bin/bash -seu <<'RESET'
          DATABASE_URL="$(cat /work/database-url)"
          table_count="$(psql "$DATABASE_URL" -X --set ON_ERROR_STOP=1 --tuples-only --no-align <<'SQL'
          SELECT count(*)
          FROM pg_catalog.pg_class tables
          JOIN pg_catalog.pg_namespace schemas ON schemas.oid = tables.relnamespace
          WHERE schemas.nspname = 'public'
            AND tables.relkind IN ('r', 'p')
            AND tables.relname LIKE 'control\_plane\_%' ESCAPE '\';
          SQL
          )"
          table_count="$(printf '%s' "$table_count" | tr -d '[:space:]')"
          if ! [[ "$table_count" =~ ^[1-9][0-9]*$ ]]; then
            echo "Refusing prelaunch reset: no public control_plane_% tables were found." >&2
            exit 1
          fi
          target_tables="$(psql "$DATABASE_URL" -X --set ON_ERROR_STOP=1 --tuples-only --no-align <<'SQL'
          SELECT string_agg(format('%I.%I', schemas.nspname, tables.relname), ', ' ORDER BY tables.relname)
          FROM pg_catalog.pg_class tables
          JOIN pg_catalog.pg_namespace schemas ON schemas.oid = tables.relnamespace
          WHERE schemas.nspname = 'public'
            AND tables.relkind IN ('r', 'p')
            AND tables.relname LIKE 'control\_plane\_%' ESCAPE '\';
          SQL
          )"
          target_tables="$(printf '%s' "$target_tables" | tr -d '\r\n')"
          if [ -z "$target_tables" ] || [[ "$target_tables" == *opl_schema_migrations* ]]; then
            echo "Refusing prelaunch reset: target table list is empty or contains the migration journal." >&2
            exit 1
          fi
          printf 'resetTableCount=%s\nresetTables=%s\n' "$table_count" "$target_tables"
          echo "resetRowsBefore"
          command psql "$DATABASE_URL" -X --set ON_ERROR_STOP=1 --csv <<'SQL'
          SELECT format('SELECT %L AS table_name, count(*) AS row_count FROM %I.%I;', schemas.nspname || '.' || tables.relname, schemas.nspname, tables.relname)
          FROM pg_catalog.pg_class tables
          JOIN pg_catalog.pg_namespace schemas ON schemas.oid = tables.relnamespace
          WHERE schemas.nspname = 'public'
            AND tables.relkind IN ('r', 'p')
            AND tables.relname LIKE 'control\_plane\_%' ESCAPE '\'
          ORDER BY tables.relname
          \gexec
          SQL
          external_references="$(psql "$DATABASE_URL" -X --set ON_ERROR_STOP=1 --tuples-only --no-align <<'SQL'
          SELECT format('%I.%I.%I -> %I.%I', source_schema.nspname, source.relname, constraints.conname, target_schema.nspname, target.relname)
          FROM pg_catalog.pg_constraint constraints
          JOIN pg_catalog.pg_class source ON source.oid = constraints.conrelid
          JOIN pg_catalog.pg_namespace source_schema ON source_schema.oid = source.relnamespace
          JOIN pg_catalog.pg_class target ON target.oid = constraints.confrelid
          JOIN pg_catalog.pg_namespace target_schema ON target_schema.oid = target.relnamespace
          WHERE constraints.contype = 'f'
            AND target_schema.nspname = 'public'
            AND target.relname LIKE 'control\_plane\_%' ESCAPE '\'
            AND NOT (source_schema.nspname = 'public' AND source.relname LIKE 'control\_plane\_%' ESCAPE '\')
          ORDER BY source_schema.nspname, source.relname, constraints.conname;
          SQL
          )"
          if [ -n "$(printf '%s' "$external_references" | tr -d '[:space:]')" ]; then
            echo "Refusing prelaunch reset: a non-control_plane_% table has a foreign key to a reset target." >&2
            printf '%s\n' "$external_references" >&2
            exit 1
          fi
          echo "resetExternalForeignKeys=0"
          command psql "$DATABASE_URL" -X --set ON_ERROR_STOP=1 <<SQL
          BEGIN;
          TRUNCATE TABLE $target_tables;
          DO \$reset\$
          DECLARE
            target record;
            remaining bigint;
          BEGIN
            FOR target IN
              SELECT schemas.nspname AS schema_name, tables.relname AS table_name
              FROM pg_catalog.pg_class tables
              JOIN pg_catalog.pg_namespace schemas ON schemas.oid = tables.relnamespace
              WHERE schemas.nspname = 'public'
                AND tables.relkind IN ('r', 'p')
                AND tables.relname LIKE 'control\_plane\_%' ESCAPE '\'
            LOOP
              EXECUTE format('SELECT count(*) FROM %I.%I', target.schema_name, target.table_name) INTO remaining;
              IF remaining <> 0 THEN
                RAISE EXCEPTION 'prelaunch reset readback failed for %.%: % rows remain', target.schema_name, target.table_name, remaining;
              END IF;
            END LOOP;
          END
          \$reset\$;
          COMMIT;
          SQL
          echo "resetRowsAfter"
          command psql "$DATABASE_URL" -X --set ON_ERROR_STOP=1 --csv <<'SQL'
          SELECT format('SELECT %L AS table_name, count(*) AS row_count FROM %I.%I;', schemas.nspname || '.' || tables.relname, schemas.nspname, tables.relname)
          FROM pg_catalog.pg_class tables
          JOIN pg_catalog.pg_namespace schemas ON schemas.oid = tables.relnamespace
          WHERE schemas.nspname = 'public'
            AND tables.relkind IN ('r', 'p')
            AND tables.relname LIKE 'control\_plane\_%' ESCAPE '\'
          ORDER BY tables.relname
          \gexec
          SQL
          echo "resetCommit=committed"
          RESET
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" scale \
              deployment/opl-cloud-control-plane --replicas=1
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" rollout restart \
              deployment/opl-cloud-control-plane
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" rollout status \
              deployment/opl-cloud-control-plane --timeout=300s
            restore_control_plane=false
            echo "controlPlaneRestored=replicas:1 ready:true"
          fi
          if [ "${{ inputs.repair_primary_workspace_conflict }}" = "true" ] || \
            [ "${{ inputs.inspect_customer_identity_hard_cut }}" = "true" ] || \
            [ "${{ inputs.reset_prelaunch_control_plane_data }}" = "true" ]; then
            retain_postgres_client=true
            printf 'OPL_PRIMARY_WORKSPACE_BACKUP_FILE=%s\nOPL_POSTGRES_RECOVERY_POD=%s\n' \
              "$backup_file" "$postgres_client_pod" >> "$GITHUB_ENV"
          fi

      - name: Repair verified primary Workspace conflict
        if: ${{ inputs.repair_primary_workspace_conflict && !inputs.diagnostics_only && inputs.roll_forward_mode == 'control-plane' }}
        shell: bash
        env:
          PGSSLMODE: disable
        run: |
          set -euo pipefail
          postgres_client_pod="${OPL_POSTGRES_RECOVERY_POD:-}"
          cleanup_postgres_client() {
            if [ -n "$postgres_client_pod" ]; then
              kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" \
                delete "pod/$postgres_client_pod" --wait=false >/dev/null 2>&1 || true
            fi
          }
          trap cleanup_postgres_client EXIT

          if [ "${{ inputs.inspect_primary_workspace_conflict }}" != "true" ]; then
            echo "Refusing primary Workspace repair without same-run inspection and backup." >&2
            exit 1
          fi
          approved_backup="/home/actions/.secrets/medopl/v22/postgres-backups/opl-cloud-before-primary-workspace-29824127440-1.dump"
          approved_backup_sha256="3f9478e071595d8f0af275e2eebc351b4a828fc54319ece39318f88b35569b33"
          if [ ! -s "$approved_backup" ]; then
            echo "Refusing primary Workspace repair: approved backup is missing." >&2
            exit 1
          fi
          actual_approved_backup_sha256="$(sha256sum "$approved_backup" | cut -d ' ' -f 1)"
          if [ "$actual_approved_backup_sha256" != "$approved_backup_sha256" ]; then
            echo "Refusing primary Workspace repair: approved backup SHA256 mismatch." >&2
            exit 1
          fi
          backup_file="${OPL_PRIMARY_WORKSPACE_BACKUP_FILE:-}"
          expected_backup="/home/actions/.secrets/medopl/v22/postgres-backups/opl-cloud-before-primary-workspace-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.dump"
          expected_pod="opl-postgres-recovery-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          if [ "$backup_file" != "$expected_backup" ] || [ ! -s "$backup_file" ] || [ "$postgres_client_pod" != "$expected_pod" ]; then
            echo "Refusing primary Workspace repair without the verified same-run backup client." >&2
            exit 1
          fi
          local_backup="$(wc -c < "$backup_file" | tr -d ' ') $(sha256sum "$backup_file" | cut -d ' ' -f 1)"
          remote_backup="$(kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" exec "$postgres_client_pod" \
            -c postgres-client -- /bin/bash -ceu 'pg_restore --list /work/backup.dump >/dev/null; printf "%s %s" "$(wc -c < /work/backup.dump)" "$(sha256sum /work/backup.dump | cut -d " " -f 1)"')"
          if [ "$remote_backup" != "$local_backup" ]; then
            echo "Refusing primary Workspace repair: backup readback changed." >&2
            exit 1
          fi

          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" exec --stdin "$postgres_client_pod" \
            -c postgres-client -- /bin/bash -ceu 'DATABASE_URL="$(cat /work/database-url)"; psql "$DATABASE_URL" -X --set ON_ERROR_STOP=1' <<'SQL'
          BEGIN;
          CREATE TEMP TABLE opl_primary_workspace_repair_ids (
            id TEXT PRIMARY KEY,
            account_id TEXT NOT NULL
          ) ON COMMIT DROP;
          INSERT INTO opl_primary_workspace_repair_ids (id, account_id) VALUES
            ('ws_1783882834034413362', 'acct-production-owner'),
            ('ws_1783883757382965976', 'acct-production-owner'),
            ('ws_1783884449896368511', 'acct-production-owner'),
            ('ws_1783885797531445065', 'acct-production-owner'),
            ('ws_1783886628705368207', 'acct-production-owner'),
            ('ws_1783886986856289941', 'acct-production-owner'),
            ('ws_1783888297749360763', 'acct-production-owner'),
            ('ws_1783888656851127208', 'acct-production-owner'),
            ('ws_1783889444787312647', 'acct-production-owner'),
            ('ws_1783889795524148996', 'acct-production-owner'),
            ('ws_1783890447574981128', 'acct-production-owner'),
            ('ws_1783890801197068999', 'acct-production-owner'),
            ('ws_1783891381955027660', 'acct-production-owner'),
            ('ws_1783891732749036474', 'acct-production-owner'),
            ('ws_1783892287551095587', 'acct-production-owner'),
            ('ws_1783892647741367623', 'acct-production-owner'),
            ('ws_1783893615925075436', 'acct-production-owner'),
            ('ws_1783893990165584949', 'acct-production-owner'),
            ('ws_1784044223504193498', 'acct-production-owner'),
            ('ws_1784075471495939135', 'acct-production-owner'),
            ('ws_1783702265139084219', 'pi-production-verifier'),
            ('ws_1783702557207047641', 'pi-production-verifier'),
            ('ws_1783735430058178341', 'pi-production-verifier'),
            ('ws_1783736074650805655', 'pi-production-verifier'),
            ('ws_1783737149531194011', 'pi-production-verifier'),
            ('ws_1783738548346715920', 'pi-production-verifier'),
            ('ws_1783739559144618906', 'pi-production-verifier'),
            ('ws_1783740622365687039', 'pi-production-verifier'),
            ('ws_1783741739835468962', 'pi-production-verifier'),
            ('ws_1783742074687487075', 'pi-production-verifier'),
            ('ws_1783747539564739331', 'pi-production-verifier'),
            ('ws_1783748403084166567', 'pi-production-verifier'),
            ('ws_1783748886405156667', 'pi-production-verifier'),
            ('ws_1783809813667683135', 'pi-production-verifier');

          DO $repair$
          DECLARE
            expected_workspace_count CONSTANT INTEGER := 34;
            current_workspace_count INTEGER;
            archived_workspace_count INTEGER;
            deleted_workspace_count INTEGER;
            inserted_archive_count INTEGER;
            duplicate_count INTEGER;
            resource_reference_count INTEGER;
          BEGIN
            IF (SELECT count(*) FROM opl_primary_workspace_repair_ids) <> expected_workspace_count THEN
              RAISE EXCEPTION 'primary Workspace repair ID set mismatch';
            END IF;

            PERFORM workspaces.id
            FROM control_plane_workspaces workspaces
            JOIN opl_primary_workspace_repair_ids repair ON repair.id = workspaces.id
            FOR UPDATE;

            SELECT count(*) INTO current_workspace_count
            FROM control_plane_workspaces workspaces
            JOIN opl_primary_workspace_repair_ids repair ON repair.id = workspaces.id;
            SELECT count(*) INTO archived_workspace_count
            FROM control_plane_archived_workspaces archived
            JOIN opl_primary_workspace_repair_ids repair
              ON archived.id = 'archived-workspace-' || repair.id
             AND archived.workspace_id = repair.id
             AND archived.resource_id = repair.id
             AND archived.resource_kind = 'workspace'
             AND archived.account_id = repair.account_id
             AND archived.status = 'data_deleted';

            IF current_workspace_count = 0 AND archived_workspace_count = expected_workspace_count THEN
              SELECT count(*) INTO duplicate_count
              FROM (
                SELECT COALESCE(NULLIF(account_id, ''), owner_account_id)
                FROM control_plane_workspaces
                WHERE COALESCE(NULLIF(account_id, ''), owner_account_id) <> ''
                GROUP BY COALESCE(NULLIF(account_id, ''), owner_account_id)
                HAVING count(*) > 1
              ) duplicates;
              IF duplicate_count <> 0 THEN
                RAISE EXCEPTION 'primary Workspace repair replay found % duplicate accounts', duplicate_count;
              END IF;
              RAISE NOTICE 'workspaceArchived=34 deleted=34 duplicate_count=0 already_applied=true';
              RETURN;
            END IF;
            IF current_workspace_count <> expected_workspace_count OR archived_workspace_count <> 0 THEN
              RAISE EXCEPTION 'primary Workspace repair state mismatch: current %, archived %', current_workspace_count, archived_workspace_count;
            END IF;
            IF EXISTS (
              SELECT 1
              FROM control_plane_workspaces workspaces
              JOIN opl_primary_workspace_repair_ids repair ON repair.id = workspaces.id
              WHERE COALESCE(NULLIF(workspaces.account_id, ''), workspaces.owner_account_id) <> repair.account_id
                 OR workspaces.state <> 'data_deleted'
                 OR workspaces.status <> 'unrecoverable'
            ) THEN
              RAISE EXCEPTION 'primary Workspace repair candidate identity or terminal state changed';
            END IF;
            IF EXISTS (
              SELECT 1
              FROM control_plane_workspaces workspaces
              WHERE COALESCE(NULLIF(workspaces.account_id, ''), workspaces.owner_account_id) IN ('acct-production-owner', 'pi-production-verifier')
                AND NOT EXISTS (SELECT 1 FROM opl_primary_workspace_repair_ids repair WHERE repair.id = workspaces.id)
            ) THEN
              RAISE EXCEPTION 'primary Workspace repair found an unapproved Workspace for a target account';
            END IF;

            SELECT
              (SELECT count(*) FROM control_plane_compute_allocations resources JOIN opl_primary_workspace_repair_ids repair ON repair.id = resources.workspace_id)
              + (SELECT count(*) FROM control_plane_storage_volumes resources JOIN opl_primary_workspace_repair_ids repair ON repair.id = resources.workspace_id)
              + (SELECT count(*) FROM control_plane_storage_attachments resources JOIN opl_primary_workspace_repair_ids repair ON repair.id = resources.workspace_id)
            INTO resource_reference_count;
            IF resource_reference_count <> 0 THEN
              RAISE EXCEPTION 'primary Workspace repair found % current Fabric resource references', resource_reference_count;
            END IF;

            INSERT INTO control_plane_archived_workspaces (
              id, created_at, updated_at, account_id, workspace_id, resource_id,
              resource_kind, name, status, reason, archived_at
            )
            SELECT
              'archived-workspace-' || workspaces.id,
              CURRENT_TIMESTAMP,
              CURRENT_TIMESTAMP,
              repair.account_id,
              workspaces.id,
              workspaces.id,
              'workspace',
              workspaces.name,
              workspaces.state,
              'roll_forward_primary_workspace_conflict_20260721',
              CURRENT_TIMESTAMP
            FROM control_plane_workspaces workspaces
            JOIN opl_primary_workspace_repair_ids repair ON repair.id = workspaces.id;
            GET DIAGNOSTICS inserted_archive_count = ROW_COUNT;
            IF inserted_archive_count <> expected_workspace_count THEN
              RAISE EXCEPTION 'primary Workspace archive count mismatch: %', inserted_archive_count;
            END IF;

            DELETE FROM control_plane_workspaces workspaces
            USING opl_primary_workspace_repair_ids repair
            WHERE workspaces.id = repair.id;
            GET DIAGNOSTICS deleted_workspace_count = ROW_COUNT;
            IF deleted_workspace_count <> expected_workspace_count THEN
              RAISE EXCEPTION 'primary Workspace delete count mismatch: %', deleted_workspace_count;
            END IF;

            SELECT count(*) INTO archived_workspace_count
            FROM control_plane_archived_workspaces archived
            JOIN opl_primary_workspace_repair_ids repair
              ON archived.id = 'archived-workspace-' || repair.id
             AND archived.workspace_id = repair.id
             AND archived.resource_id = repair.id
             AND archived.resource_kind = 'workspace'
             AND archived.account_id = repair.account_id
             AND archived.status = 'data_deleted';
            SELECT count(*) INTO duplicate_count
            FROM (
              SELECT COALESCE(NULLIF(account_id, ''), owner_account_id)
              FROM control_plane_workspaces
              WHERE COALESCE(NULLIF(account_id, ''), owner_account_id) <> ''
              GROUP BY COALESCE(NULLIF(account_id, ''), owner_account_id)
              HAVING count(*) > 1
            ) duplicates;
            IF archived_workspace_count <> expected_workspace_count OR duplicate_count <> 0 THEN
              RAISE EXCEPTION 'primary Workspace repair readback mismatch: archived %, duplicate_count %', archived_workspace_count, duplicate_count;
            END IF;
            RAISE NOTICE 'workspaceArchived=34 deleted=34 duplicate_count=0 already_applied=false';
          END
          $repair$;
          COMMIT;
          SQL

      - name: Inspect customer identity hard cut
        if: ${{ inputs.inspect_customer_identity_hard_cut && !inputs.diagnostics_only && inputs.roll_forward_mode == 'control-plane' }}
        shell: bash
        env:
          PGSSLMODE: disable
        run: |
          set -euo pipefail
          umask 077
          postgres_client_pod="${OPL_POSTGRES_RECOVERY_POD:-}"
          if [ -z "$postgres_client_pod" ]; then
            echo "Customer identity inspection is missing the verified PostgreSQL client." >&2
            exit 1
          fi

          manifest_root="/home/actions/.secrets/medopl/v22/postgres-backups"
          identity_manifest="$manifest_root/opl-cloud-customer-identity-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.json"
          matched_manifest="$manifest_root/opl-cloud-customer-identity-matched-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.json"
          install -m 600 /dev/null "$identity_manifest"
          install -m 600 /dev/null "$matched_manifest"

          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" exec --stdin "$postgres_client_pod" \
            -c postgres-client -- /bin/bash -ceu 'DATABASE_URL="$(cat /work/database-url)"; psql "$DATABASE_URL" -X --set ON_ERROR_STOP=1 --quiet --tuples-only --no-align' \
            > "$identity_manifest" <<'SQL'
          -- Mirrors every fail-closed data precondition in the migration:
          -- legacy account/user cardinality is not one-to-one
          -- legacy normalized user email is blank or duplicated
          -- legacy Sub2API mapping is missing or duplicated
          -- legacy account owner is cross-account or missing
          -- legacy customer role is not owner
          -- legacy customer organization cardinality is not one-to-one
          -- legacy customer membership is not one-to-one
          WITH
          duplicate_mappings AS (
            SELECT sub2api_user_id
            FROM control_plane_accounts
            GROUP BY sub2api_user_id
            HAVING COUNT(*) > 1
          ),
          targets AS (
            SELECT COALESCE(jsonb_agg(jsonb_build_object(
              'accountId', accounts.id,
              'userId', users.id,
              'oldSub2apiUserId', accounts.sub2api_user_id,
              'normalizedEmail', lower(btrim(users.email)),
              'localStatus', users.status
            ) ORDER BY accounts.id), '[]'::jsonb) AS value
            FROM control_plane_accounts accounts
            JOIN control_plane_users users ON users.account_id = accounts.id
            WHERE accounts.sub2api_user_id <= 0
               OR accounts.sub2api_user_id IN (SELECT sub2api_user_id FROM duplicate_mappings)
          )
          SELECT jsonb_build_object(
            'metrics', jsonb_build_object(
              'truthTableCount', (
                SELECT count(*) FROM unnest(ARRAY[
                  to_regclass('control_plane_accounts'),
                  to_regclass('control_plane_users'),
                  to_regclass('control_plane_organizations'),
                  to_regclass('control_plane_memberships'),
                  to_regclass('control_plane_sessions')
                ]) relation WHERE relation IS NOT NULL
              ),
              'accountUserCardinalityViolations', (
                SELECT count(*) FROM (
                  SELECT accounts.id
                  FROM control_plane_accounts accounts
                  LEFT JOIN control_plane_users users ON users.account_id = accounts.id
                  GROUP BY accounts.id
                  HAVING count(users.id) <> 1
                ) violations
              ) + (
                SELECT count(*)
                FROM control_plane_users users
                LEFT JOIN control_plane_accounts accounts ON accounts.id = users.account_id
                WHERE accounts.id IS NULL
              ),
              'blankEmailCount', (SELECT count(*) FROM control_plane_users WHERE email IS NULL OR btrim(email) = ''),
              'duplicateEmailGroupCount', (
                SELECT count(*) FROM (
                  SELECT lower(btrim(email)) FROM control_plane_users GROUP BY lower(btrim(email)) HAVING count(*) > 1
                ) duplicates
              ),
              'invalidMappingCount', (SELECT count(*) FROM control_plane_accounts WHERE sub2api_user_id <= 0),
              'duplicateMappingGroupCount', (SELECT count(*) FROM duplicate_mappings),
              'ownerViolations', (
                SELECT count(*)
                FROM control_plane_accounts accounts
                LEFT JOIN control_plane_users owners ON owners.id = accounts.owner_user_id
                WHERE accounts.owner_user_id <> '' AND (owners.id IS NULL OR owners.account_id <> accounts.id)
              ) + (
                SELECT count(*) FROM (
                  SELECT owner_user_id FROM control_plane_accounts WHERE owner_user_id <> '' GROUP BY owner_user_id HAVING count(*) > 1
                ) duplicates
              ),
              'roleViolations', (
                SELECT count(*) FROM control_plane_users users
                WHERE NOT (users.id = 'usr-admin' AND users.account_id = 'acct-admin' AND users.role = 'admin')
                  AND (users.id = 'usr-admin' OR users.account_id = 'acct-admin' OR users.role <> 'owner')
              ),
              'organizationCardinalityViolations', (
                SELECT count(*) FROM control_plane_users users
                WHERE (SELECT count(*) FROM control_plane_organizations organizations WHERE organizations.billing_account_id = users.account_id) <> 1
              ),
              'membershipViolations', (
                SELECT count(*)
                FROM control_plane_memberships memberships
                LEFT JOIN control_plane_accounts accounts ON accounts.id = memberships.account_id
                LEFT JOIN control_plane_users users ON users.id = memberships.user_id
                LEFT JOIN control_plane_organizations organizations ON organizations.id = memberships.organization_id
                WHERE accounts.id IS NULL OR users.id IS NULL OR organizations.id IS NULL
                  OR users.account_id <> memberships.account_id
                  OR organizations.billing_account_id <> memberships.account_id
                  OR memberships.role <> 'owner'
              ) + (
                SELECT count(*) FROM control_plane_users users
                WHERE (SELECT count(*) FROM control_plane_memberships memberships WHERE memberships.account_id = users.account_id) <> 1
                   OR (SELECT count(*) FROM control_plane_memberships memberships WHERE memberships.user_id = users.id) <> 1
                   OR NOT EXISTS (
                     SELECT 1
                     FROM control_plane_memberships memberships
                     JOIN control_plane_organizations organizations ON organizations.id = memberships.organization_id
                     WHERE memberships.account_id = users.account_id
                       AND memberships.user_id = users.id
                       AND organizations.billing_account_id = users.account_id
                   )
              ),
              'reciprocalOwnerAfterBackfillViolations', (
                SELECT count(*)
                FROM control_plane_accounts accounts
                JOIN control_plane_users users ON users.account_id = accounts.id
                WHERE COALESCE(NULLIF(accounts.owner_user_id, ''), users.id) <> users.id
              ),
              'duplicatePrimaryWorkspaceCount', (
                SELECT count(*) FROM (
                  SELECT COALESCE(NULLIF(account_id, ''), owner_account_id)
                  FROM control_plane_workspaces
                  WHERE COALESCE(NULLIF(account_id, ''), owner_account_id) <> ''
                  GROUP BY COALESCE(NULLIF(account_id, ''), owner_account_id)
                  HAVING count(*) > 1
                ) duplicates
              ),
              'archivedWorkspaceCount', (
                SELECT count(*) FROM control_plane_archived_workspaces
                WHERE reason = 'roll_forward_primary_workspace_conflict_20260721'
              ),
              'migrationJournalCount', (
                SELECT count(*) FROM opl_schema_migrations
                WHERE service = 'control-plane' AND version = '202607180001_customer_identity_hard_cut'
              )
            ),
            'targets', targets.value
          )
          FROM targets;
          SQL
          chmod 600 "$identity_manifest"
          if [ "$(stat -c '%a' "$identity_manifest")" != "600" ]; then
            echo "Customer identity manifest mode is not 0600." >&2
            exit 1
          fi
          manifest_sha256="$(sha256sum "$identity_manifest" | cut -d ' ' -f 1)"
          printf 'manifestSha256=%s\n' "$manifest_sha256"
          OPL_IDENTITY_MANIFEST="$identity_manifest" node <<'NODE'
          const crypto = require("node:crypto");
          const fs = require("node:fs");
          const hash = (value) => crypto.createHash("sha256").update(String(value)).digest("hex");
          const local = JSON.parse(fs.readFileSync(process.env.OPL_IDENTITY_MANIFEST, "utf8"));
          const metrics = local.metrics || {};
          const zeroMetrics = [
            "accountUserCardinalityViolations",
            "blankEmailCount",
            "duplicateEmailGroupCount",
            "ownerViolations",
            "roleViolations",
            "organizationCardinalityViolations",
            "membershipViolations",
            "reciprocalOwnerAfterBackfillViolations",
            "duplicatePrimaryWorkspaceCount",
            "migrationJournalCount"
          ];
          const targets = Array.isArray(local.targets) ? local.targets : [];
          console.log(`hardCutMetrics=${JSON.stringify(metrics)} mappingTargets=${targets.length}`);
          for (const target of targets) {
            console.log(`localMapping account=${hash(target.accountId).slice(0, 12)} email=${hash(target.normalizedEmail).slice(0, 12)} mapping=${target.oldSub2apiUserId > 0 ? "duplicated" : "missing"}`);
          }
          if (metrics.truthTableCount !== 5 || metrics.archivedWorkspaceCount !== 34 || zeroMetrics.some((name) => metrics[name] !== 0)) {
            throw new Error(`Customer identity hard-cut precondition failed: ${JSON.stringify(metrics)}`);
          }
          if (targets.length === 0 || targets.length !== metrics.invalidMappingCount + targets.filter((item) => item.oldSub2apiUserId > 0).length) {
            throw new Error("Customer identity mapping target set is empty or inconsistent.");
          }
          NODE

          auth_file="$OPL_RECOVERY_SECRET_DIR/sub2api-read-auth.json"
          config_file="$OPL_RECOVERY_SECRET_DIR/sub2api-read-config.json"
          install -m 600 /dev/null "$auth_file"
          install -m 600 /dev/null "$config_file"
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" \
            get secret/opl-cloud-sub2api configmap/opl-cloud-config -o json \
            | OPL_RECOVERY_AUTH_FILE="$auth_file" OPL_RECOVERY_CONFIG_FILE="$config_file" node -e '
              const fs = require("node:fs");
              const resources = JSON.parse(fs.readFileSync(0, "utf8")).items || [];
              const secret = resources.find((item) => item.kind === "Secret" && item.metadata?.name === "opl-cloud-sub2api");
              const config = resources.find((item) => item.kind === "ConfigMap" && item.metadata?.name === "opl-cloud-config");
              const decode = (name) => Buffer.from(secret?.data?.[name] || "", "base64").toString("utf8").trim();
              const apiKey = decode("OPL_SUB2API_ADMIN_API_KEY");
              const jwt = decode("OPL_SUB2API_ADMIN_JWT");
              const baseURL = String(config?.data?.OPL_SUB2API_BASE_URL || "").trim();
              const parsed = new URL(baseURL);
              if (parsed.protocol !== "https:" || parsed.hostname !== "gflabtoken.cn" || parsed.username || parsed.password || parsed.search || parsed.hash) {
                throw new Error("Configured Sub2API base URL is not the approved HTTPS backend.");
              }
              if ((!apiKey && !jwt) || (apiKey && jwt)) {
                throw new Error("No single existing GET-only Sub2API admin credential is available; POST login is forbidden.");
              }
              fs.writeFileSync(process.env.OPL_RECOVERY_AUTH_FILE, JSON.stringify(apiKey ? { apiKey } : { jwt }), { mode: 0o600 });
              fs.writeFileSync(process.env.OPL_RECOVERY_CONFIG_FILE, JSON.stringify({ baseURL: parsed.href.replace(/\/$/, "") }), { mode: 0o600 });
            '

          OPL_IDENTITY_MANIFEST="$identity_manifest" \
          OPL_MATCHED_MANIFEST="$matched_manifest" \
          OPL_SUB2API_READ_AUTH_FILE="$auth_file" \
          OPL_SUB2API_READ_CONFIG_FILE="$config_file" \
          node <<'NODE'
          const crypto = require("node:crypto");
          const fs = require("node:fs");
          const hash = (value) => crypto.createHash("sha256").update(String(value)).digest("hex");
          const local = JSON.parse(fs.readFileSync(process.env.OPL_IDENTITY_MANIFEST, "utf8"));
          const auth = JSON.parse(fs.readFileSync(process.env.OPL_SUB2API_READ_AUTH_FILE, "utf8"));
          const { baseURL } = JSON.parse(fs.readFileSync(process.env.OPL_SUB2API_READ_CONFIG_FILE, "utf8"));
          const metrics = local.metrics || {};
          const zeroMetrics = [
            "accountUserCardinalityViolations",
            "blankEmailCount",
            "duplicateEmailGroupCount",
            "ownerViolations",
            "roleViolations",
            "organizationCardinalityViolations",
            "membershipViolations",
            "reciprocalOwnerAfterBackfillViolations",
            "duplicatePrimaryWorkspaceCount",
            "migrationJournalCount"
          ];
          if (metrics.truthTableCount !== 5 || metrics.archivedWorkspaceCount !== 34 || zeroMetrics.some((name) => metrics[name] !== 0)) {
            throw new Error(`Customer identity hard-cut precondition failed: ${JSON.stringify(metrics)}`);
          }
          const targets = Array.isArray(local.targets) ? local.targets : [];
          if (targets.length === 0 || targets.length !== metrics.invalidMappingCount + targets.filter((item) => item.oldSub2apiUserId > 0).length) {
            throw new Error("Customer identity mapping target set is empty or inconsistent.");
          }
          const headers = auth.apiKey
            ? { Accept: "application/json", "x-api-key": auth.apiKey }
            : { Accept: "application/json", Authorization: `Bearer ${auth.jwt}` };
          let getCount = 0;
          const get = async (path) => {
            getCount += 1;
            const response = await fetch(`${baseURL}${path}`, { method: "GET", headers, redirect: "error" });
            const body = await response.json();
            if (!response.ok || body?.code !== 0 || body?.data === undefined) {
              throw new Error(`Sub2API GET failed with status ${response.status}.`);
            }
            return body.data;
          };
          const matched = [];
          for (const target of targets) {
            const exact = [];
            let page = 1;
            let pages = 1;
            do {
              const query = new URLSearchParams({
                page: String(page), page_size: "50", search: target.normalizedEmail, sort_by: "id", sort_order: "asc"
              });
              const data = await get(`/api/v1/admin/users?${query}`);
              if (!Array.isArray(data.items) || !Number.isInteger(data.pages) || data.pages < 1 || data.pages > 10) {
                throw new Error("Sub2API users pagination is invalid.");
              }
              pages = data.pages;
              exact.push(...data.items.filter((item) => String(item.email || "").trim().toLowerCase() === target.normalizedEmail));
              page += 1;
            } while (page <= pages);
            if (exact.length !== 1 || !Number.isSafeInteger(exact[0].id) || exact[0].id <= 0) {
              throw new Error(`Sub2API email match count is ${exact.length} for account ${hash(target.accountId).slice(0, 12)}.`);
            }
            const remote = await get(`/api/v1/admin/users/${exact[0].id}`);
            const remoteEmail = String(remote.email || "").trim().toLowerCase();
            if (remote.id !== exact[0].id || remoteEmail !== target.normalizedEmail || !["active", "disabled"].includes(remote.status)) {
              throw new Error(`Sub2API user readback mismatch for account ${hash(target.accountId).slice(0, 12)}.`);
            }
            matched.push({ ...target, remoteId: remote.id, remoteStatus: remote.status });
          }
          if (new Set(matched.map((item) => item.remoteId)).size !== matched.length) {
            throw new Error("Two local accounts resolve to the same Sub2API wallet.");
          }
          fs.writeFileSync(process.env.OPL_MATCHED_MANIFEST, JSON.stringify(matched), { mode: 0o600 });
          for (const item of matched) {
            console.log(`mapping account=${hash(item.accountId).slice(0, 12)} email=${hash(item.normalizedEmail).slice(0, 12)} status=${item.remoteStatus}`);
          }
          console.log(`sub2apiGetCount=${getCount} sub2apiWriteCount=0 matched=${matched.length}`);
          NODE
          chmod 600 "$matched_manifest"
          matched_sha256="$(sha256sum "$matched_manifest" | cut -d ' ' -f 1)"
          printf 'matchedManifestSha256=%s\n' "$matched_sha256"

      - name: Apply roll-forward image and capture diagnostics
        shell: bash
        run: |
          set -uo pipefail
          mode="${{ inputs.roll_forward_mode }}"
          repair_requested="${{ inputs.repair_postgres_transport }}"
          reset_requested="${{ inputs.reset_prelaunch_control_plane_data }}"
          if [ "${{ inputs.diagnostics_only }}" = "true" ]; then
            echo "diagnostics_only and roll_forward_mode are mutually exclusive." >&2
            exit 1
          fi
          if [ "$reset_requested" = "true" ] && { \
            [ "$mode" != "control-plane" ] || \
            [ "${{ inputs.inspect_primary_workspace_conflict }}" != "true" ] || \
            [ "${{ inputs.repair_postgres_transport }}" = "true" ] || \
            [ "${{ inputs.repair_primary_workspace_conflict }}" = "true" ] || \
            [ "${{ inputs.inspect_customer_identity_hard_cut }}" = "true" ] || \
            [ -z "${OPL_POSTGRES_RECOVERY_POD:-}" ]; }; then
            echo "Refusing prelaunch reset rollout without the verified same-run backup client and exclusive reset inputs." >&2
            exit 1
          fi

          deployment_image() {
            local deployment="$1"
            local container="$2"
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get "deployment/$deployment" \
              -o "jsonpath={.spec.template.spec.containers[?(@.name=='$container')].image}"
          }

          candidate_pod() {
            local component="$1"
            local container="$2"
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get pods \
              -l "app.kubernetes.io/name=opl-cloud,app.kubernetes.io/component=$component" \
              --sort-by=.metadata.creationTimestamp \
              -o "jsonpath={range .items[*]}{.metadata.name}{'\t'}{.spec.containers[?(@.name=='$container')].image}{'\n'}{end}" \
              | awk -F '\t' -v expected="$OPL_CANDIDATE_IMAGE" '$2 == expected { print $1 }' \
              | tail -n 1
          }

          pod_status() {
            local pod="$1"
            local container="$2"
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get "pod/$pod" \
              -o "jsonpath={range .status.containerStatuses[?(@.name=='$container')]}{.ready}{'\t'}{.restartCount}{'\t'}{.imageID}{end}"
          }

          wait_for_candidate_pod() {
            local component="$1"
            local container="$2"
            local previous_pod="${3:-}"
            local pod=""
            local status=""
            local ready=""
            local restarts="0"
            local image_id=""
            local attempt
            for attempt in $(seq 1 60); do
              pod="$(candidate_pod "$component" "$container")"
              if [ -n "$pod" ] && [ "$pod" != "$previous_pod" ]; then
                status="$(pod_status "$pod" "$container")"
                IFS=$'\t' read -r ready restarts image_id <<< "$status"
                restarts="${restarts:-0}"
                if [ "$ready" = "true" ] || { [ "$reset_requested" != "true" ] && [ "$repair_requested" != "true" ] && [ "$restarts" -gt 0 ]; }; then
                  printf '%s' "$pod"
                  return 0
                fi
              fi
              sleep 5
            done
            [ -n "$pod" ] && printf '%s' "$pod"
            return 1
          }

          show_pod() {
            local component="$1"
            local container="$2"
            local pod="$3"
            echo "=== $component pod/imageID ==="
            if [ -z "$pod" ]; then
              echo "No candidate pod found for $component." >&2
              kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get pods \
                -l "app.kubernetes.io/name=opl-cloud,app.kubernetes.io/component=$component" -o wide || true
              return 1
            fi
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get "pod/$pod" \
              -o "jsonpath={.metadata.name}{'\t'}{.status.phase}{'\t'}{range .status.containerStatuses[?(@.name=='$container')]}{.ready}{'\t'}{.restartCount}{'\t'}{.imageID}{end}{'\n'}" || true
            echo "=== $component describe ==="
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" describe "pod/$pod" || true
            echo "=== $component current logs ==="
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" logs "pod/$pod" -c "$container" --timestamps --tail=400 || true
            echo "=== $component previous logs ==="
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" logs "pod/$pod" -c "$container" --previous --timestamps --tail=400 || true
          }

          candidate_ready() {
            local deployment="$1"
            local component="$2"
            local container="$3"
            local pod="$4"
            local image=""
            local deployment_status=""
            local generation=""
            local observed=""
            local desired=""
            local updated=""
            local ready_replicas=""
            local available=""
            local status=""
            local ready=""
            local restarts=""
            local image_id=""
            image="$(deployment_image "$deployment" "$container")"
            deployment_status="$(kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get "deployment/$deployment" \
              -o jsonpath="{.metadata.generation}{'\t'}{.status.observedGeneration}{'\t'}{.spec.replicas}{'\t'}{.status.updatedReplicas}{'\t'}{.status.readyReplicas}{'\t'}{.status.availableReplicas}")"
            IFS=$'\t' read -r generation observed desired updated ready_replicas available <<< "$deployment_status"
            [ -n "$pod" ] && status="$(pod_status "$pod" "$container")"
            IFS=$'\t' read -r ready restarts image_id <<< "$status"
            [ "$image" = "$OPL_CANDIDATE_IMAGE" ] \
              && [ "$generation" = "$observed" ] \
              && [ "$desired" = "1" ] \
              && [ "$updated" = "$desired" ] \
              && [ "$ready_replicas" = "$desired" ] \
              && [ "$available" = "1" ] \
              && [ "$ready" = "true" ] \
              && [[ "$image_id" == *"@${OPL_CANDIDATE_IMAGE##*@}" ]]
          }

          if [ "$mode" = "control-plane" ]; then
            if [ "$reset_requested" = "true" ]; then
              pod="$(candidate_pod control-plane control-plane)"
            else
              previous_pod="$(candidate_pod control-plane control-plane)"
              kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" set image \
                deployment/opl-cloud-control-plane "control-plane=$OPL_CANDIDATE_IMAGE"
              kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" rollout restart \
                deployment/opl-cloud-control-plane
              pod=""
              wait_for_candidate_pod control-plane control-plane "$previous_pod" > "$RUNNER_TEMP/opl-control-plane-pod" || true
              pod="$(tr -d '\r\n' < "$RUNNER_TEMP/opl-control-plane-pod")"
            fi
            show_pod control-plane control-plane "$pod" || true
            if ! candidate_ready opl-cloud-control-plane control-plane control-plane "$pod"; then
              echo "Candidate Control Plane is not Ready; Pod retained for recovery." >&2
              exit 1
            fi
            echo "Candidate Control Plane is Ready."
            if [ "$reset_requested" != "true" ]; then
              exit 0
            fi

            postgres_client_pod="${OPL_POSTGRES_RECOVERY_POD:-}"
            if [ -z "$postgres_client_pod" ]; then
              echo "Candidate verification is missing the same-run PostgreSQL client." >&2
              exit 1
            fi
            if ! kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" exec --stdin "$postgres_client_pod" \
              -c postgres-client -- /bin/bash -seu <<'VERIFY_DATABASE'; then
          DATABASE_URL="$(cat /work/database-url)"
          migration_journal="$(psql "$DATABASE_URL" -X --set ON_ERROR_STOP=1 --tuples-only --no-align <<'SQL'
          SELECT coalesce(string_agg(version || '=' || occurrences, ',' ORDER BY version), '')
          FROM (
            SELECT version, count(*) AS occurrences
            FROM opl_schema_migrations
            WHERE service = 'control-plane'
              AND version >= '202607180001_customer_identity_hard_cut'
            GROUP BY version
          ) journal;
          SQL
          )"
          migration_journal="$(printf '%s' "$migration_journal" | tr -d '[:space:]')"
          expected_journal="202607180001_customer_identity_hard_cut=1,202607190001_workspace_api_key_id=1,202607190002_pilot_announcements=1"
          if [ "$migration_journal" != "$expected_journal" ]; then
