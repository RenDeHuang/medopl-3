            ('ws_1783740622365687039', 'pi-production-verifier'),
            ('ws_1783741739835468962', 'pi-production-verifier'),
            ('ws_1783742074687487075', 'pi-production-verifier'),
            ('ws_1783747539564739331', 'pi-production-verifier'),
            ('ws_1783748403084166567', 'pi-production-verifier'),
            ('ws_1783748886405156667', 'pi-production-verifier'),
            ('ws_1783809813667683135', 'pi-production-verifier');

          DO $repair$
          DECLARE
            expected_workspace_count CONSTANT INTEGER := 34;
            current_workspace_count INTEGER;
            archived_workspace_count INTEGER;
            deleted_workspace_count INTEGER;
            inserted_archive_count INTEGER;
            duplicate_count INTEGER;
            resource_reference_count INTEGER;
          BEGIN
            IF (SELECT count(*) FROM opl_primary_workspace_repair_ids) <> expected_workspace_count THEN
              RAISE EXCEPTION 'primary Workspace repair ID set mismatch';
            END IF;

            PERFORM workspaces.id
            FROM control_plane_workspaces workspaces
            JOIN opl_primary_workspace_repair_ids repair ON repair.id = workspaces.id
            FOR UPDATE;

            SELECT count(*) INTO current_workspace_count
            FROM control_plane_workspaces workspaces
            JOIN opl_primary_workspace_repair_ids repair ON repair.id = workspaces.id;
            SELECT count(*) INTO archived_workspace_count
            FROM control_plane_archived_workspaces archived
            JOIN opl_primary_workspace_repair_ids repair
              ON archived.id = 'archived-workspace-' || repair.id
             AND archived.workspace_id = repair.id
             AND archived.resource_id = repair.id
             AND archived.resource_kind = 'workspace'
             AND archived.account_id = repair.account_id
             AND archived.status = 'data_deleted';

            IF current_workspace_count = 0 AND archived_workspace_count = expected_workspace_count THEN
              SELECT count(*) INTO duplicate_count
              FROM (
                SELECT COALESCE(NULLIF(account_id, ''), owner_account_id)
                FROM control_plane_workspaces
                WHERE COALESCE(NULLIF(account_id, ''), owner_account_id) <> ''
                GROUP BY COALESCE(NULLIF(account_id, ''), owner_account_id)
                HAVING count(*) > 1
              ) duplicates;
              IF duplicate_count <> 0 THEN
                RAISE EXCEPTION 'primary Workspace repair replay found % duplicate accounts', duplicate_count;
              END IF;
              RAISE NOTICE 'workspaceArchived=34 deleted=34 duplicate_count=0 already_applied=true';
              RETURN;
            END IF;
            IF current_workspace_count <> expected_workspace_count OR archived_workspace_count <> 0 THEN
              RAISE EXCEPTION 'primary Workspace repair state mismatch: current %, archived %', current_workspace_count, archived_workspace_count;
            END IF;
            IF EXISTS (
              SELECT 1
              FROM control_plane_workspaces workspaces
              JOIN opl_primary_workspace_repair_ids repair ON repair.id = workspaces.id
              WHERE COALESCE(NULLIF(workspaces.account_id, ''), workspaces.owner_account_id) <> repair.account_id
                 OR workspaces.state <> 'data_deleted'
                 OR workspaces.status <> 'unrecoverable'
            ) THEN
              RAISE EXCEPTION 'primary Workspace repair candidate identity or terminal state changed';
            END IF;
            IF EXISTS (
              SELECT 1
              FROM control_plane_workspaces workspaces
              WHERE COALESCE(NULLIF(workspaces.account_id, ''), workspaces.owner_account_id) IN ('acct-production-owner', 'pi-production-verifier')
                AND NOT EXISTS (SELECT 1 FROM opl_primary_workspace_repair_ids repair WHERE repair.id = workspaces.id)
            ) THEN
              RAISE EXCEPTION 'primary Workspace repair found an unapproved Workspace for a target account';
            END IF;

            SELECT
              (SELECT count(*) FROM control_plane_compute_allocations resources JOIN opl_primary_workspace_repair_ids repair ON repair.id = resources.workspace_id)
              + (SELECT count(*) FROM control_plane_storage_volumes resources JOIN opl_primary_workspace_repair_ids repair ON repair.id = resources.workspace_id)
              + (SELECT count(*) FROM control_plane_storage_attachments resources JOIN opl_primary_workspace_repair_ids repair ON repair.id = resources.workspace_id)
            INTO resource_reference_count;
            IF resource_reference_count <> 0 THEN
              RAISE EXCEPTION 'primary Workspace repair found % current Fabric resource references', resource_reference_count;
            END IF;

            INSERT INTO control_plane_archived_workspaces (
              id, created_at, updated_at, account_id, workspace_id, resource_id,
              resource_kind, name, status, reason, archived_at
            )
            SELECT
              'archived-workspace-' || workspaces.id,
              CURRENT_TIMESTAMP,
              CURRENT_TIMESTAMP,
              repair.account_id,
              workspaces.id,
              workspaces.id,
              'workspace',
              workspaces.name,
              workspaces.state,
              'roll_forward_primary_workspace_conflict_20260721',
              CURRENT_TIMESTAMP
            FROM control_plane_workspaces workspaces
            JOIN opl_primary_workspace_repair_ids repair ON repair.id = workspaces.id;
            GET DIAGNOSTICS inserted_archive_count = ROW_COUNT;
            IF inserted_archive_count <> expected_workspace_count THEN
              RAISE EXCEPTION 'primary Workspace archive count mismatch: %', inserted_archive_count;
            END IF;

            DELETE FROM control_plane_workspaces workspaces
            USING opl_primary_workspace_repair_ids repair
            WHERE workspaces.id = repair.id;
            GET DIAGNOSTICS deleted_workspace_count = ROW_COUNT;
            IF deleted_workspace_count <> expected_workspace_count THEN
              RAISE EXCEPTION 'primary Workspace delete count mismatch: %', deleted_workspace_count;
            END IF;

            SELECT count(*) INTO archived_workspace_count
            FROM control_plane_archived_workspaces archived
            JOIN opl_primary_workspace_repair_ids repair
              ON archived.id = 'archived-workspace-' || repair.id
             AND archived.workspace_id = repair.id
             AND archived.resource_id = repair.id
             AND archived.resource_kind = 'workspace'
             AND archived.account_id = repair.account_id
             AND archived.status = 'data_deleted';
            SELECT count(*) INTO duplicate_count
            FROM (
              SELECT COALESCE(NULLIF(account_id, ''), owner_account_id)
              FROM control_plane_workspaces
              WHERE COALESCE(NULLIF(account_id, ''), owner_account_id) <> ''
              GROUP BY COALESCE(NULLIF(account_id, ''), owner_account_id)
              HAVING count(*) > 1
            ) duplicates;
            IF archived_workspace_count <> expected_workspace_count OR duplicate_count <> 0 THEN
              RAISE EXCEPTION 'primary Workspace repair readback mismatch: archived %, duplicate_count %', archived_workspace_count, duplicate_count;
            END IF;
            RAISE NOTICE 'workspaceArchived=34 deleted=34 duplicate_count=0 already_applied=false';
          END
          $repair$;
          COMMIT;
          SQL

      - name: Apply roll-forward image and capture diagnostics
        shell: bash
        run: |
          set -uo pipefail
          mode="${{ inputs.roll_forward_mode }}"
          repair_requested="${{ inputs.repair_postgres_transport }}"
          if [ "${{ inputs.diagnostics_only }}" = "true" ]; then
            echo "diagnostics_only and roll_forward_mode are mutually exclusive." >&2
            exit 1
          fi

          deployment_image() {
            local deployment="$1"
            local container="$2"
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get "deployment/$deployment" \
              -o "jsonpath={.spec.template.spec.containers[?(@.name=='$container')].image}"
          }

          candidate_pod() {
            local component="$1"
            local container="$2"
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get pods \
              -l "app.kubernetes.io/name=opl-cloud,app.kubernetes.io/component=$component" \
              --sort-by=.metadata.creationTimestamp \
              -o "jsonpath={range .items[*]}{.metadata.name}{'\t'}{.spec.containers[?(@.name=='$container')].image}{'\n'}{end}" \
              | awk -F '\t' -v expected="$OPL_CANDIDATE_IMAGE" '$2 == expected { print $1 }' \
              | tail -n 1
          }

          pod_status() {
            local pod="$1"
            local container="$2"
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get "pod/$pod" \
              -o "jsonpath={range .status.containerStatuses[?(@.name=='$container')]}{.ready}{'\t'}{.restartCount}{'\t'}{.imageID}{end}"
          }

          wait_for_candidate_pod() {
            local component="$1"
            local container="$2"
            local pod=""
            local status=""
            local ready=""
            local restarts="0"
            local image_id=""
            local attempt
            for attempt in $(seq 1 60); do
              pod="$(candidate_pod "$component" "$container")"
              if [ -n "$pod" ]; then
                status="$(pod_status "$pod" "$container")"
                IFS=$'\t' read -r ready restarts image_id <<< "$status"
                restarts="${restarts:-0}"
                if [ "$ready" = "true" ] || { [ "$repair_requested" != "true" ] && [ "$restarts" -gt 0 ]; }; then
                  printf '%s' "$pod"
                  return 0
                fi
              fi
              sleep 5
            done
            [ -n "$pod" ] && printf '%s' "$pod"
            return 1
          }

          show_pod() {
            local component="$1"
            local container="$2"
            local pod="$3"
            echo "=== $component pod/imageID ==="
            if [ -z "$pod" ]; then
              echo "No candidate pod found for $component." >&2
              kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get pods \
                -l "app.kubernetes.io/name=opl-cloud,app.kubernetes.io/component=$component" -o wide || true
              return 1
            fi
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get "pod/$pod" \
              -o "jsonpath={.metadata.name}{'\t'}{.status.phase}{'\t'}{range .status.containerStatuses[?(@.name=='$container')]}{.ready}{'\t'}{.restartCount}{'\t'}{.imageID}{end}{'\n'}" || true
            echo "=== $component describe ==="
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" describe "pod/$pod" || true
            echo "=== $component current logs ==="
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" logs "pod/$pod" -c "$container" --timestamps --tail=400 || true
            echo "=== $component previous logs ==="
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" logs "pod/$pod" -c "$container" --previous --timestamps --tail=400 || true
          }

          candidate_ready() {
            local deployment="$1"
            local component="$2"
            local container="$3"
            local pod="$4"
            local image=""
            local available=""
            local status=""
            local ready=""
            local restarts=""
            local image_id=""
            image="$(deployment_image "$deployment" "$container")"
            available="$(kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get "deployment/$deployment" -o jsonpath='{.status.availableReplicas}')"
            [ -n "$pod" ] && status="$(pod_status "$pod" "$container")"
            IFS=$'\t' read -r ready restarts image_id <<< "$status"
            [ "$image" = "$OPL_CANDIDATE_IMAGE" ] \
              && [ "$available" = "1" ] \
              && [ "$ready" = "true" ] \
              && [[ "$image_id" == *"@${OPL_CANDIDATE_IMAGE##*@}" ]]
          }

          if [ "$mode" = "control-plane" ]; then
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" set image \
              deployment/opl-cloud-control-plane "control-plane=$OPL_CANDIDATE_IMAGE"
            pod=""
            wait_for_candidate_pod control-plane control-plane > "$RUNNER_TEMP/opl-control-plane-pod" || true
            pod="$(tr -d '\r\n' < "$RUNNER_TEMP/opl-control-plane-pod")"
            show_pod control-plane control-plane "$pod" || true
            if ! candidate_ready opl-cloud-control-plane control-plane control-plane "$pod"; then
              echo "Candidate Control Plane is not Ready; Pod retained for recovery." >&2
              exit 1
            fi
            echo "Candidate Control Plane is Ready."
            exit 0
          fi

          if [ "$mode" != "all-cloud" ]; then
            echo "Unsupported roll-forward mode: $mode" >&2
            exit 1
          fi

          control_plane_pod="$(candidate_pod control-plane control-plane)"
          if ! candidate_ready opl-cloud-control-plane control-plane control-plane "$control_plane_pod"; then
            show_pod control-plane control-plane "$control_plane_pod" || true
            echo "Refusing to promote Ledger/Fabric before candidate Control Plane is Ready." >&2
            exit 1
          fi

          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" set image \
            deployment/opl-cloud-ledger "ledger=$OPL_CANDIDATE_IMAGE"
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" set image \
            deployment/opl-cloud-fabric "fabric=$OPL_CANDIDATE_IMAGE"

          failed=0
          for deployment in opl-cloud-control-plane opl-cloud-ledger opl-cloud-fabric; do
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" rollout status \
              "deployment/$deployment" --timeout=300s || failed=1
          done

          for item in "control-plane:control-plane:opl-cloud-control-plane" "ledger:ledger:opl-cloud-ledger" "fabric:fabric:opl-cloud-fabric"; do
            component="${item%%:*}"
            rest="${item#*:}"
            container="${rest%%:*}"
            deployment="${rest#*:}"
            pod="$(candidate_pod "$component" "$container")"
            show_pod "$component" "$container" "$pod" || failed=1
            candidate_ready "$deployment" "$component" "$container" "$pod" || failed=1
          done

          for path in healthz readyz login; do
            body="$(curl --fail --silent --show-error --max-time 30 "${OPL_PUBLIC_URL%/}/$path")" || failed=1
            if [ -z "${body:-}" ]; then
              echo "$path returned an empty body." >&2
              failed=1
            else
              printf '%s bytes=%s\n' "$path" "${#body}"
            fi
          done
          exit "$failed"

      - name: Remove recovery kubeconfig
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          secret_dir="${OPL_RECOVERY_SECRET_DIR:-}"
          if [ -z "$secret_dir" ]; then
            exit 0
          fi
          case "$secret_dir" in
            "$RUNNER_TEMP"/*|/tmp/*) ;;
            *) echo "Refusing to remove unexpected recovery path." >&2; exit 1 ;;
          esac
          if [ -d "$secret_dir" ]; then
            find "$secret_dir" -mindepth 1 -delete
            rmdir "$secret_dir"
          fi

  deploy:
    name: Deploy OPL Cloud to TKE
    if: ${{ !inputs.diagnostics_only && inputs.roll_forward_mode == 'none' }}
    runs-on: [self-hosted, tencent-cloud, opl-cloud, tke-vpc]
    environment: production
    outputs:
      rollback_image_set: ${{ steps.rollback_snapshot.outputs.artifact-id }}
    env:
      OPL_RUNTIME_PROVIDER: tencent-tke
      OPL_K8S_NAMESPACE: ${{ vars.OPL_K8S_NAMESPACE || 'opl-cloud' }}
      OPL_PUBLIC_URL: ${{ vars.OPL_PUBLIC_URL || 'https://cloud.medopl.cn' }}
      OPL_CONSOLE_DOMAIN: ${{ vars.OPL_CONSOLE_DOMAIN || 'cloud.medopl.cn' }}
      OPL_WORKSPACE_DOMAIN: ${{ vars.OPL_WORKSPACE_DOMAIN || 'workspace.medopl.cn' }}
      OPL_CLOUD_IMAGE: ${{ inputs.cloud_image }}
      OPL_WORKSPACE_IMAGE: ${{ inputs.workspace_image }}
      OPL_EXERCISE_ROLLBACK: ${{ inputs.exercise_rollback }}
      OPL_BOOTSTRAP_MODE: ${{ inputs.bootstrap_mode }}
      OPL_IMAGE_PULL_SECRET_NAME: ${{ vars.OPL_IMAGE_PULL_SECRET_NAME || 'tcr-pull-secret' }}
      OPL_WORKSPACE_STORAGE_CLASS: ${{ vars.OPL_WORKSPACE_STORAGE_CLASS || 'cbs' }}
      OPL_TENCENT_PROVISIONER_BIN: ${{ vars.OPL_TENCENT_PROVISIONER_BIN || '/usr/local/bin/opl-tencent-provisioner' }}
      OPL_TENCENT_ZONE: ${{ vars.OPL_TENCENT_ZONE || 'na-siliconvalley-1' }}
      OPL_CONSOLE_TLS_SECRET_NAME: ${{ vars.OPL_CONSOLE_TLS_SECRET_NAME || 'opl-cloud-console-medopl-cn-tls' }}
      OPL_WORKSPACE_TLS_SECRET_NAME: ${{ vars.OPL_WORKSPACE_TLS_SECRET_NAME || 'opl-cloud-workspace-medopl-cn-tls' }}
      OPL_TLS_SOURCE_NAMESPACE: ${{ vars.OPL_TLS_SOURCE_NAMESPACE || '' }}
      OPL_TLS_SOURCE_SECRET_NAME: ${{ vars.OPL_TLS_SOURCE_SECRET_NAME || '' }}
      OPL_INGRESS_CLASS: ${{ vars.OPL_INGRESS_CLASS || 'qcloud' }}
      OPL_WORKSPACE_WEBUI_PORT: ${{ vars.OPL_WORKSPACE_WEBUI_PORT || '3000' }}
      OPL_WORKSPACE_DATA_DIR: ${{ vars.OPL_WORKSPACE_DATA_DIR || '/data' }}
      OPL_WORKSPACE_PROJECTS_DIR: ${{ vars.OPL_WORKSPACE_PROJECTS_DIR || '/projects' }}
      OPL_MONTHLY_BILLING_WORKER_ENABLED: ${{ inputs.bootstrap_mode && '0' || vars.OPL_MONTHLY_BILLING_WORKER_ENABLED || '1' }}
      OPL_MONTHLY_BILLING_INTERVAL_MS: ${{ vars.OPL_MONTHLY_BILLING_INTERVAL_MS || '3600000' }}
      OPL_BASIC_COMPUTE_INSTANCE_TYPE: ${{ vars.OPL_BASIC_COMPUTE_INSTANCE_TYPE }}
      OPL_PRO_COMPUTE_INSTANCE_TYPE: ${{ vars.OPL_PRO_COMPUTE_INSTANCE_TYPE || 'SA5.2XLARGE16' }}
      OPL_CODEX_MODEL: ${{ vars.OPL_CODEX_MODEL || 'gpt-5.5' }}
      OPL_CODEX_REASONING_EFFORT: ${{ vars.OPL_CODEX_REASONING_EFFORT || 'xhigh' }}
      OPL_SUB2API_BASE_URL: ${{ vars.OPL_SUB2API_BASE_URL || 'https://gflabtoken.cn' }}
      OPL_SUB2API_REQUEST_TIMEOUT_MS: ${{ vars.OPL_SUB2API_REQUEST_TIMEOUT_MS || '5000' }}
      TENCENTCLOUD_SECRET_ID: ${{ secrets.TENCENT_MUTATION_SECRET_ID }}
      TENCENTCLOUD_SECRET_KEY: ${{ secrets.TENCENT_MUTATION_SECRET_KEY }}
      TENCENTCLOUD_REGION: ${{ vars.TENCENTCLOUD_REGION || 'na-siliconvalley' }}
      TENCENT_DEPLOY_CLUSTER_ID: ${{ vars.TENCENT_DEPLOY_CLUSTER_ID }}
      TENCENT_CVM_SUBNET_ID: ${{ vars.TENCENT_CVM_SUBNET_ID }}
      TENCENT_CVM_SECURITY_GROUP_IDS: ${{ vars.TENCENT_CVM_SECURITY_GROUP_IDS }}
      TENCENT_CVM_SYSTEM_DISK_TYPE: ${{ vars.TENCENT_CVM_SYSTEM_DISK_TYPE || 'CLOUD_BSSD' }}
      TENCENT_CVM_SYSTEM_DISK_SIZE_GB: ${{ vars.TENCENT_CVM_SYSTEM_DISK_SIZE_GB || '50' }}
