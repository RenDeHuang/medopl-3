name: Cleanup TKE Compute Residual

on:
  workflow_dispatch:
    inputs:
      compute_allocation_id:
        description: ComputeAllocation id to clean, for example compute-lh251t.
        required: true
        type: string
      dry_run:
        description: Show targeted resources without deleting them.
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

concurrency:
  group: production-resource-verification
  cancel-in-progress: false

jobs:
  cleanup:
    name: Cleanup one residual compute runtime
    runs-on: [self-hosted, tencent-cloud, opl-cloud, tke-vpc]
    environment: production
    env:
      OPL_K8S_NAMESPACE: ${{ vars.OPL_K8S_NAMESPACE || 'opl-cloud' }}
      TENCENT_DEPLOY_KUBECONFIG_PATH: ${{ vars.TENCENT_DEPLOY_KUBECONFIG_PATH || '/home/actions/.secrets/medopl/v22/kubeconfig-package-d-deploy' }}
      TENCENT_DEPLOY_KUBECONFIG_B64: ${{ secrets.TENCENT_DEPLOY_KUBECONFIG_B64 }}
      TENCENT_DEPLOY_KUBECONFIG: ${{ secrets.TENCENT_DEPLOY_KUBECONFIG }}
      COMPUTE_ALLOCATION_ID: ${{ inputs.compute_allocation_id }}
      DRY_RUN: ${{ inputs.dry_run }}

    steps:
      - name: Prepare kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          secret_dir="$(mktemp -d)"
          chmod 700 "$secret_dir"
          kubeconfig="$secret_dir/kubeconfig"
          if [ -f "$TENCENT_DEPLOY_KUBECONFIG_PATH" ]; then
            cp "$TENCENT_DEPLOY_KUBECONFIG_PATH" "$kubeconfig"
          elif [ -n "${TENCENT_DEPLOY_KUBECONFIG_B64:-}" ]; then
            printf '%s' "$TENCENT_DEPLOY_KUBECONFIG_B64" | base64 -d > "$kubeconfig"
          elif [ -n "${TENCENT_DEPLOY_KUBECONFIG:-}" ]; then
            printf '%s' "$TENCENT_DEPLOY_KUBECONFIG" > "$kubeconfig"
          else
            echo "No deploy kubeconfig was provided." >&2
            exit 1
          fi
          chmod 600 "$kubeconfig"
          echo "KUBECONFIG=$kubeconfig" >> "$GITHUB_ENV"

      - name: Validate target
        shell: bash
        run: |
          set -euo pipefail
          if ! printf '%s' "$COMPUTE_ALLOCATION_ID" | grep -Eq '^compute-[a-z0-9-]+$'; then
            echo "compute_allocation_id must match ^compute-[a-z0-9-]+$" >&2
            exit 1
          fi
          echo "K8S_RUNTIME_NAME=opl-${COMPUTE_ALLOCATION_ID}" >> "$GITHUB_ENV"

      - name: Show targeted resources
        shell: bash
        run: |
          set -euo pipefail
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get \
            deploy,rs,pod,svc,secret \
            -l "oplcloud.cn/compute-allocation-id=${COMPUTE_ALLOCATION_ID}" \
            -o wide

      - name: Delete residual runtime resources
        if: ${{ inputs.dry_run == 'false' }}
        shell: bash
        run: |
          set -euo pipefail
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" delete \
            "deployment/${K8S_RUNTIME_NAME}" \
            "service/${K8S_RUNTIME_NAME}" \
            "secret/${K8S_RUNTIME_NAME}-env" \
            --ignore-not-found=true
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" delete \
            rs,pod \
            -l "oplcloud.cn/compute-allocation-id=${COMPUTE_ALLOCATION_ID}" \
            --ignore-not-found=true

      - name: Show remaining targeted resources
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get \
            deploy,rs,pod,svc,secret \
            -l "oplcloud.cn/compute-allocation-id=${COMPUTE_ALLOCATION_ID}" \
            -o wide || true
