name: Release OPL Cloud Image

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Exact 40-character OPL Cloud commit already merged into this repository's main.
        required: true
        type: string
      image_tag:
        description: Optional image tag. Defaults to the checked out short commit SHA.
        required: false
        type: string
      publish_cloud_image:
        description: Build and push the OPL Cloud control-plane image.
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      publish_workspace_image:
        description: Build and push the Workspace image from exact App, active-shell, and Framework main commits.
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      workspace_app_main_sha:
        description: Exact 40-character one-person-lab-app commit already merged into main.
        required: false
        type: string
      workspace_shell_main_sha:
        description: Exact 40-character opl-aion-shell commit already merged into main.
        required: false
        type: string
      workspace_framework_main_sha:
        description: Exact 40-character one-person-lab Framework commit already merged into main.
        required: false
        type: string

permissions:
  contents: read

jobs:
  build-push:
    name: Build and Push OPL Cloud Images
    runs-on: ubuntu-latest
    environment: production
    outputs:
      cloud_image: ${{ steps.images.outputs.cloud_image }}
      workspace_image: ${{ steps.images.outputs.workspace_image }}
    env:
      OPL_CLOUD_IMAGE_CONTEXT: .
      OPL_CLOUD_IMAGE_DOCKERFILE: Dockerfile
      OPL_CLOUD_IMAGE_REPOSITORY: uswccr.ccs.tencentyun.com/oplcloud/opl-cloud
      OPL_CLOUD_SOURCE_REPOSITORY: ${{ github.repository }}
      OPL_WORKSPACE_IMAGE_REPOSITORY: uswccr.ccs.tencentyun.com/oplcloud/one-person-lab-app
      REQUESTED_CLOUD_SHA: ${{ inputs.ref }}
      REQUESTED_IMAGE_TAG: ${{ inputs.image_tag }}
      REQUESTED_WORKSPACE_APP_SHA: ${{ inputs.workspace_app_main_sha }}
      REQUESTED_WORKSPACE_SHELL_SHA: ${{ inputs.workspace_shell_main_sha }}
      REQUESTED_WORKSPACE_FRAMEWORK_SHA: ${{ inputs.workspace_framework_main_sha }}
      PUBLISH_CLOUD_IMAGE: ${{ inputs.publish_cloud_image }}
      PUBLISH_WORKSPACE_IMAGE: ${{ inputs.publish_workspace_image }}
      TCR_ID: ${{ secrets.TCR_USERNAME }}
      TCR_SECRET: ${{ secrets.TCR_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Verify Cloud source
        shell: bash
        run: |
          set -euo pipefail
          if ! printf '%s' "$REQUESTED_CLOUD_SHA" | grep -Eq '^[0-9a-fA-F]{40}$'; then
            echo "ref must be a full 40-character OPL Cloud Git SHA." >&2
            exit 1
          fi
          cloud_candidate_sha="$(printf '%s' "$REQUESTED_CLOUD_SHA" | tr '[:upper:]' '[:lower:]')"
          cloud_head_sha="$(git rev-parse HEAD)"
          if [ "$cloud_head_sha" != "$cloud_candidate_sha" ]; then
            echo "Checked-out OPL Cloud HEAD does not match ref." >&2
            exit 1
          fi
          git fetch --no-tags "https://github.com/${OPL_CLOUD_SOURCE_REPOSITORY}.git" main:refs/remotes/release-source/main
          cloud_main_sha="$(git rev-parse refs/remotes/release-source/main)"
          if ! printf '%s' "$cloud_main_sha" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "Workflow repository main readback failed." >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "$cloud_head_sha" "$cloud_main_sha"; then
            echo "OPL Cloud candidate is not merged into this workflow repository's main." >&2
            exit 1
          fi
          echo "OPL_CLOUD_SHA=${cloud_head_sha}" >> "$GITHUB_ENV"

      - name: Image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [ "$PUBLISH_CLOUD_IMAGE" = "true" ]; then
            short_sha="${OPL_CLOUD_SHA::12}"
            image_tag="$REQUESTED_IMAGE_TAG"
            if [ -z "$image_tag" ]; then
              image_tag="$short_sha"
            fi
            if ! printf '%s' "$image_tag" | grep -Eq '^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$'; then
              echo "image_tag is outside the allowed container tag format." >&2
              exit 1
            fi
            if [ "$image_tag" = "latest" ] || [ "$image_tag" = "stable" ]; then
              echo "Mutable production image tags are forbidden." >&2
              exit 1
            fi
            image="${OPL_CLOUD_IMAGE_REPOSITORY}:${image_tag}"
            echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
            echo "image=${image}" >> "$GITHUB_OUTPUT"
            echo "OPL_CLOUD_IMAGE_REF=${image}" >> "$GITHUB_ENV"
          fi
          if [ "$PUBLISH_WORKSPACE_IMAGE" = "true" ]; then
            if ! printf '%s' "$REQUESTED_WORKSPACE_APP_SHA" | grep -Eq '^[0-9a-fA-F]{40}$'; then
              echo "workspace_app_main_sha must be a full 40-character Git SHA." >&2
              exit 1
            fi
            if ! printf '%s' "$REQUESTED_WORKSPACE_SHELL_SHA" | grep -Eq '^[0-9a-fA-F]{40}$'; then
              echo "workspace_shell_main_sha must be a full 40-character Git SHA." >&2
              exit 1
            fi
            if ! printf '%s' "$REQUESTED_WORKSPACE_FRAMEWORK_SHA" | grep -Eq '^[0-9a-fA-F]{40}$'; then
              echo "workspace_framework_main_sha must be a full 40-character Git SHA." >&2
              exit 1
            fi
            workspace_app_sha="$(printf '%s' "$REQUESTED_WORKSPACE_APP_SHA" | tr '[:upper:]' '[:lower:]')"
            workspace_shell_sha="$(printf '%s' "$REQUESTED_WORKSPACE_SHELL_SHA" | tr '[:upper:]' '[:lower:]')"
            workspace_framework_sha="$(printf '%s' "$REQUESTED_WORKSPACE_FRAMEWORK_SHA" | tr '[:upper:]' '[:lower:]')"
            workspace_image_tag="${workspace_app_sha:0:12}-${workspace_shell_sha:0:12}-${workspace_framework_sha:0:12}"
            workspace_image="${OPL_WORKSPACE_IMAGE_REPOSITORY}:${workspace_image_tag}"
            echo "workspace_image_tag=${workspace_image_tag}" >> "$GITHUB_OUTPUT"
            echo "workspace_image=${workspace_image}" >> "$GITHUB_OUTPUT"
            echo "OPL_WORKSPACE_IMAGE_REF=${workspace_image}" >> "$GITHUB_ENV"
            echo "OPL_WORKSPACE_APP_SHA=${workspace_app_sha}" >> "$GITHUB_ENV"
            echo "OPL_WORKSPACE_SHELL_SHA=${workspace_shell_sha}" >> "$GITHUB_ENV"
            echo "OPL_WORKSPACE_FRAMEWORK_SHA=${workspace_framework_sha}" >> "$GITHUB_ENV"
          fi

      - name: Set up Node
        if: ${{ inputs.publish_workspace_image == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Prepare Workspace App source
        if: ${{ inputs.publish_workspace_image == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          workspace_root="${RUNNER_TEMP}/one-person-lab-app"
          shell_root="${workspace_root}/shells/aionui"
          framework_root="${RUNNER_TEMP}/one-person-lab-framework"
          git clone --filter=blob:none --single-branch --branch main \
            https://github.com/gaofeng21cn/one-person-lab-app.git "$workspace_root"
          if ! git -C "$workspace_root" merge-base --is-ancestor "$OPL_WORKSPACE_APP_SHA" origin/main; then
            echo "Workspace App candidate is not merged into main." >&2
            exit 1
          fi
          git -C "$workspace_root" checkout --detach "$OPL_WORKSPACE_APP_SHA"

          mkdir -p "$workspace_root/shells"
          git clone --filter=blob:none --single-branch --branch main \
            https://github.com/gaofeng21cn/opl-aion-shell.git "$shell_root"
          if ! git -C "$shell_root" merge-base --is-ancestor "$OPL_WORKSPACE_SHELL_SHA" origin/main; then
            echo "Workspace active-shell candidate is not merged into main." >&2
            exit 1
          fi
          git -C "$shell_root" checkout --detach "$OPL_WORKSPACE_SHELL_SHA"

          git clone --filter=blob:none --single-branch --branch main \
            https://github.com/gaofeng21cn/one-person-lab.git "$framework_root"
          if ! git -C "$framework_root" merge-base --is-ancestor "$OPL_WORKSPACE_FRAMEWORK_SHA" origin/main; then
            echo "Workspace Framework candidate is not merged into main." >&2
            exit 1
          fi
          git -C "$framework_root" checkout --detach "$OPL_WORKSPACE_FRAMEWORK_SHA"

          (cd "$workspace_root" && npm run ensure:shell)
          app_head="$(git -C "$workspace_root" rev-parse HEAD)"
          shell_head="$(git -C "$shell_root" rev-parse HEAD)"
          framework_head="$(git -C "$framework_root" rev-parse HEAD)"
          if [ "$app_head" != "$OPL_WORKSPACE_APP_SHA" ] || [ "$shell_head" != "$OPL_WORKSPACE_SHELL_SHA" ] || [ "$framework_head" != "$OPL_WORKSPACE_FRAMEWORK_SHA" ]; then
            echo "Workspace source readback does not match all candidates." >&2
            exit 1
          fi
          if ! grep -Fxq '.git' "$shell_root/.dockerignore"; then
            echo "Workspace build context must exclude Git history." >&2
            exit 1
          fi
          echo "OPL_WORKSPACE_SOURCE_ROOT=${workspace_root}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push images
        id: images
        shell: bash
        run: |
          set -euo pipefail
          printf 'cloud_image=\nworkspace_image=\n' >> "$GITHUB_OUTPUT"
          echo "OPL_CLOUD_IMAGE=" >> "$GITHUB_ENV"
          echo "OPL_WORKSPACE_IMAGE=" >> "$GITHUB_ENV"
          if [ "$PUBLISH_CLOUD_IMAGE" = "true" ] || [ "$PUBLISH_WORKSPACE_IMAGE" = "true" ]; then
            printf '%s' "$TCR_SECRET" | docker login uswccr.ccs.tencentyun.com --username "$TCR_ID" --password-stdin
          fi
          if [ "$PUBLISH_CLOUD_IMAGE" = "true" ]; then
            docker buildx build --push -f Dockerfile -t "$OPL_CLOUD_IMAGE_REF" "$OPL_CLOUD_IMAGE_CONTEXT"
            cloud_digest="$(docker buildx imagetools inspect "$OPL_CLOUD_IMAGE_REF" --format '{{.Manifest.Digest}}')"
            if ! printf '%s' "$cloud_digest" | grep -Eq '^sha256:[0-9a-f]{64}$'; then
              echo "Cloud target image digest readback failed." >&2
              exit 1
            fi
            echo "OPL_CLOUD_IMAGE=${OPL_CLOUD_IMAGE_REPOSITORY}@${cloud_digest}" >> "$GITHUB_ENV"
            echo "cloud_image=${OPL_CLOUD_IMAGE_REPOSITORY}@${cloud_digest}" >> "$GITHUB_OUTPUT"
          fi
          if [ "$PUBLISH_WORKSPACE_IMAGE" = "true" ]; then
            docker buildx build --push \
              -f "$OPL_WORKSPACE_SOURCE_ROOT/shells/aionui/Dockerfile" \
              --build-arg OPL_FRAMEWORK_REF="$OPL_WORKSPACE_FRAMEWORK_SHA" \
              -t "$OPL_WORKSPACE_IMAGE_REF" \
              "$OPL_WORKSPACE_SOURCE_ROOT/shells/aionui"
            workspace_digest="$(docker buildx imagetools inspect "$OPL_WORKSPACE_IMAGE_REF" --format '{{.Manifest.Digest}}')"
            if ! printf '%s' "$workspace_digest" | grep -Eq '^sha256:[0-9a-f]{64}$'; then
              echo "Workspace target image digest readback failed." >&2
              exit 1
            fi
            echo "OPL_WORKSPACE_IMAGE=${OPL_WORKSPACE_IMAGE_REPOSITORY}@${workspace_digest}" >> "$GITHUB_ENV"
            echo "workspace_image=${OPL_WORKSPACE_IMAGE_REPOSITORY}@${workspace_digest}" >> "$GITHUB_OUTPUT"
          fi

      - name: Print image refs
        shell: bash
        env:
          OPL_CLOUD_IMAGE: ${{ steps.images.outputs.cloud_image }}
          OPL_WORKSPACE_IMAGE: ${{ steps.images.outputs.workspace_image }}
        run: |
          printf 'OPL_CLOUD_IMAGE=%s\n' "${OPL_CLOUD_IMAGE:-}"
          printf 'OPL_WORKSPACE_IMAGE=%s\n' "${OPL_WORKSPACE_IMAGE:-}"
