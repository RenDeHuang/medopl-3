name: Verify Production Chain

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: Optional verifier run id.
        required: false
        type: string
      account_id:
        description: Account id that owns the reusable verification slot.
        required: true
        type: string
      url_attempts:
        description: Workspace URL readiness attempts.
        required: false
        default: "90"
        type: string
      retry_delay_ms:
        description: Delay between Workspace readiness attempts.
        required: false
        default: "10000"
        type: string
      request_timeout_ms:
        description: Maximum duration of each verifier HTTP request.
        required: false
        default: "30000"
        type: string

permissions:
  contents: read

concurrency:
  group: production-resource-verification
  cancel-in-progress: false

jobs:
  verify:
    name: Verify live OPL business chain
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    outputs:
      workspace_id: ${{ steps.verify.outputs.workspace_id }}
      workspace_url: ${{ steps.verify.outputs.workspace_url }}
    env:
      OPL_CONSOLE_ORIGIN: "https://cloud.medopl.cn"
      OPL_VERIFY_AUTH_USERS_JSON: ${{ secrets.OPL_VERIFY_AUTH_USERS_JSON || secrets.OPL_CONSOLE_USERS_JSON }}
      OPL_VERIFY_ACCOUNT_ID: ${{ inputs.account_id }}
      OPL_VERIFY_SLOT_ID: verification-slot-01
      OPL_VERIFY_SLOT_DESCRIPTOR_JSON: '{"id":"verification-slot-01","customerProduct":false,"instanceType":"SA5.MEDIUM4","server":"2c4g","cpu":2,"memoryGb":4,"cbsGb":10,"chargeType":"PREPAID","periodMonths":1,"renewFlag":"NOTIFY_AND_MANUAL_RENEW"}'
      OPL_VERIFY_PURCHASE_BUDGET_REMAINING: ${{ vars.OPL_VERIFY_PURCHASE_BUDGET_REMAINING }}
      OPL_VERIFY_URL_ATTEMPTS: ${{ inputs.url_attempts }}
      OPL_VERIFY_RETRY_DELAY_MS: ${{ inputs.retry_delay_ms }}
      OPL_VERIFY_REQUEST_TIMEOUT_MS: ${{ inputs.request_timeout_ms }}
      OPL_VERIFY_RUN_ID: ${{ inputs.run_id || github.run_id }}
      OPL_VERIFY_SCREENSHOT_DIR: "artifacts/production-browser-e2e"
      OPL_VERIFY_MANIFEST_PATH: "artifacts/production-browser-e2e/manifest.json"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Install browser
        run: npx playwright install --with-deps chromium

      - name: Verify reusable production slot
        id: verify
        shell: bash
        run: |
          set -euo pipefail
          result="$RUNNER_TEMP/production-verifier-result.json"
          trap 'rm -f "$result"' EXIT
          node tools/production-verifier.ts --browser-e2e | tee "$result"
          node -e '
            const fs = require("node:fs");
            const payload = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
            if (payload.ok !== true || payload.status !== "reused" || payload.slot?.id !== "verification-slot-01") throw new Error("reusable_verification_slot_required");
            if (!/^[A-Za-z0-9._:-]{1,128}$/.test(payload.workspaceId || "")) throw new Error("workspace_id_required");
            const url = new URL(payload.url);
            if (url.protocol !== "https:" || !url.pathname.startsWith("/w/")) throw new Error("workspace_url_required");
            process.stdout.write(`workspace_id=${payload.workspaceId}\nworkspace_url=${encodeURIComponent(payload.url)}\n`);
          ' "$result" >> "$GITHUB_OUTPUT"

      - name: Upload browser E2E screenshots and manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-browser-e2e
          path: artifacts/production-browser-e2e
          if-no-files-found: ignore
