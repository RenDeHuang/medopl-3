name: Provider Acceptance

on:
  workflow_dispatch:
    inputs:
      slot_id:
        description: Fixed internal Acceptance slot.
        required: true
        type: choice
        options:
          - verification-slot-basic-01
          - verification-slot-pro-01
      account_id:
        description: Dedicated account fixed to the selected slot.
        required: true
        type: string
      confirmation:
        description: Exact one-time PREPAID purchase confirmation.
        required: true
        type: string
      purchase_budget:
        description: Explicit per-slot lifetime purchase budget; must be 1.
        required: true
        type: number
      max_approved_provider_cost:
        description: Maximum approved combined provider quote in CNY.
        required: true
        type: number
      approval_id:
        description: Owner approval ID matching the protected mutation manifest.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: provider-acceptance-${{ inputs.slot_id }}
  cancel-in-progress: false

jobs:
  accept:
    name: Accept selected fixed PREPAID verification slot
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production-provider-acceptance
    env:
      OPL_CONSOLE_ORIGIN: https://cloud.medopl.cn
      OPL_PROVIDER_ACCEPTANCE_SLOT_ID: ${{ inputs.slot_id }}
      OPL_PROVIDER_ACCEPTANCE_ACCOUNT_ID: ${{ inputs.account_id }}
      OPL_PROVIDER_ACCEPTANCE_CONFIRMATION: ${{ inputs.confirmation }}
      OPL_PROVIDER_ACCEPTANCE_ENVIRONMENT_APPROVED: "true"
      OPL_PROVIDER_ACCEPTANCE_PURCHASE_BUDGET: ${{ inputs.purchase_budget }}
      OPL_PROVIDER_ACCEPTANCE_MAX_APPROVED_PROVIDER_COST: ${{ inputs.max_approved_provider_cost }}
      OPL_PROVIDER_ACCEPTANCE_ATTEMPTS: "90"
      OPL_PROVIDER_ACCEPTANCE_RETRY_DELAY_MS: "10000"
      OPL_PROVIDER_ACCEPTANCE_REQUEST_TIMEOUT_MS: "30000"
      OPL_PROVIDER_ACCEPTANCE_MANIFEST_PATH: artifacts/provider-acceptance/manifest.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run one-time Provider Acceptance
        env:
          OPL_PROVIDER_ACCEPTANCE_TOKEN: ${{ secrets.OPL_PROVIDER_ACCEPTANCE_TOKEN }}
          OPL_VERIFY_MUTATION_APPROVAL_JSON: ${{ secrets.OPL_VERIFY_MUTATION_APPROVAL_JSON }}
          OPL_VERIFY_MUTATION_APPROVAL_ID: ${{ inputs.approval_id }}
        run: node tools/provider-acceptance.ts --allow-gateway-write --allow-provider-write --approval-id "$OPL_VERIFY_MUTATION_APPROVAL_ID"

      - name: Upload Provider Acceptance manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-acceptance
          path: artifacts/provider-acceptance
          if-no-files-found: ignore
