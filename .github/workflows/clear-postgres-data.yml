name: Clear PostgreSQL Data

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Print row counts without clearing.
        required: true
        default: "true"
      confirm:
        description: Type clear-postgres-data to run the destructive clear.
        required: false
        default: ""

permissions:
  contents: read

jobs:
  clear:
    name: Clear production PostgreSQL data
    runs-on: [self-hosted, tencent-cloud, opl-cloud, tke-vpc]
    environment: production
    env:
      OPL_K8S_NAMESPACE: ${{ vars.OPL_K8S_NAMESPACE || 'opl-cloud' }}
      TENCENT_DEPLOY_KUBECONFIG_PATH: ${{ vars.TENCENT_DEPLOY_KUBECONFIG_PATH || '/home/actions/.secrets/medopl/v22/kubeconfig-package-d-deploy' }}
      TENCENT_DEPLOY_KUBECONFIG_B64: ${{ secrets.TENCENT_DEPLOY_KUBECONFIG_B64 }}
      TENCENT_DEPLOY_KUBECONFIG: ${{ secrets.TENCENT_DEPLOY_KUBECONFIG }}
      DRY_RUN: ${{ inputs.dry_run }}
      CONFIRM: ${{ inputs.confirm }}

    steps:
      - name: Prepare kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          secret_dir="$(mktemp -d)"
          chmod 700 "$secret_dir"
          kubeconfig="$secret_dir/kubeconfig"
          if [ -f "$TENCENT_DEPLOY_KUBECONFIG_PATH" ]; then
            cp "$TENCENT_DEPLOY_KUBECONFIG_PATH" "$kubeconfig"
          elif [ -n "${TENCENT_DEPLOY_KUBECONFIG_B64:-}" ]; then
            printf '%s' "$TENCENT_DEPLOY_KUBECONFIG_B64" | base64 -d > "$kubeconfig"
          elif [ -n "${TENCENT_DEPLOY_KUBECONFIG:-}" ]; then
            printf '%s' "$TENCENT_DEPLOY_KUBECONFIG" > "$kubeconfig"
          else
            echo "No deploy kubeconfig was provided." >&2
            exit 1
          fi
          chmod 600 "$kubeconfig"
          echo "KUBECONFIG=$kubeconfig" >> "$GITHUB_ENV"

      - name: Clear data from PostgreSQL
        shell: bash
        run: |
          set -euo pipefail
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" exec -i deploy/opl-cloud-ledger -c ledger -- env DRY_RUN="$DRY_RUN" CONFIRM="$CONFIRM" node <<'NODE'
          const { Client } = require("pg");

          const dryRun = String(process.env.DRY_RUN || "true") !== "false";
          const confirm = String(process.env.CONFIRM || "");
          const keep = new Set(["schema_migrations", "atlas_schema_revisions"]);
          const ident = (name) => `"${String(name).replace(/"/g, '""')}"`;

          async function counts(client, tables) {
            const out = {};
            for (const table of tables) {
              const result = await client.query(`SELECT count(*)::bigint AS count FROM public.${ident(table)}`);
              out[table] = Number(result.rows[0].count);
            }
            return out;
          }

          (async () => {
            if (!dryRun && confirm !== "clear-postgres-data") {
              throw new Error("confirmation_required");
            }
            const client = new Client({ connectionString: process.env.DATABASE_URL, ssl: false });
            await client.connect();
            try {
              const tableResult = await client.query(
                `SELECT tablename
                 FROM pg_tables
                 WHERE schemaname = 'public'
                 ORDER BY tablename`
              );
              const tables = tableResult.rows.map((row) => row.tablename).filter((name) => !keep.has(name));
              console.log(`POSTGRES_TABLES=${JSON.stringify(tables)}`);
              console.log(`POSTGRES_COUNTS_BEFORE=${JSON.stringify(await counts(client, tables))}`);
              if (dryRun || tables.length === 0) {
                console.log("POSTGRES_CLEAR_DRY_RUN=true");
                return;
              }
              await client.query("BEGIN");
              await client.query(`TRUNCATE TABLE ${tables.map((table) => `public.${ident(table)}`).join(", ")} RESTART IDENTITY CASCADE`);
              await client.query("COMMIT");
              console.log(`POSTGRES_COUNTS_AFTER=${JSON.stringify(await counts(client, tables))}`);
            } catch (error) {
              try { await client.query("ROLLBACK"); } catch {}
              throw error;
            } finally {
              await client.end();
            }
          })().catch((error) => {
            console.error(error.message);
            process.exit(1);
          });
          NODE
