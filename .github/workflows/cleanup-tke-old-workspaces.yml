name: Cleanup TKE Old Workspace Runtimes

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Print cleanup targets without mutating TKE.
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      confirm:
        description: Type CLEAN_OLD_WORKSPACES to run a mutating cleanup.
        required: false
        type: string
      delete_legacy_namespaces:
        description: Also delete exact legacy namespaces listed in legacy_namespaces.
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      legacy_namespaces:
        description: Comma-separated legacy namespaces allowed for deletion.
        required: true
        default: "medopl,opl-webui"
        type: string
      namespace_confirm:
        description: Type DELETE_MEDOPL_AND_OPL_WEBUI to delete the legacy namespaces.
        required: false
        type: string

permissions:
  contents: read

jobs:
  cleanup:
    name: Cleanup old OPL Workspace runtime objects
    runs-on: [self-hosted, tencent-cloud, opl-cloud, tke-vpc]
    environment: production
    env:
      OPL_K8S_NAMESPACE: ${{ vars.OPL_K8S_NAMESPACE || 'opl-cloud' }}
      OPL_WORKSPACE_DOMAIN: ${{ vars.OPL_WORKSPACE_DOMAIN || 'workspace.medopl.cn' }}
      TENCENT_DEPLOY_KUBECONFIG_PATH: ${{ vars.TENCENT_DEPLOY_KUBECONFIG_PATH || '/home/actions/.secrets/medopl/v22/kubeconfig-package-d-deploy' }}
      TENCENT_DEPLOY_KUBECONFIG_B64: ${{ secrets.TENCENT_DEPLOY_KUBECONFIG_B64 }}
      TENCENT_DEPLOY_KUBECONFIG: ${{ secrets.TENCENT_DEPLOY_KUBECONFIG }}

    steps:
      - name: Prepare kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          secret_dir="$(mktemp -d)"
          chmod 700 "$secret_dir"
          kubeconfig="$secret_dir/kubeconfig"
          if [ -f "$TENCENT_DEPLOY_KUBECONFIG_PATH" ]; then
            cp "$TENCENT_DEPLOY_KUBECONFIG_PATH" "$kubeconfig"
          elif [ -n "${TENCENT_DEPLOY_KUBECONFIG_B64:-}" ]; then
            printf '%s' "$TENCENT_DEPLOY_KUBECONFIG_B64" | base64 -d > "$kubeconfig"
          elif [ -n "${TENCENT_DEPLOY_KUBECONFIG:-}" ]; then
            printf '%s' "$TENCENT_DEPLOY_KUBECONFIG" > "$kubeconfig"
          else
            echo "No deploy kubeconfig was provided." >&2
            exit 1
          fi
          chmod 600 "$kubeconfig"
          echo "KUBECONFIG=$kubeconfig" >> "$GITHUB_ENV"

      - name: Inventory old workspace resources
        shell: bash
        run: |
          set -euo pipefail
          echo "Old Deployment/Service candidates:"
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get deploy,svc \
            -l app.kubernetes.io/name=opl-workspace -o wide || true
          echo "Old Secret/PVC candidates:"
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get secret,pvc -o name \
            | grep -E '^((secret|persistentvolumeclaim)/opl-ws-[a-z0-9-]+(-(env|data))?)$' || true
          echo "Old Ingress path candidates:"
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get ingress opl-cloud -o json \
            | node -e '
                const fs = require("node:fs");
                const ingress = JSON.parse(fs.readFileSync(0, "utf8"));
                for (const rule of ingress.spec?.rules || []) {
                  if (rule.host !== process.env.OPL_WORKSPACE_DOMAIN) continue;
                  for (const path of rule.http?.paths || []) {
                    const service = path.backend?.service?.name || "";
                    if (/^opl-ws-/.test(service)) {
                      console.log(`${path.path} -> ${service}`);
                    }
                  }
                }
              '
          echo "Legacy namespace candidates:"
          for namespace in medopl opl-webui; do
            if kubectl --kubeconfig "$KUBECONFIG" get ns "$namespace" >/dev/null 2>&1; then
              echo "namespace/$namespace"
              kubectl --kubeconfig "$KUBECONFIG" -n "$namespace" get deploy,sts,ds,pod,svc,ingress,pvc,secret -o wide || true
            fi
          done

      - name: Confirm cleanup boundary
        shell: bash
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          CONFIRM: ${{ inputs.confirm }}
          DELETE_LEGACY_NAMESPACES: ${{ inputs.delete_legacy_namespaces }}
          NAMESPACE_CONFIRM: ${{ inputs.namespace_confirm }}
        run: |
          set -euo pipefail
          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry-run mode: no Kubernetes objects will be mutated."
            exit 0
          fi
          if [ "$CONFIRM" != "CLEAN_OLD_WORKSPACES" ]; then
            echo "Mutating cleanup requires confirm=CLEAN_OLD_WORKSPACES." >&2
            exit 1
          fi
          if [ "$DELETE_LEGACY_NAMESPACES" = "true" ] && [ "$NAMESPACE_CONFIRM" != "DELETE_MEDOPL_AND_OPL_WEBUI" ]; then
            echo "Legacy namespace cleanup requires namespace_confirm=DELETE_MEDOPL_AND_OPL_WEBUI." >&2
            exit 1
          fi
          echo "Mutating cleanup confirmed for old opl-ws-* runtime objects only."
          if [ "$DELETE_LEGACY_NAMESPACES" = "true" ]; then
            echo "Legacy namespace cleanup confirmed for medopl and opl-webui only."
          fi

      - name: Remove old workspace ingress paths
        shell: bash
        env:
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          ingress_file="$(mktemp)"
          next_ingress_file="$(mktemp)"
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get ingress opl-cloud -o json > "$ingress_file"
          OPL_WORKSPACE_DOMAIN="$OPL_WORKSPACE_DOMAIN" node - "$ingress_file" "$next_ingress_file" <<'NODE'
          const fs = require("node:fs");
          const [source, target] = process.argv.slice(2);
          const ingress = JSON.parse(fs.readFileSync(source, "utf8"));
          delete ingress.status;
          if (ingress.metadata) {
            delete ingress.metadata.creationTimestamp;
            delete ingress.metadata.generation;
            delete ingress.metadata.managedFields;
            delete ingress.metadata.resourceVersion;
            delete ingress.metadata.uid;
          }
          const removed = [];
          for (const rule of ingress.spec?.rules || []) {
            if (rule.host !== process.env.OPL_WORKSPACE_DOMAIN) continue;
            const paths = Array.isArray(rule.http?.paths) ? rule.http.paths : [];
            rule.http.paths = paths.filter((path) => {
              const service = path.backend?.service?.name || "";
              const oldRuntime = /^opl-ws-/.test(service);
              if (oldRuntime) removed.push(`${path.path} -> ${service}`);
              return !oldRuntime;
            });
          }
          console.log(removed.length ? removed.join("\n") : "No old Ingress paths found.");
          fs.writeFileSync(target, `${JSON.stringify(ingress, null, 2)}\n`);
          NODE
          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry-run: not applying Ingress path cleanup."
            exit 0
          fi
          kubectl --kubeconfig "$KUBECONFIG" apply -f "$next_ingress_file"

      - name: Delete old workspace runtime resources
        shell: bash
        env:
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          mapfile -t workspace_names < <(
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get deploy,svc,secret,pvc -o json \
              | node -e '
                  const fs = require("node:fs");
                  const payload = JSON.parse(fs.readFileSync(0, "utf8"));
                  const names = new Set();
                  for (const item of payload.items || []) {
                    const name = item.metadata?.name || "";
                    const kind = item.kind || "";
                    if ((kind === "Deployment" || kind === "Service") && /^opl-ws-[a-z0-9-]+$/.test(name)) names.add(name);
                    if (kind === "Secret" && /^opl-ws-[a-z0-9-]+-env$/.test(name)) names.add(name.replace(/-env$/, ""));
                    if (kind === "PersistentVolumeClaim" && /^opl-ws-[a-z0-9-]+-data$/.test(name)) names.add(name.replace(/-data$/, ""));
                  }
                  for (const name of [...names].sort()) console.log(name);
                '
          )
          if [ "${#workspace_names[@]}" -eq 0 ]; then
            echo "No old opl-ws-* runtime objects found."
            exit 0
          fi
          for name in "${workspace_names[@]}"; do
            echo "Cleanup target: deployment/$name service/$name secret/$name-env pvc/$name-data"
            if [ "$DRY_RUN" = "true" ]; then
              continue
            fi
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" delete \
              "deployment/$name" \
              "service/$name" \
              "secret/$name-env" \
              "persistentvolumeclaim/$name-data" \
              --ignore-not-found=true
          done

      - name: Delete legacy namespaces
        shell: bash
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          DELETE_LEGACY_NAMESPACES: ${{ inputs.delete_legacy_namespaces }}
          LEGACY_NAMESPACES: ${{ inputs.legacy_namespaces }}
        run: |
          set -euo pipefail
          if [ "$DELETE_LEGACY_NAMESPACES" != "true" ]; then
            echo "Legacy namespace cleanup disabled."
            exit 0
          fi
          IFS=',' read -r -a namespaces <<< "$LEGACY_NAMESPACES"
          for raw_namespace in "${namespaces[@]}"; do
            namespace="$(printf '%s' "$raw_namespace" | xargs)"
            if [ -z "$namespace" ]; then
              continue
            fi
            case "$namespace" in
              medopl|opl-webui) ;;
              *)
                echo "Refusing to delete non-whitelisted namespace: $namespace" >&2
                exit 1
                ;;
            esac
            echo "Cleanup target: namespace/$namespace"
            if [ "$DRY_RUN" = "true" ]; then
              continue
            fi
            if ! kubectl --kubeconfig "$KUBECONFIG" get ns "$namespace" >/dev/null 2>&1; then
              echo "namespace/$namespace is already absent."
              continue
            fi
            echo "Deleting workload resources inside namespace/$namespace before namespace deletion."
            kubectl --kubeconfig "$KUBECONFIG" -n "$namespace" delete deploy,sts,ds,job,cronjob \
              --all --ignore-not-found=true --wait=true --timeout=300s || true
            kubectl --kubeconfig "$KUBECONFIG" -n "$namespace" delete pod \
              --all --ignore-not-found=true --wait=true --timeout=300s || true
            for attempt in $(seq 1 60); do
              remaining_pods="$(kubectl --kubeconfig "$KUBECONFIG" -n "$namespace" get pod --no-headers 2>/dev/null || true)"
              if [ -z "$remaining_pods" ]; then
                break
              fi
              if [ "$attempt" -eq 60 ]; then
                echo "cleanup_failed: namespace/$namespace still has pods before namespace deletion" >&2
                printf '%s\n' "$remaining_pods" >&2
                exit 1
              fi
              sleep 5
            done
            kubectl --kubeconfig "$KUBECONFIG" delete namespace "$namespace" --wait=true --timeout=300s
          done

      - name: Verify cleanup
        shell: bash
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          DELETE_LEGACY_NAMESPACES: ${{ inputs.delete_legacy_namespaces }}
          LEGACY_NAMESPACES: ${{ inputs.legacy_namespaces }}
        run: |
          set -euo pipefail
          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry-run verification skipped."
            exit 0
          fi
          remaining_runtime_objects="$(kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get deploy,svc,secret,pvc -o name \
            | grep -E '^(deployment.apps|service|secret|persistentvolumeclaim)/opl-ws-' || true)"
          remaining_paths="$(kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get ingress opl-cloud -o json \
            | node -e '
                const fs = require("node:fs");
                const ingress = JSON.parse(fs.readFileSync(0, "utf8"));
                for (const rule of ingress.spec?.rules || []) {
                  if (rule.host !== process.env.OPL_WORKSPACE_DOMAIN) continue;
                  for (const path of rule.http?.paths || []) {
                    const service = path.backend?.service?.name || "";
                    if (/^opl-ws-/.test(service)) console.log(`${path.path} -> ${service}`);
                  }
                }
              ')"
          if [ -n "$remaining_runtime_objects" ] || [ -n "$remaining_paths" ]; then
            echo "cleanup_failed: old workspace resources remain" >&2
            printf '%s\n%s\n' "$remaining_runtime_objects" "$remaining_paths" >&2
            exit 1
          fi
          if [ "$DELETE_LEGACY_NAMESPACES" = "true" ]; then
            IFS=',' read -r -a namespaces <<< "$LEGACY_NAMESPACES"
            for raw_namespace in "${namespaces[@]}"; do
              namespace="$(printf '%s' "$raw_namespace" | xargs)"
              if [ -z "$namespace" ]; then
                continue
              fi
              if kubectl --kubeconfig "$KUBECONFIG" get ns "$namespace" >/dev/null 2>&1; then
                echo "cleanup_failed: namespace/$namespace still exists" >&2
                exit 1
              fi
            done
          fi
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get deploy,svc,ingress -o wide
