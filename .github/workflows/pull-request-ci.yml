name: Pull Request CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pull-request-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGUSER: postgres
      PGDATABASE: postgres
      PGSSLMODE: disable
      OPL_POSTGRES_TESTS: "1"
      OPL_CAPACITY_TESTS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node 24
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"
          cache-dependency-path: |
            services/control-plane/go.sum
            services/fabric/go.sum
            services/ledger/go.sum
            services/internal/postgresmigrate/go.sum

      - name: Install Node dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Test Node
        run: |
          node --test --test-reporter=tap "tests/**/*.test.ts" | node -e '
            let output = "";
            process.stdin.setEncoding("utf8");
            process.stdin.on("data", (chunk) => { process.stdout.write(chunk); output += chunk; });
            process.stdin.on("end", () => {
              const matches = [...output.matchAll(/^# skipped (\d+)$/gm)];
              if (matches.length !== 1 || Number(matches[0][1]) !== 0) {
                console.error("Node SKIP result missing or nonzero");
                process.exit(1);
              }
            });
          '

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test Console browser
        run: node tools/console-browser-qa.ts --network=fake-only

      - name: Lint
        run: npm run lint

      - name: Test PostgreSQL migrations
        working-directory: services/internal/postgresmigrate
        run: |
          go test -run '^$' ./...
          package_list="$(go list -f '{{if or .TestGoFiles .XTestGoFiles}}{{.ImportPath}}{{end}}' ./...)"
          mapfile -t test_packages < <(sed '/^$/d' <<< "$package_list")
          ((${#test_packages[@]} > 0))
          go test -race -count=1 -json "${test_packages[@]}" | node -e '
            let output = "";
            process.stdin.setEncoding("utf8");
            process.stdin.on("data", (chunk) => { process.stdout.write(chunk); output += chunk; });
            process.stdin.on("end", () => {
              const skipped = output.trim().split(/\n/).filter(Boolean).map(JSON.parse).filter((event) => event.Action === "skip");
              if (skipped.length) { console.error(`Go SKIP ${skipped.length}`); process.exit(1); }
            });
          '

      - name: Test Control Plane
        working-directory: services/control-plane
        run: |
          go test -run '^$' ./...
          package_list="$(go list -f '{{if or .TestGoFiles .XTestGoFiles}}{{.ImportPath}}{{end}}' ./...)"
          mapfile -t test_packages < <(sed '/^$/d' <<< "$package_list")
          ((${#test_packages[@]} > 0))
          go test -timeout=15m -count=1 -json "${test_packages[@]}" | node -e '
            let output = "";
            process.stdin.setEncoding("utf8");
            process.stdin.on("data", (chunk) => { process.stdout.write(chunk); output += chunk; });
            process.stdin.on("end", () => {
              const events = output.trim().split(/\n/).filter(Boolean).map(JSON.parse);
              const failed = events.filter((event) => event.Action === "fail");
              const skipped = events.filter((event) => event.Action === "skip");
              if (failed.length || skipped.length) {
                console.error(`Go FAIL ${failed.length} SKIP ${skipped.length}`);
                process.exit(1);
              }
            });
          '

      - name: Test Fabric
        working-directory: services/fabric
        run: |
          go test -run '^$' ./...
          package_list="$(go list -f '{{if or .TestGoFiles .XTestGoFiles}}{{.ImportPath}}{{end}}' ./...)"
          mapfile -t test_packages < <(sed '/^$/d' <<< "$package_list")
          ((${#test_packages[@]} > 0))
          go test -count=1 -json "${test_packages[@]}" | node -e '
            let output = "";
            process.stdin.setEncoding("utf8");
            process.stdin.on("data", (chunk) => { process.stdout.write(chunk); output += chunk; });
            process.stdin.on("end", () => {
              const skipped = output.trim().split(/\n/).filter(Boolean).map(JSON.parse).filter((event) => event.Action === "skip");
              if (skipped.length) { console.error(`Go SKIP ${skipped.length}`); process.exit(1); }
            });
          '

      - name: Test Ledger
        working-directory: services/ledger
        run: |
          go test -run '^$' ./...
          package_list="$(go list -f '{{if or .TestGoFiles .XTestGoFiles}}{{.ImportPath}}{{end}}' ./...)"
          mapfile -t test_packages < <(sed '/^$/d' <<< "$package_list")
          ((${#test_packages[@]} > 0))
          go test -count=1 -json "${test_packages[@]}" | node -e '
            let output = "";
            process.stdin.setEncoding("utf8");
            process.stdin.on("data", (chunk) => { process.stdout.write(chunk); output += chunk; });
            process.stdin.on("end", () => {
              const skipped = output.trim().split(/\n/).filter(Boolean).map(JSON.parse).filter((event) => event.Action === "skip");
              if (skipped.length) { console.error(`Go SKIP ${skipped.length}`); process.exit(1); }
            });
          '

      - name: Check diff whitespace
        run: git diff --check "origin/${{ github.base_ref }}...HEAD"
