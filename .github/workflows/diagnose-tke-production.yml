name: Diagnose TKE Production

on:
  workflow_dispatch:
    inputs:
      account_id:
        description: Account id to inspect for redacted Console state.
        required: false
        default: pi-production-verifier
      compute_allocation_id:
        description: ComputeAllocation id to inspect. Leave empty to skip Console resource state output.
        required: false
        default: ""

permissions:
  contents: read

jobs:
  diagnose:
    name: Diagnose OPL Cloud on TKE
    runs-on: [self-hosted, tencent-cloud, opl-cloud, tke-vpc]
    environment: production
    env:
      OPL_K8S_NAMESPACE: ${{ vars.OPL_K8S_NAMESPACE || 'opl-cloud' }}
      TENCENT_DEPLOY_KUBECONFIG_PATH: ${{ vars.TENCENT_DEPLOY_KUBECONFIG_PATH || '/home/actions/.secrets/medopl/v22/kubeconfig-package-d-deploy' }}
      TENCENT_DEPLOY_KUBECONFIG_B64: ${{ secrets.TENCENT_DEPLOY_KUBECONFIG_B64 }}
      TENCENT_DEPLOY_KUBECONFIG: ${{ secrets.TENCENT_DEPLOY_KUBECONFIG }}
      OPL_OPERATOR_SUMMARY_TOKEN: ${{ secrets.OPL_OPERATOR_SUMMARY_TOKEN }}
      OPL_DIAG_ACCOUNT_ID: ${{ inputs.account_id || 'pi-production-verifier' }}
      OPL_DIAG_COMPUTE_ALLOCATION_ID: ${{ inputs.compute_allocation_id }}

    steps:
      - name: Prepare kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          secret_dir="$(mktemp -d)"
          chmod 700 "$secret_dir"
          kubeconfig="$secret_dir/kubeconfig"
          if [ -f "$TENCENT_DEPLOY_KUBECONFIG_PATH" ]; then
            cp "$TENCENT_DEPLOY_KUBECONFIG_PATH" "$kubeconfig"
          elif [ -n "${TENCENT_DEPLOY_KUBECONFIG_B64:-}" ]; then
            printf '%s' "$TENCENT_DEPLOY_KUBECONFIG_B64" | base64 -d > "$kubeconfig"
          elif [ -n "${TENCENT_DEPLOY_KUBECONFIG:-}" ]; then
            printf '%s' "$TENCENT_DEPLOY_KUBECONFIG" > "$kubeconfig"
          else
            echo "No deploy kubeconfig was provided." >&2
            exit 1
          fi
          chmod 600 "$kubeconfig"
          echo "KUBECONFIG=$kubeconfig" >> "$GITHUB_ENV"

      - name: Show workload status
        shell: bash
        run: |
          set -euo pipefail
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get deploy,rs,pod,svc,ingress -o wide
          kubectl --kubeconfig "$KUBECONFIG" api-resources --api-group=snapshot.storage.k8s.io || true
          kubectl --kubeconfig "$KUBECONFIG" get volumesnapshotclass -o wide || true
          kubectl --kubeconfig "$KUBECONFIG" -n kube-system get pods -o wide \
            | awk 'NR == 1 || tolower($0) ~ /(snapshot|cbs|csi)/'
          kubectl --kubeconfig "$KUBECONFIG" -n kube-system get deployment csi-cbs-controller \
            -o jsonpath='{range .spec.template.spec.containers[*]}{.name}{" "}{.image}{"\n"}{end}'

      - name: Show cluster node capacity
        shell: bash
        run: |
          set -euo pipefail
          kubectl --kubeconfig "$KUBECONFIG" get nodes -o wide
          kubectl --kubeconfig "$KUBECONFIG" get nodes -o json \
            | node -e '
                const fs = require("node:fs");
                const payload = JSON.parse(fs.readFileSync(0, "utf8"));
                console.log("NODE READY CPU_ALLOCATABLE MEMORY_ALLOCATABLE PODS_ALLOCATABLE LABELS");
                for (const item of payload.items || []) {
                  const conditions = item.status?.conditions || [];
                  const ready = conditions.find((condition) => condition.type === "Ready")?.status || "unknown";
                  const allocatable = item.status?.allocatable || {};
                  const labels = item.metadata?.labels || {};
                  const compactLabels = Object.entries(labels)
                    .filter(([key]) => /nodepool|workload|instance|zone|kubernetes\.io\/hostname/.test(key))
                    .map(([key, value]) => `${key}=${value}`)
                    .join(",");
                  console.log(`${item.metadata.name} ${ready} cpu.allocatable=${allocatable.cpu || "-"} memory.allocatable=${allocatable.memory || "-"} pods.allocatable=${allocatable.pods || "-"} ${compactLabels || "-"}`);
                }
              '

      - name: Show namespace resource requests
        shell: bash
        run: |
          set -euo pipefail
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get pod -o json \
            | node -e '
                const fs = require("node:fs");
                const payload = JSON.parse(fs.readFileSync(0, "utf8"));
                console.log("POD PHASE NODE CPU_REQUEST MEMORY_REQUEST IMAGES");
                for (const item of payload.items || []) {
                  const containers = item.spec?.containers || [];
                  const cpu = containers.map((container) => container.resources?.requests?.cpu || "0").join("+");
                  const memory = containers.map((container) => container.resources?.requests?.memory || "0").join("+");
                  const images = containers.map((container) => container.image).join(",");
                  console.log(`${item.metadata.name} ${item.status?.phase || "-"} ${item.spec?.nodeName || "-"} cpu=${cpu} memory=${memory} images=${images}`);
                }
              '

      - name: Describe pending workspace pods
        shell: bash
        run: |
          set -euo pipefail
          selector="app.kubernetes.io/name=opl-compute-allocation"
          if [ -n "${OPL_DIAG_COMPUTE_ALLOCATION_ID:-}" ]; then
            selector="$selector,oplcloud.cn/compute-allocation-id=$OPL_DIAG_COMPUTE_ALLOCATION_ID"
          fi
          pods="$(kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get pods -l "$selector" -o name)"
          if [ -z "$pods" ]; then
            echo "No matching workspace pods."
            exit 0
          fi
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get pods -l "$selector" -o wide
          for pod in $pods; do
            echo "=== workspace pod: $pod ==="
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" describe "$pod"
            echo "=== workspace logs: $pod ==="
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" logs "$pod" --all-containers=true --tail=300 || true
            echo "=== previous workspace logs: $pod ==="
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" logs "$pod" --all-containers=true --previous --tail=300 || true
          done

      - name: Describe control plane deployment
        shell: bash
        run: |
          set -euo pipefail
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" describe deployment opl-cloud-control-plane

      - name: Describe ingress and service endpoints
        shell: bash
        run: |
          set -euo pipefail
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" describe ingress opl-cloud
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get ingress opl-cloud -o yaml
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get endpoints opl-cloud-control-plane -o wide

      - name: Show TLS secret inventory
        shell: bash
        run: |
          set -euo pipefail
          kubectl --kubeconfig "$KUBECONFIG" get secrets -A -o json \
            | node -e '
                const fs = require("node:fs");
                const payload = JSON.parse(fs.readFileSync(0, "utf8"));
                console.log("NAMESPACE NAME TYPE HAS_QCLOUD_CERT_ID");
                for (const item of payload.items || []) {
                  const hasQcloudCertId = Boolean(item.data?.qcloud_cert_id);
                  if (item.type !== "Opaque" && !hasQcloudCertId) continue;
                  console.log(`${item.metadata.namespace} ${item.metadata.name} ${item.type} ${hasQcloudCertId}`);
                }
              '

      - name: Show ingress TLS usage
        shell: bash
        run: |
          set -euo pipefail
          kubectl --kubeconfig "$KUBECONFIG" get ingress -A -o json \
            | node -e '
                const fs = require("node:fs");
                const payload = JSON.parse(fs.readFileSync(0, "utf8"));
                console.log("NAMESPACE NAME READY ADDRESS HOSTS TLS_SECRETS");
                for (const item of payload.items || []) {
                  const annotations = item.metadata?.annotations || {};
                  let ready = "unknown";
                  try {
                    const conditions = JSON.parse(annotations["ingress.cloud.tencent.com/status.conditions"] || "[]");
                    ready = conditions.find((condition) => condition.type === "Ready")?.status || ready;
                  } catch {}
                  const address = (item.status?.loadBalancer?.ingress || [])
                    .map((entry) => entry.hostname || entry.ip)
                    .filter(Boolean)
                    .join(",");
                  const hosts = (item.spec?.rules || []).map((rule) => rule.host).filter(Boolean).join(",");
                  const tlsSecrets = (item.spec?.tls || []).map((tls) => tls.secretName).filter(Boolean).join(",");
                  console.log(`${item.metadata.namespace} ${item.metadata.name} ${ready} ${address || "-"} ${hosts || "-"} ${tlsSecrets || "-"}`);
                }
              '

      - name: Check external HTTP and HTTPS entrypoints
        shell: bash
        run: |
          set -euo pipefail
          for url in \
            http://cloud.medopl.cn/api/state \
            https://cloud.medopl.cn/api/state \
            http://workspace.medopl.cn/ \
            https://workspace.medopl.cn/
          do
            printf '%s ' "$url"
            curl -k --connect-timeout 8 -sS -o /tmp/opl-cloud-external-check \
              -w 'code=%{http_code} remote=%{remote_ip} time=%{time_total}\n' "$url" || true
            rm -f /tmp/opl-cloud-external-check
          done

      - name: Describe control plane pods
        shell: bash
        run: |
          set -euo pipefail
          pods="$(kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get pods -l app.kubernetes.io/name=opl-cloud -o name)"
          if [ -z "$pods" ]; then
            echo "No OPL Cloud pods found."
            exit 0
          fi
          for pod in $pods; do
            echo "=== $pod ==="
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" describe "$pod"
          done

      - name: Show recent namespace events
        shell: bash
        run: |
          set -euo pipefail
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get events --sort-by=.lastTimestamp

      - name: Show control plane logs
        shell: bash
        run: |
          set -euo pipefail
          for component in control-plane ledger fabric; do
            echo "=== $component logs ==="
            selector="app.kubernetes.io/component=$component"
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get pods -l "$selector" -o name
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" logs -l "$selector" --all-containers=true --tail=200 || true
          done

      - name: Show ledger schema columns
        shell: bash
        run: |
          set -euo pipefail
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" exec -i deploy/opl-cloud-ledger -c ledger -- node <<'NODE'
          const { Client } = require("pg");
          const tables = ["wallets", "ledger_entries", "wallet_transactions", "manual_topups", "idempotency_keys", "holds", "hold_releases"];
          (async () => {
            const client = new Client({ connectionString: process.env.DATABASE_URL, ssl: false });
            await client.connect();
            try {
              const result = await client.query(
                `SELECT table_name, column_name
                 FROM information_schema.columns
                 WHERE table_schema = 'public' AND table_name = ANY($1)
                 ORDER BY table_name, ordinal_position`,
                [tables]
              );
              const summary = {};
              for (const row of result.rows) {
                summary[row.table_name] ||= [];
                summary[row.table_name].push(row.column_name);
              }
              console.log(`LEDGER_SCHEMA_COLUMNS=${JSON.stringify(summary)}`);
            } finally {
              await client.end();
            }
          })().catch((error) => {
            console.error(error.message);
            process.exit(1);
          });
          NODE

      - name: Show previous control plane crash logs
        shell: bash
        run: |
          set -euo pipefail
          for component in control-plane ledger fabric; do
            selector="app.kubernetes.io/component=$component"
            pods="$(kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get pods -l "$selector" -o name)"
            if [ -z "$pods" ]; then
              echo "No $component pods found."
              continue
            fi
            for pod in $pods; do
              echo "=== current $component logs: $pod ==="
              kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" logs "$pod" --all-containers=true --tail=300 || true
              echo "=== previous $component logs: $pod ==="
              kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" logs "$pod" --all-containers=true --previous --tail=300 || true
            done
          done

      - name: Show control plane container status
        shell: bash
        run: |
          set -euo pipefail
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get pods -l app.kubernetes.io/name=opl-cloud -o json \
            | node -e '
                const fs = require("node:fs");
                const payload = JSON.parse(fs.readFileSync(0, "utf8"));
                for (const pod of payload.items || []) {
                  console.log(JSON.stringify({
                    pod: pod.metadata?.name,
                    phase: pod.status?.phase,
                    podIP: pod.status?.podIP,
                    conditions: (pod.status?.conditions || []).map(({ type, status, reason }) => ({ type, status, reason })),
                    containers: (pod.status?.containerStatuses || []).map((container) => ({
                      name: container.name,
                      ready: container.ready,
                      restartCount: container.restartCount,
                      state: container.state,
                      lastState: container.lastState
                    }))
                  }, null, 2));
                }
              '

      - name: Check control plane API through port-forward
        shell: bash
        run: |
          set -euo pipefail
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" port-forward service/opl-cloud-control-plane 18787:8787 > /tmp/opl-cloud-port-forward.log 2>&1 &
          port_forward_pid="$!"
          trap 'kill "$port_forward_pid" 2>/dev/null || true' EXIT
          state_code="000"
          for attempt in 1 2 3 4 5; do
            state_code="$(curl -sS -o /tmp/opl-cloud-state.json -w '%{http_code}' http://127.0.0.1:18787/api/state || true)"
            if [ "$state_code" != "000" ]; then
              break
            fi
            sleep 2
          done
          printf 'state_code=%s\n' "$state_code"
          printf 'readiness='
          readiness_payload="$(curl -fsS http://127.0.0.1:18787/api/production/readiness || true)"
          if [ -z "$readiness_payload" ]; then
            printf '{"ready":false,"failedChecks":["port_forward_unavailable"]}'
          else
            printf '%s' "$readiness_payload" | node -e '
                const fs = require("node:fs");
                const payload = JSON.parse(fs.readFileSync(0, "utf8"));
                process.stdout.write(JSON.stringify({
                  ready: payload.ready === true,
                  failedChecks: payload.failedChecks || []
                }));
              '
          fi
          printf '\n'

      - name: Show redacted console resource state
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${OPL_DIAG_COMPUTE_ALLOCATION_ID:-}" ]; then
            echo "console_resource_state=skipped"
            exit 0
          fi
          if [ -z "${OPL_OPERATOR_SUMMARY_TOKEN:-}" ]; then
            echo "console_resource_state=operator_token_missing"
            exit 0
          fi
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" port-forward service/opl-cloud-control-plane 18788:8787 > /tmp/opl-cloud-resource-state-port-forward.log 2>&1 &
          port_forward_pid="$!"
          trap 'kill "$port_forward_pid" 2>/dev/null || true' EXIT
          console_summary="$(node --input-type=module <<'NODE'
          const origin = "http://127.0.0.1:18788";
          const accountId = process.env.OPL_DIAG_ACCOUNT_ID || "pi-production-verifier";
          const computeAllocationId = process.env.OPL_DIAG_COMPUTE_ALLOCATION_ID || "";
          const operatorToken = process.env.OPL_OPERATOR_SUMMARY_TOKEN || "";

          function sleep(ms) {
            return new Promise((resolve) => setTimeout(resolve, ms));
          }

          function cookieHeaderFromSetCookie(value = "") {
            return String(value)
              .split(/,(?=[^;,]+=)/)
              .map((entry) => entry.split(";")[0]?.trim())
              .filter(Boolean)
              .join("; ");
          }

          async function fetchWithRetry(path, options = {}) {
            let lastError = null;
            for (let attempt = 1; attempt <= 8; attempt += 1) {
              try {
                const response = await fetch(`${origin}${path}`, options);
                const contentType = response.headers.get("content-type") || "";
                const body = contentType.includes("application/json") ? await response.json() : await response.text();
                if (!response.ok) throw new Error(`${options.method || "GET"}:${path}:${response.status}:${typeof body === "string" ? body : body.error || JSON.stringify(body)}`);
                return { response, body };
              } catch (error) {
                lastError = error;
                await sleep(1000);
              }
            }
            throw lastError;
          }

          const login = await fetchWithRetry("/api/auth/operator-login", {
            method: "POST",
            headers: { "x-opl-operator-token": operatorToken }
          });
          const sessionHeader = cookieHeaderFromSetCookie(login.response.headers.get("set-cookie") || "");
          const state = await fetchWithRetry("/api/management/state", {
            headers: { cookie: sessionHeader }
          });
          const payload = state.body || {};
          const compute = (payload.computeAllocations || []).find((item) => item.id === computeAllocationId && item.accountId === accountId) || null;
          const runtimeOperations = compute ? (payload.runtimeOperations || []).filter((operation) =>
            operation.accountId === accountId && (
              operation.resourceId === computeAllocationId ||
              operation.computeAllocationId === computeAllocationId ||
              operation.id === compute.operationId ||
              operation.id === compute.lastOperationId
            )
          ) : [];
          const billingLedger = compute ? (payload.billingLedger || []).filter((entry) =>
            entry.accountId === accountId && (
              entry.type === "compute_hold" && entry.resourceId === computeAllocationId ||
              entry.type === "compute_hold_released" && entry.id === compute.ledgerEntryId
            )
          ) : [];
          const ledgerEntryIds = new Set(billingLedger.map((entry) => entry.id));
          const walletTransactions = compute ? (payload.walletTransactions || []).filter((transaction) =>
            transaction.accountId === accountId && ledgerEntryIds.has(transaction.ledgerEntryId)
          ) : [];
          const summary = {
            accountId,
            computeAllocationId,
            compute: compute ? {
              id: compute.id,
              status: compute.status,
              error: compute.error || "",
              safeMessage: compute.safeMessage || "",
              billingStatus: compute.billingStatus,
              holdId: compute.holdId,
              holdReleaseId: compute.holdReleaseId,
              holdAmountCents: compute.holdAmountCents,
              ledgerEntryId: compute.ledgerEntryId,
              walletTransactionId: compute.walletTransactionId,
              provisioningStage: compute.provisioningStage,
              providerResourceId: compute.providerResourceId,
              providerRequestId: compute.providerRequestId,
              nodePoolId: compute.nodePoolId,
              cvmInstanceId: compute.cvmInstanceId || compute.instanceId || "",
              machineName: compute.machineName || compute.providerData?.machineName || "",
              nodeName: compute.nodeName || compute.providerData?.nodeName || "",
              privateIp: compute.privateIp || compute.providerData?.privateIp || "",
              publicIp: compute.publicIp || compute.providerData?.publicIp || "",
              lastProviderSyncAt: compute.lastProviderSyncAt,
              createdAt: compute.createdAt,
              updatedAt: compute.updatedAt,
              providerData: {
                instanceIdentitySource: compute.providerData?.instanceIdentitySource || "",
                tkeClusterInstanceId: compute.providerData?.tkeClusterInstanceId || "",
                machineName: compute.providerData?.machineName || "",
                nodeName: compute.providerData?.nodeName || "",
                privateIp: compute.providerData?.privateIp || "",
                instanceType: compute.providerData?.instanceType || "",
                scaleNodePoolRequestId: compute.providerData?.scaleNodePoolRequestId || "",
                describeMachinesReadyReqId: compute.providerData?.describeMachinesReadyReqId || "",
                describeCvmRequestId: compute.providerData?.describeCvmRequestId || "",
                deleteMethod: compute.providerData?.deleteMethod || "",
                clusterId: compute.providerData?.clusterId || "",
                region: compute.providerData?.region || ""
              }
            } : null,
            runtimeOperations: runtimeOperations.map((operation) => ({
              id: operation.id,
              resourceId: operation.resourceId,
              operationType: operation.operationType,
              status: operation.status,
              stage: operation.stage || operation.provisioningStage || "",
              error: operation.error || "",
              safeMessage: operation.safeMessage || "",
              providerRequestId: operation.providerRequestId || "",
              providerData: {
                deleteMethod: operation.providerData?.deleteMethod || "",
                machineName: operation.providerData?.machineName || "",
                nodeName: operation.providerData?.nodeName || "",
                nodePoolId: operation.providerData?.nodePoolId || "",
                instanceId: operation.providerData?.instanceId || "",
                clusterId: operation.providerData?.clusterId || "",
                region: operation.providerData?.region || ""
              },
              retryable: operation.retryable,
              createdAt: operation.createdAt,
              updatedAt: operation.updatedAt
            })),
            billingLedger: billingLedger.map((entry) => ({
              id: entry.id,
              type: entry.type,
              resourceId: entry.resourceId,
              amountCents: entry.amountCents,
              direction: entry.direction,
              createdAt: entry.createdAt
            })),
            walletTransactions: walletTransactions.map((transaction) => ({
              id: transaction.id,
              type: transaction.type,
              ledgerEntryId: transaction.ledgerEntryId,
              amountCents: transaction.amountCents,
              balanceCents: transaction.balanceCents,
              frozenCents: transaction.frozenCents,
              availableCents: transaction.availableCents,
              totalSpentCents: transaction.totalSpentCents,
              createdAt: transaction.createdAt
            }))
          };
          console.log(`CONSOLE_RESOURCE_STATE_SUMMARY=${JSON.stringify(summary)}`);
          NODE
          )"
          printf '%s\n' "$console_summary"
          release_identity="$(printf '%s\n' "$console_summary" | node -e '
            const fs = require("node:fs");
            const line = fs.readFileSync(0, "utf8").split("\n").find((item) => item.startsWith("CONSOLE_RESOURCE_STATE_SUMMARY="));
            const summary = line ? JSON.parse(line.slice("CONSOLE_RESOURCE_STATE_SUMMARY=".length)) : {};
            process.stdout.write(`${summary.compute?.holdReleaseId || ""}\t${summary.compute?.holdId || ""}`);
          ')"
          IFS=$'\t' read -r hold_release_id hold_id <<< "$release_identity"
          if [ -z "$hold_release_id" ] || [ -z "$hold_id" ]; then
            echo "ledger_hold_release=not_available"
            exit 0
          fi
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" exec -i deploy/opl-cloud-ledger -c ledger -- \
            env OPL_DIAG_ACCOUNT_ID="$OPL_DIAG_ACCOUNT_ID" \
                OPL_DIAG_COMPUTE_ALLOCATION_ID="$OPL_DIAG_COMPUTE_ALLOCATION_ID" \
                OPL_DIAG_HOLD_RELEASE_ID="$hold_release_id" \
                OPL_DIAG_HOLD_ID="$hold_id" node <<'NODE'
          const { Client } = require("pg");
          (async () => {
            const client = new Client({ connectionString: process.env.DATABASE_URL, ssl: false });
            await client.connect();
            try {
              const result = await client.query(
                `SELECT hr.id, hr.hold_id, hr.resource_id, hr.amount_cents, hr.status,
                        h.original_cents, h.remaining_cents, h.consumed_cents, h.released_cents, h.status AS hold_status,
                        release_tx.amount_cents AS release_transaction_amount_cents,
                        release_tx.balance_cents AS release_balance_cents,
                        release_tx.frozen_cents AS release_frozen_cents,
                        release_tx.available_cents AS release_available_cents,
                        release_tx.total_spent_cents AS release_total_spent_cents
                 FROM hold_releases hr
                 JOIN holds h ON h.id = hr.hold_id
                 JOIN wallet_transactions release_tx ON release_tx.id = hr.wallet_transaction_id
                 WHERE hr.id = $1 AND hr.hold_id = $2 AND hr.account_id = $3
                   AND hr.resource_type = 'compute' AND hr.resource_id = $4`,
                [process.env.OPL_DIAG_HOLD_RELEASE_ID, process.env.OPL_DIAG_HOLD_ID, process.env.OPL_DIAG_ACCOUNT_ID, process.env.OPL_DIAG_COMPUTE_ALLOCATION_ID]
              );
              const row = result.rows[0] || null;
              const cents = (value) => value == null ? null : Number(value);
              const summary = row ? {
                id: row.id,
                holdId: row.hold_id,
                resourceId: row.resource_id,
                status: row.status,
                holdStatus: row.hold_status,
                amountCents: cents(row.amount_cents),
                originalCents: cents(row.original_cents),
                remainingCents: cents(row.remaining_cents),
                consumedCents: cents(row.consumed_cents),
                releasedCents: cents(row.released_cents),
                releaseTransactionAmountCents: cents(row.release_transaction_amount_cents),
                releaseBalanceCents: cents(row.release_balance_cents),
                releaseFrozenCents: cents(row.release_frozen_cents),
                releaseTotalSpentCents: cents(row.release_total_spent_cents),
                invariants: {
