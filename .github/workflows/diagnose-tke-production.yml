name: Diagnose TKE Production

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    name: Diagnose OPL Cloud on TKE
    runs-on: [self-hosted, tencent-cloud, opl-cloud, tke-vpc]
    environment: production
    env:
      OPL_K8S_NAMESPACE: ${{ vars.OPL_K8S_NAMESPACE || 'opl-cloud' }}
      TENCENT_DEPLOY_KUBECONFIG_PATH: ${{ vars.TENCENT_DEPLOY_KUBECONFIG_PATH || '/home/actions/.secrets/medopl/v22/kubeconfig-package-d-deploy' }}
      TENCENT_DEPLOY_KUBECONFIG_B64: ${{ secrets.TENCENT_DEPLOY_KUBECONFIG_B64 }}
      TENCENT_DEPLOY_KUBECONFIG: ${{ secrets.TENCENT_DEPLOY_KUBECONFIG }}

    steps:
      - name: Prepare kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          secret_dir="$(mktemp -d)"
          chmod 700 "$secret_dir"
          kubeconfig="$secret_dir/kubeconfig"
          if [ -f "$TENCENT_DEPLOY_KUBECONFIG_PATH" ]; then
            cp "$TENCENT_DEPLOY_KUBECONFIG_PATH" "$kubeconfig"
          elif [ -n "${TENCENT_DEPLOY_KUBECONFIG_B64:-}" ]; then
            printf '%s' "$TENCENT_DEPLOY_KUBECONFIG_B64" | base64 -d > "$kubeconfig"
          elif [ -n "${TENCENT_DEPLOY_KUBECONFIG:-}" ]; then
            printf '%s' "$TENCENT_DEPLOY_KUBECONFIG" > "$kubeconfig"
          else
            echo "No deploy kubeconfig was provided." >&2
            exit 1
          fi
          chmod 600 "$kubeconfig"
          echo "KUBECONFIG=$kubeconfig" >> "$GITHUB_ENV"

      - name: Show workload status
        shell: bash
        run: |
          set -euo pipefail
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get deploy,rs,pod,svc,ingress -o wide

      - name: Show cluster node capacity
        shell: bash
        run: |
          set -euo pipefail
          kubectl --kubeconfig "$KUBECONFIG" get nodes -o wide
          kubectl --kubeconfig "$KUBECONFIG" get nodes -o json \
            | node -e '
                const fs = require("node:fs");
                const payload = JSON.parse(fs.readFileSync(0, "utf8"));
                console.log("NODE READY CPU_ALLOCATABLE MEMORY_ALLOCATABLE PODS_ALLOCATABLE LABELS");
                for (const item of payload.items || []) {
                  const conditions = item.status?.conditions || [];
                  const ready = conditions.find((condition) => condition.type === "Ready")?.status || "unknown";
                  const allocatable = item.status?.allocatable || {};
                  const labels = item.metadata?.labels || {};
                  const compactLabels = Object.entries(labels)
                    .filter(([key]) => /nodepool|workload|instance|zone|kubernetes\.io\/hostname/.test(key))
                    .map(([key, value]) => `${key}=${value}`)
                    .join(",");
                  console.log(`${item.metadata.name} ${ready} cpu.allocatable=${allocatable.cpu || "-"} memory.allocatable=${allocatable.memory || "-"} pods.allocatable=${allocatable.pods || "-"} ${compactLabels || "-"}`);
                }
              '

      - name: Show namespace resource requests
        shell: bash
        run: |
          set -euo pipefail
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get pod -o json \
            | node -e '
                const fs = require("node:fs");
                const payload = JSON.parse(fs.readFileSync(0, "utf8"));
                console.log("POD PHASE NODE CPU_REQUEST MEMORY_REQUEST IMAGES");
                for (const item of payload.items || []) {
                  const containers = item.spec?.containers || [];
                  const cpu = containers.map((container) => container.resources?.requests?.cpu || "0").join("+");
                  const memory = containers.map((container) => container.resources?.requests?.memory || "0").join("+");
                  const images = containers.map((container) => container.image).join(",");
                  console.log(`${item.metadata.name} ${item.status?.phase || "-"} ${item.spec?.nodeName || "-"} cpu=${cpu} memory=${memory} images=${images}`);
                }
              '

      - name: Describe pending workspace pods
        shell: bash
        run: |
          set -euo pipefail
          pods="$(kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get pods -l app.kubernetes.io/name=opl-compute-allocation --field-selector=status.phase=Pending -o name)"
          if [ -z "$pods" ]; then
            echo "No pending workspace pods."
            exit 0
          fi
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get pods -l app.kubernetes.io/name=opl-compute-allocation --field-selector=status.phase=Pending -o wide
          for pod in $pods; do
            echo "=== STATUS:Pending $pod ==="
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" describe "$pod"
          done

      - name: Describe control plane deployment
        shell: bash
        run: |
          set -euo pipefail
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" describe deployment opl-cloud-control-plane

      - name: Describe ingress and service endpoints
        shell: bash
        run: |
          set -euo pipefail
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" describe ingress opl-cloud
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get ingress opl-cloud -o yaml
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get endpoints opl-cloud-control-plane -o wide

      - name: Show TLS secret inventory
        shell: bash
        run: |
          set -euo pipefail
          kubectl --kubeconfig "$KUBECONFIG" get secrets -A -o json \
            | node -e '
                const fs = require("node:fs");
                const payload = JSON.parse(fs.readFileSync(0, "utf8"));
                console.log("NAMESPACE NAME TYPE HAS_QCLOUD_CERT_ID");
                for (const item of payload.items || []) {
                  const hasQcloudCertId = Boolean(item.data?.qcloud_cert_id);
                  if (item.type !== "Opaque" && !hasQcloudCertId) continue;
                  console.log(`${item.metadata.namespace} ${item.metadata.name} ${item.type} ${hasQcloudCertId}`);
                }
              '

      - name: Show ingress TLS usage
        shell: bash
        run: |
          set -euo pipefail
          kubectl --kubeconfig "$KUBECONFIG" get ingress -A -o json \
            | node -e '
                const fs = require("node:fs");
                const payload = JSON.parse(fs.readFileSync(0, "utf8"));
                console.log("NAMESPACE NAME READY ADDRESS HOSTS TLS_SECRETS");
                for (const item of payload.items || []) {
                  const annotations = item.metadata?.annotations || {};
                  let ready = "unknown";
                  try {
                    const conditions = JSON.parse(annotations["ingress.cloud.tencent.com/status.conditions"] || "[]");
                    ready = conditions.find((condition) => condition.type === "Ready")?.status || ready;
                  } catch {}
                  const address = (item.status?.loadBalancer?.ingress || [])
                    .map((entry) => entry.hostname || entry.ip)
                    .filter(Boolean)
                    .join(",");
                  const hosts = (item.spec?.rules || []).map((rule) => rule.host).filter(Boolean).join(",");
                  const tlsSecrets = (item.spec?.tls || []).map((tls) => tls.secretName).filter(Boolean).join(",");
                  console.log(`${item.metadata.namespace} ${item.metadata.name} ${ready} ${address || "-"} ${hosts || "-"} ${tlsSecrets || "-"}`);
                }
              '

      - name: Check external HTTP and HTTPS entrypoints
        shell: bash
        run: |
          set -euo pipefail
          for url in \
            http://cloud.medopl.cn/api/state \
            https://cloud.medopl.cn/api/state \
            http://workspace.medopl.cn/ \
            https://workspace.medopl.cn/
          do
            printf '%s ' "$url"
            curl -k --connect-timeout 8 -sS -o /tmp/opl-cloud-external-check \
              -w 'code=%{http_code} remote=%{remote_ip} time=%{time_total}\n' "$url" || true
            rm -f /tmp/opl-cloud-external-check
          done

      - name: Describe control plane pods
        shell: bash
        run: |
          set -euo pipefail
          pods="$(kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get pods -l app.kubernetes.io/name=opl-cloud -o name)"
          if [ -z "$pods" ]; then
            echo "No OPL Cloud pods found."
            exit 0
          fi
          for pod in $pods; do
            echo "=== $pod ==="
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" describe "$pod"
          done

      - name: Show recent namespace events
        shell: bash
        run: |
          set -euo pipefail
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get events --sort-by=.lastTimestamp

      - name: Show control plane logs
        shell: bash
        run: |
          set -euo pipefail
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" logs deploy/opl-cloud-control-plane --all-containers=true --tail=200 || true

      - name: Show previous control plane crash logs
        shell: bash
        run: |
          set -euo pipefail
          pods="$(kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get pods -l app.kubernetes.io/name=opl-cloud -o name)"
          if [ -z "$pods" ]; then
            echo "No OPL Cloud pods found."
            exit 0
          fi
          for pod in $pods; do
            echo "=== previous logs: $pod ==="
            kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" logs "$pod" --all-containers=true --previous --tail=300 || true
          done

      - name: Show control plane container status
        shell: bash
        run: |
          set -euo pipefail
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" get pods -l app.kubernetes.io/name=opl-cloud -o json \
            | node -e '
                const fs = require("node:fs");
                const payload = JSON.parse(fs.readFileSync(0, "utf8"));
                for (const pod of payload.items || []) {
                  console.log(JSON.stringify({
                    pod: pod.metadata?.name,
                    phase: pod.status?.phase,
                    podIP: pod.status?.podIP,
                    conditions: (pod.status?.conditions || []).map(({ type, status, reason }) => ({ type, status, reason })),
                    containers: (pod.status?.containerStatuses || []).map((container) => ({
                      name: container.name,
                      ready: container.ready,
                      restartCount: container.restartCount,
                      state: container.state,
                      lastState: container.lastState
                    }))
                  }, null, 2));
                }
              '

      - name: Check control plane API through port-forward
        shell: bash
        run: |
          set -euo pipefail
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" port-forward service/opl-cloud-control-plane 18787:8787 > /tmp/opl-cloud-port-forward.log 2>&1 &
          port_forward_pid="$!"
          trap 'kill "$port_forward_pid" 2>/dev/null || true' EXIT
          state_code="000"
          for attempt in 1 2 3 4 5; do
            state_code="$(curl -sS -o /tmp/opl-cloud-state.json -w '%{http_code}' http://127.0.0.1:18787/api/state || true)"
            if [ "$state_code" != "000" ]; then
              break
            fi
            sleep 2
          done
          printf 'state_code=%s\n' "$state_code"
          printf 'readiness='
          readiness_payload="$(curl -fsS http://127.0.0.1:18787/api/production/readiness || true)"
          if [ -z "$readiness_payload" ]; then
            printf '{"ready":false,"failedChecks":["port_forward_unavailable"]}'
          else
            printf '%s' "$readiness_payload" | node -e '
                const fs = require("node:fs");
                const payload = JSON.parse(fs.readFileSync(0, "utf8"));
                process.stdout.write(JSON.stringify({
                  ready: payload.ready === true,
                  failedChecks: payload.failedChecks || []
                }));
              '
          fi
          printf '\n'
