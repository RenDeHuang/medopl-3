name: Verify Production Resource Faults

on:
  workflow_dispatch:
    inputs:
      account_id:
        description: Production owner account for the five isolated drills.
        required: true
        type: string
      confirm_resource_faults:
        description: Type RUN_RESOURCE_SCOPED_FAULTS to confirm paid production mutations.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: production-resource-verification
  cancel-in-progress: false

jobs:
  faults:
    name: Verify five resource-scoped production faults
    runs-on: [self-hosted, tencent-cloud, opl-cloud, tke-vpc]
    environment: production
    timeout-minutes: 150
    env:
      OPL_CONSOLE_ORIGIN: "https://cloud.medopl.cn"
      OPL_VERIFY_ACCOUNT_ID: ${{ inputs.account_id }}
      OPL_VERIFY_AUTH_USERS_JSON: ${{ secrets.OPL_CONSOLE_USERS_JSON }}
      OPL_VERIFY_OPERATOR_TOKEN: ${{ secrets.OPL_OPERATOR_SUMMARY_TOKEN }}
      OPL_K8S_NAMESPACE: ${{ vars.OPL_K8S_NAMESPACE || 'opl-cloud' }}
      OPL_EXECUTION_LEDGER_ORIGIN: "http://127.0.0.1:18081"
      OPL_EXECUTION_FABRIC_ORIGIN: "http://127.0.0.1:18082"
      OPL_FAULT_ARTIFACT_DIR: artifacts/production-faults
      TENCENTCLOUD_SECRET_ID: ${{ secrets.TENCENT_MUTATION_SECRET_ID }}
      TENCENTCLOUD_SECRET_KEY: ${{ secrets.TENCENT_MUTATION_SECRET_KEY }}
      TENCENTCLOUD_REGION: ${{ vars.TENCENTCLOUD_REGION || vars.TENCENT_TCR_REGION || 'na-siliconvalley' }}
      TENCENT_DEPLOY_KUBECONFIG_PATH: ${{ vars.TENCENT_DEPLOY_KUBECONFIG_PATH || '/home/actions/.secrets/medopl/v22/kubeconfig-package-d-deploy' }}
      TENCENT_DEPLOY_KUBECONFIG_B64: ${{ secrets.TENCENT_DEPLOY_KUBECONFIG_B64 }}
      TENCENT_DEPLOY_KUBECONFIG: ${{ secrets.TENCENT_DEPLOY_KUBECONFIG }}
      RUN_TENCENT_CREATE_RELEASE_EXECUTION: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Confirm resource-scoped production faults
        shell: bash
        env:
          CONFIRM_RESOURCE_FAULTS: ${{ inputs.confirm_resource_faults }}
        run: |
          set -euo pipefail
          test "$CONFIRM_RESOURCE_FAULTS" = "RUN_RESOURCE_SCOPED_FAULTS"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Install verifier dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npx playwright install chromium

      - name: Prepare kubeconfig and internal credentials
        shell: bash
        run: |
          set -euo pipefail
          secret_dir="$(mktemp -d)"
          echo "OPL_FAULT_SECRET_DIR=$secret_dir" >> "$GITHUB_ENV"
          chmod 700 "$secret_dir"
          kubeconfig="$secret_dir/kubeconfig"
          if [ -f "$TENCENT_DEPLOY_KUBECONFIG_PATH" ]; then
            cp "$TENCENT_DEPLOY_KUBECONFIG_PATH" "$kubeconfig"
          elif [ -n "${TENCENT_DEPLOY_KUBECONFIG_B64:-}" ]; then
            printf '%s' "$TENCENT_DEPLOY_KUBECONFIG_B64" | base64 -d > "$kubeconfig"
          elif [ -n "${TENCENT_DEPLOY_KUBECONFIG:-}" ]; then
            printf '%s' "$TENCENT_DEPLOY_KUBECONFIG" > "$kubeconfig"
          else
            exit 1
          fi
          chmod 600 "$kubeconfig"
          token_file="$secret_dir/internal-service-token"
          kubectl --kubeconfig "$kubeconfig" -n "$OPL_K8S_NAMESPACE" get secret opl-cloud-internal-service -o jsonpath='{.data.OPL_INTERNAL_SERVICE_TOKEN}' | base64 -d > "$token_file"
          chmod 600 "$token_file"
          cluster_id="$(kubectl --kubeconfig "$kubeconfig" -n "$OPL_K8S_NAMESPACE" get configmap opl-cloud-config -o jsonpath='{.data.TENCENT_DEPLOY_CLUSTER_ID}')"
          printf '%s' "$cluster_id" | grep -Eq '^cls-[A-Za-z0-9_-]+$'
          mkdir -p "$OPL_FAULT_ARTIFACT_DIR"
          echo "KUBECONFIG=$kubeconfig" >> "$GITHUB_ENV"
          echo "OPL_FAULT_INTERNAL_TOKEN_FILE=$token_file" >> "$GITHUB_ENV"
          echo "TENCENT_DEPLOY_CLUSTER_ID=$cluster_id" >> "$GITHUB_ENV"

      - name: Build provisioner and forward internal services
        shell: bash
        run: |
          set -euo pipefail
          provisioner="$RUNNER_TEMP/opl-tencent-provisioner"
          (cd services/fabric && go build -o "$provisioner" ./cmd/opl-tencent-provisioner)
          chmod 700 "$provisioner"
          echo "OPL_TENCENT_PROVISIONER_BIN=$provisioner" >> "$GITHUB_ENV"
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" port-forward service/opl-cloud-ledger 18081:8081 > "$RUNNER_TEMP/opl-fault-ledger.log" 2>&1 &
          echo $! >> "$OPL_FAULT_SECRET_DIR/port-forward-pids"
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" port-forward service/opl-cloud-fabric 18082:8082 > "$RUNNER_TEMP/opl-fault-fabric.log" 2>&1 &
          echo $! >> "$OPL_FAULT_SECRET_DIR/port-forward-pids"
          for url in "$OPL_EXECUTION_LEDGER_ORIGIN/healthz" "$OPL_EXECUTION_FABRIC_ORIGIN/healthz"; do
            ready=false
            for attempt in $(seq 1 30); do
              if curl -fsS "$url" >/dev/null; then ready=true; break; fi
              sleep 1
            done
            test "$ready" = true
          done

      - name: Run five serial resource-scoped drills
        id: drills
        shell: bash
        run: |
          set -euo pipefail
          export OPL_EXECUTION_INTERNAL_SERVICE_TOKEN="$(cat "$OPL_FAULT_INTERNAL_TOKEN_FILE")"
          scenarios=(
            lost-response-replay
            workspace-pod-recovery
            storage-detach-reattach
            machine-external-delete
            browser-failure-cleanup
          )
          failed=0
          slot=0
          for scenario in "${scenarios[@]}"; do
            slot=$((slot + 1))
            slot_id="$(printf '%02d' "$slot")"
            run_id="fault-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${slot_id}"
            manifest="$OPL_FAULT_ARTIFACT_DIR/${slot_id}-${scenario}-manifest.json"
            ready="$OPL_FAULT_SECRET_DIR/${slot_id}.ready.json"
            release="$OPL_FAULT_SECRET_DIR/${slot_id}.release"
            result="$OPL_FAULT_ARTIFACT_DIR/${slot_id}-${scenario}-result.json"
            error="$OPL_FAULT_ARTIFACT_DIR/${slot_id}-${scenario}-error.json"
            if ! node tools/production-fault-verifier.ts \
              --scenario "$scenario" --origin "$OPL_CONSOLE_ORIGIN" --account "$OPL_VERIFY_ACCOUNT_ID" \
              --run-id "$run_id" --slot "$slot_id" --manifest-path "$manifest" \
              --ready-file "$ready" --release-file "$release" --timeout-ms 1200000 \
              > "$result" 2> "$error"; then
              failed=1
            fi
          done
          exit "$failed"

      - name: Verify exact final evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import { readdirSync, readFileSync } from "node:fs";
          const dir = process.env.OPL_FAULT_ARTIFACT_DIR;
          const results = readdirSync(dir).filter((name) => name.endsWith("-result.json"));
          if (results.length !== 5) throw new Error("production_fault_result_count_invalid");
          for (const name of results) {
            const payload = JSON.parse(readFileSync(`${dir}/${name}`, "utf8"));
            if (payload.ok !== true) throw new Error(`production_fault_final_evidence_invalid:${name}`);
          }
          NODE

      - name: Upload manifests and exact evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-faults-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/production-faults
          if-no-files-found: error

      - name: Remove temporary credentials and drill files
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "${OPL_FAULT_SECRET_DIR:-}/port-forward-pids" ]; then
            while read -r pid; do kill "$pid" 2>/dev/null || true; done < "$OPL_FAULT_SECRET_DIR/port-forward-pids"
          fi
          if [ -n "${OPL_FAULT_SECRET_DIR:-}" ] && [ -d "$OPL_FAULT_SECRET_DIR" ]; then
            find "$OPL_FAULT_SECRET_DIR" -type f -delete
            rmdir "$OPL_FAULT_SECRET_DIR"
          fi
          rm -f "${OPL_TENCENT_PROVISIONER_BIN:-}"
