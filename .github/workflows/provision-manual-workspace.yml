name: Provision Manual Workspace

on:
  workflow_dispatch:
    inputs:
      origin:
        description: Public OPL Console origin.
        required: true
        default: "https://cloud.medopl.cn"
        type: string
      account_id:
        description: Account id that owns the compute, storage, attachment, and workspace URL.
        required: false
        default: "pi-manual-workspace"
        type: string
      package_id:
        description: Compute/storage package.
        required: false
        default: "basic"
        type: choice
        options:
          - "basic"
          - "pro"
      credit_amount:
        description: Optional top-up amount before provisioning. Set 0 to skip.
        required: false
        default: "1000"
        type: string
      run_id:
        description: Optional run id used in resource names.
        required: false
        type: string
      url_attempts:
        description: Workspace runtime readiness attempts.
        required: false
        default: "36"
        type: string
      retry_delay_ms:
        description: Delay between readiness attempts.
        required: false
        default: "10000"
        type: string

permissions:
  contents: read

jobs:
  provision:
    name: Provision compute, storage, attachment, and workspace URL
    runs-on: ubuntu-latest
    environment: production
    env:
      OPL_CONSOLE_ORIGIN: ${{ inputs.origin }}
      OPL_VERIFY_OPERATOR_TOKEN: ${{ secrets.OPL_OPERATOR_SUMMARY_TOKEN }}
      OPL_MANUAL_ACCOUNT_ID: ${{ inputs.account_id }}
      OPL_MANUAL_PACKAGE_ID: ${{ inputs.package_id }}
      OPL_MANUAL_CREDIT_AMOUNT: ${{ inputs.credit_amount }}
      OPL_MANUAL_RUN_ID: ${{ inputs.run_id }}
      OPL_MANUAL_URL_ATTEMPTS: ${{ inputs.url_attempts }}
      OPL_MANUAL_RETRY_DELAY_MS: ${{ inputs.retry_delay_ms }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Provision manual workspace
        run: node tools/provision-manual-workspace.js
