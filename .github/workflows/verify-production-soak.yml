name: Verify Production Five-Machine Soak

on:
  workflow_dispatch:
    inputs:
      origin:
        description: Public OPL Console origin.
        required: true
        default: "https://cloud.medopl.cn"
        type: string
      account_id:
        description: Account used for all five paid Basic slots.
        required: true
        type: string
      confirm_paid_soak:
        description: Type RUN_5_TENCENT_CVMS to confirm the paid production soak.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: production-resource-verification
  cancel-in-progress: false

jobs:
  soak:
    name: Verify five concurrent production machines
    runs-on: [self-hosted, tencent-cloud, opl-cloud, tke-vpc]
    environment: production
    timeout-minutes: 60
    env:
      OPL_CONSOLE_ORIGIN: ${{ inputs.origin }}
      OPL_VERIFY_ACCOUNT_ID: ${{ inputs.account_id }}
      OPL_VERIFY_AUTH_USERS_JSON: ${{ secrets.OPL_CONSOLE_USERS_JSON }}
      OPL_VERIFY_OPERATOR_TOKEN: ${{ secrets.OPL_OPERATOR_SUMMARY_TOKEN }}
      OPL_SOAK_RUN_ID: soak-${{ github.run_id }}-${{ github.run_attempt }}
      OPL_SOAK_ARTIFACT_DIR: artifacts/production-soak
      OPL_K8S_NAMESPACE: ${{ vars.OPL_K8S_NAMESPACE || 'opl-cloud' }}
      TENCENTCLOUD_SECRET_ID: ${{ secrets.TENCENT_MUTATION_SECRET_ID }}
      TENCENTCLOUD_SECRET_KEY: ${{ secrets.TENCENT_MUTATION_SECRET_KEY }}
      TENCENTCLOUD_REGION: ${{ vars.TENCENTCLOUD_REGION || vars.TENCENT_TCR_REGION || 'na-siliconvalley' }}
      TENCENT_DEPLOY_KUBECONFIG_PATH: ${{ vars.TENCENT_DEPLOY_KUBECONFIG_PATH || '/home/actions/.secrets/medopl/v22/kubeconfig-package-d-deploy' }}
      TENCENT_DEPLOY_KUBECONFIG_B64: ${{ secrets.TENCENT_DEPLOY_KUBECONFIG_B64 }}
      TENCENT_DEPLOY_KUBECONFIG: ${{ secrets.TENCENT_DEPLOY_KUBECONFIG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Confirm paid five-machine soak
        shell: bash
        env:
          CONFIRM_PAID_SOAK: ${{ inputs.confirm_paid_soak }}
        run: |
          set -euo pipefail
          if [ "$CONFIRM_PAID_SOAK" != "RUN_5_TENCENT_CVMS" ]; then
            echo "confirm_paid_soak must equal RUN_5_TENCENT_CVMS" >&2
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Prepare kubeconfig and evidence directory
        shell: bash
        run: |
          set -euo pipefail
          secret_dir="$(mktemp -d)"
          chmod 700 "$secret_dir"
          kubeconfig="$secret_dir/kubeconfig"
          if [ -f "$TENCENT_DEPLOY_KUBECONFIG_PATH" ]; then
            cp "$TENCENT_DEPLOY_KUBECONFIG_PATH" "$kubeconfig"
          elif [ -n "${TENCENT_DEPLOY_KUBECONFIG_B64:-}" ]; then
            printf '%s' "$TENCENT_DEPLOY_KUBECONFIG_B64" | base64 -d > "$kubeconfig"
          elif [ -n "${TENCENT_DEPLOY_KUBECONFIG:-}" ]; then
            printf '%s' "$TENCENT_DEPLOY_KUBECONFIG" > "$kubeconfig"
          else
            echo "No deploy kubeconfig was provided." >&2
            exit 1
          fi
          chmod 600 "$kubeconfig"
          mkdir -p "$OPL_SOAK_ARTIFACT_DIR"
          echo "KUBECONFIG=$kubeconfig" >> "$GITHUB_ENV"
          echo "OPL_SOAK_SECRET_DIR=$secret_dir" >> "$GITHUB_ENV"
          cluster_id="$(kubectl --kubeconfig "$kubeconfig" -n "$OPL_K8S_NAMESPACE" get configmap opl-cloud-config -o jsonpath='{.data.TENCENT_DEPLOY_CLUSTER_ID}')"
          instance_type="$(kubectl --kubeconfig "$kubeconfig" -n "$OPL_K8S_NAMESPACE" get configmap opl-cloud-config -o jsonpath='{.data.OPL_BASIC_COMPUTE_INSTANCE_TYPE}')"
          node_pool_id="$(kubectl --kubeconfig "$kubeconfig" -n "$OPL_K8S_NAMESPACE" get configmap opl-cloud-config -o jsonpath='{.data.OPL_BASIC_COMPUTE_NODE_POOL_ID}')"
          if ! printf '%s' "$cluster_id" | grep -Eq '^cls-[A-Za-z0-9_-]+$'; then
            echo "Production ConfigMap has no valid Tencent cluster id." >&2
            exit 1
          fi
          if ! printf '%s' "$instance_type" | grep -Eq '^[A-Z0-9.]+$'; then
            echo "Production ConfigMap has no valid Basic instance type." >&2
            exit 1
          fi
          if [ -n "$node_pool_id" ] && ! printf '%s' "$node_pool_id" | grep -Eq '^np-[A-Za-z0-9_-]+$'; then
            echo "Production ConfigMap has an invalid Basic node pool id." >&2
            exit 1
          fi
          echo "TENCENT_DEPLOY_CLUSTER_ID=$cluster_id" >> "$GITHUB_ENV"
          echo "OPL_BASIC_COMPUTE_INSTANCE_TYPE=$instance_type" >> "$GITHUB_ENV"
          echo "OPL_BASIC_COMPUTE_NODE_POOL_ID=$node_pool_id" >> "$GITHUB_ENV"

      - name: Verify Tencent and TKE capacity
        shell: bash
        run: |
          set -euo pipefail
          for key in TENCENTCLOUD_SECRET_ID TENCENTCLOUD_SECRET_KEY TENCENTCLOUD_REGION TENCENT_DEPLOY_CLUSTER_ID OPL_BASIC_COMPUTE_INSTANCE_TYPE; do
            if [ -z "${!key:-}" ]; then
              echo "$key is required for fail-closed capacity evidence." >&2
              exit 1
            fi
          done
          capacity_bin="$RUNNER_TEMP/opl-tencent-capacity-preflight"
          (cd services/fabric && go build -o "$capacity_bin" ./cmd/opl-tencent-provisioner)
          CAPACITY_BIN="$capacity_bin" node --input-type=module <<'NODE'
          import { spawnSync } from "node:child_process";
          import { writeFileSync } from "node:fs";

          const requiredCapacity = 5;
          const request = {
            action: "capacity_preflight",
            packageId: "basic",
            pool: {
              id: "basic",
              instanceType: process.env.OPL_BASIC_COMPUTE_INSTANCE_TYPE,
              nodePoolId: process.env.OPL_BASIC_COMPUTE_NODE_POOL_ID,
              desiredReplicas: requiredCapacity
            }
          };
          const result = spawnSync(process.env.CAPACITY_BIN, [], { input: JSON.stringify(request), encoding: "utf8", env: process.env });
          let capacity;
          try {
            capacity = JSON.parse(result.stdout || "{}");
          } catch {
            throw new Error("capacity_preflight_invalid_json");
          }
          if (
            result.status !== 0 || capacity.ok !== true || capacity.status !== "ready" ||
            capacity.instanceAvailable !== true || capacity.requiredCapacity !== requiredCapacity ||
            capacity.machineType !== "NativeCVM" ||
            !Number.isSafeInteger(capacity.remainingQuota) || capacity.remainingQuota < requiredCapacity ||
            !Number.isSafeInteger(capacity.currentReplicas) || capacity.readyReplicas !== capacity.currentReplicas ||
            capacity.targetReplicas !== capacity.currentReplicas + requiredCapacity ||
            !Number.isSafeInteger(capacity.maxReplicas) || capacity.currentReplicas + requiredCapacity > capacity.maxReplicas ||
            !Array.isArray(capacity.zones) || capacity.zones.length === 0 || !capacity.nodePoolId
          ) throw new Error(`capacity_preflight_failed:${capacity.errorCode || "unknown"}`);
          writeFileSync(`${process.env.OPL_SOAK_ARTIFACT_DIR}/capacity.json`, `${JSON.stringify(capacity, null, 2)}\n`, { mode: 0o600 });
          NODE

      - name: Verify production API readiness
        shell: bash
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import { writeFileSync } from "node:fs";
          const origin = process.env.OPL_CONSOLE_ORIGIN.replace(/\/$/, "");
          const evidence = {};
          for (const path of ["/api/production/readiness", "/api/runtime/readiness"]) {
            const response = await fetch(`${origin}${path}`);
            const payload = await response.json();
            if (!response.ok || payload.ready !== true) throw new Error(`production_readiness_failed:${path}`);
            evidence[path] = { ready: true, failedChecks: payload.failedChecks || [], missingEnv: payload.missingEnv || [] };
          }
          writeFileSync(`${process.env.OPL_SOAK_ARTIFACT_DIR}/readiness.json`, `${JSON.stringify(evidence, null, 2)}\n`, { mode: 0o600 });
          NODE

      - name: Run five-machine production soak
        id: soak
        shell: bash
        run: |
          set -euo pipefail
          node tools/production-soak-coordinator.ts

      - name: Verify control-plane terminal evidence
        if: always() && steps.soak.outcome != 'skipped'
        shell: bash
        run: |
          set -euo pipefail
          node tools/production-soak-coordinator.ts --verify-residuals --artifact-dir "$OPL_SOAK_ARTIFACT_DIR"

      - name: Upload soak manifests, results, and evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-soak-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/production-soak
          if-no-files-found: warn

      - name: Remove temporary credentials
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${OPL_SOAK_SECRET_DIR:-}" ]; then
            rm -f "$OPL_SOAK_SECRET_DIR/kubeconfig"
            rmdir "$OPL_SOAK_SECRET_DIR" 2>/dev/null || true
          fi
