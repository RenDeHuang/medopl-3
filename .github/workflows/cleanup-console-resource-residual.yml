name: Cleanup Console Resource Residual

on:
  workflow_dispatch:
    inputs:
      account_id:
        description: Account id that owns the resource.
        required: true
        default: pi-production-verifier
        type: string
      compute_allocation_id:
        description: Optional ComputeAllocation id to destroy through Console API.
        required: false
        default: ""
        type: string
      storage_id:
        description: Optional StorageVolume id to destroy through Console API.
        required: false
        default: ""
        type: string
      legacy_compute_allocation_id:
        description: Optional legacy ComputeAllocation id to stop in Console after exact cloud cleanup is confirmed.
        required: false
        default: ""
        type: string
      cloud_cleanup_confirmed:
        description: Required as true for legacy_compute_allocation_id live cleanup after TKE machine cleanup has succeeded.
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      dry_run:
        description: Inspect only unless set to false.
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      confirm_resource_id:
        description: For dry_run=false, must equal the single target resource id.
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  cleanup:
    name: Cleanup one Console resource residual
    runs-on: [self-hosted, tencent-cloud, opl-cloud, tke-vpc]
    environment: production
    env:
      OPL_K8S_NAMESPACE: ${{ vars.OPL_K8S_NAMESPACE || 'opl-cloud' }}
      TENCENT_DEPLOY_KUBECONFIG_PATH: ${{ vars.TENCENT_DEPLOY_KUBECONFIG_PATH || '/home/actions/.secrets/medopl/v22/kubeconfig-package-d-deploy' }}
      TENCENT_DEPLOY_KUBECONFIG_B64: ${{ secrets.TENCENT_DEPLOY_KUBECONFIG_B64 }}
      TENCENT_DEPLOY_KUBECONFIG: ${{ secrets.TENCENT_DEPLOY_KUBECONFIG }}
      OPL_OPERATOR_SUMMARY_TOKEN: ${{ secrets.OPL_OPERATOR_SUMMARY_TOKEN }}
      ACCOUNT_ID: ${{ inputs.account_id }}
      COMPUTE_ALLOCATION_ID: ${{ inputs.compute_allocation_id }}
      STORAGE_ID: ${{ inputs.storage_id }}
      LEGACY_COMPUTE_ALLOCATION_ID: ${{ inputs.legacy_compute_allocation_id }}
      CLOUD_CLEANUP_CONFIRMED: ${{ inputs.cloud_cleanup_confirmed }}
      DRY_RUN: ${{ inputs.dry_run }}
      CONFIRM_RESOURCE_ID: ${{ inputs.confirm_resource_id }}

    steps:
      - name: Prepare kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          secret_dir="$(mktemp -d)"
          chmod 700 "$secret_dir"
          kubeconfig="$secret_dir/kubeconfig"
          if [ -f "$TENCENT_DEPLOY_KUBECONFIG_PATH" ]; then
            cp "$TENCENT_DEPLOY_KUBECONFIG_PATH" "$kubeconfig"
          elif [ -n "${TENCENT_DEPLOY_KUBECONFIG_B64:-}" ]; then
            printf '%s' "$TENCENT_DEPLOY_KUBECONFIG_B64" | base64 -d > "$kubeconfig"
          elif [ -n "${TENCENT_DEPLOY_KUBECONFIG:-}" ]; then
            printf '%s' "$TENCENT_DEPLOY_KUBECONFIG" > "$kubeconfig"
          else
            echo "No deploy kubeconfig was provided." >&2
            exit 1
          fi
          chmod 600 "$kubeconfig"
          echo "KUBECONFIG=$kubeconfig" >> "$GITHUB_ENV"

      - name: Validate target
        shell: bash
        run: |
          set -euo pipefail
          targets=0
          if [ -n "$COMPUTE_ALLOCATION_ID" ]; then
            targets=$((targets + 1))
            if ! printf '%s' "$COMPUTE_ALLOCATION_ID" | grep -Eq '^compute-[a-z0-9-]+$'; then
              echo "compute_allocation_id must match ^compute-[a-z0-9-]+$" >&2
              exit 1
            fi
          fi
          if [ -n "$STORAGE_ID" ]; then
            targets=$((targets + 1))
            if ! printf '%s' "$STORAGE_ID" | grep -Eq '^storage-[a-z0-9-]+$'; then
              echo "storage_id must match ^storage-[a-z0-9-]+$" >&2
              exit 1
            fi
          fi
          if [ -n "$LEGACY_COMPUTE_ALLOCATION_ID" ]; then
            targets=$((targets + 1))
            if ! printf '%s' "$LEGACY_COMPUTE_ALLOCATION_ID" | grep -Eq '^compute-[a-z0-9-]+$'; then
              echo "legacy_compute_allocation_id must match ^compute-[a-z0-9-]+$" >&2
              exit 1
            fi
          fi
          if [ "$targets" -ne 1 ]; then
            echo "Provide exactly one target resource id." >&2
            exit 1
          fi
          if [ "$DRY_RUN" = "false" ]; then
            target="${COMPUTE_ALLOCATION_ID:-${STORAGE_ID:-$LEGACY_COMPUTE_ALLOCATION_ID}}"
            if [ "$CONFIRM_RESOURCE_ID" != "$target" ]; then
              echo "confirm_resource_id must equal the target resource id." >&2
              exit 1
            fi
            if [ -n "$LEGACY_COMPUTE_ALLOCATION_ID" ] && [ "$CLOUD_CLEANUP_CONFIRMED" != "true" ]; then
              echo "cloud_cleanup_confirmed must be true for legacy compute cleanup." >&2
              exit 1
            fi
          fi

      - name: Cleanup through Console API
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${OPL_OPERATOR_SUMMARY_TOKEN:-}" ]; then
            echo "operator token missing" >&2
            exit 1
          fi
          kubectl --kubeconfig "$KUBECONFIG" -n "$OPL_K8S_NAMESPACE" port-forward service/opl-cloud-control-plane 18789:8787 > /tmp/opl-cloud-console-cleanup-port-forward.log 2>&1 &
          port_forward_pid="$!"
          trap 'kill "$port_forward_pid" 2>/dev/null || true' EXIT
          node --input-type=module <<'NODE'
          const origin = "http://127.0.0.1:18789";
          const accountId = process.env.ACCOUNT_ID || "";
          const computeId = process.env.COMPUTE_ALLOCATION_ID || "";
          const storageId = process.env.STORAGE_ID || "";
          const legacyComputeId = process.env.LEGACY_COMPUTE_ALLOCATION_ID || "";
          const cloudCleanupConfirmed = process.env.CLOUD_CLEANUP_CONFIRMED === "true";
          const dryRun = process.env.DRY_RUN !== "false";
          const operatorToken = process.env.OPL_OPERATOR_SUMMARY_TOKEN || "";

          function sleep(ms) {
            return new Promise((resolve) => setTimeout(resolve, ms));
          }

          function cookieHeaderFromSetCookie(value = "") {
            return String(value)
              .split(/,(?=[^;,]+=)/)
              .map((entry) => entry.split(";")[0]?.trim())
              .filter(Boolean)
              .join("; ");
          }

          async function request(path, { method = "GET", body = null, session = null } = {}) {
            let lastError = null;
            for (let attempt = 1; attempt <= 10; attempt += 1) {
              try {
                const response = await fetch(`${origin}${path}`, {
                  method,
                  headers: {
                    ...(body ? { "content-type": "application/json" } : {}),
                    ...(session?.header ? { cookie: session.header } : {}),
                    ...(session?.csrf ? { "x-opl-csrf-token": session.csrf } : {})
                  },
                  body: body ? JSON.stringify(body) : undefined
                });
                const contentType = response.headers.get("content-type") || "";
                const payload = contentType.includes("application/json") ? await response.json() : await response.text();
                if (!response.ok) {
                  const message = typeof payload === "string" ? payload : payload.error || JSON.stringify(payload);
                  const error = new Error(`${method}:${path}:${response.status}:${message}`);
                  error.status = response.status;
                  error.payload = payload;
                  throw error;
                }
                return { response, payload };
              } catch (error) {
                if (error.status >= 400 && error.status < 500) throw error;
                lastError = error;
                await sleep(1000);
              }
            }
            throw lastError;
          }

          const login = await request("/api/auth/operator-login", {
            method: "POST",
            body: { operatorToken }
          });
          const session = {
            header: cookieHeaderFromSetCookie(login.response.headers.get("set-cookie") || ""),
            csrf: login.response.headers.get("x-opl-csrf-token") || login.payload?.csrfToken || ""
          };

          const before = await request(`/api/state?accountId=${encodeURIComponent(accountId)}`, { session });
          const summary = {
            dryRun,
            accountId,
            target: computeId || storageId || legacyComputeId,
            before: {
              compute: (computeId || legacyComputeId) ? (before.payload.computeAllocations || []).find((item) => item.id === (computeId || legacyComputeId)) || null : null,
              storage: storageId ? (before.payload.storageVolumes || []).find((item) => item.id === storageId) || null : null
            }
          };

          if (!dryRun && computeId) {
            await request(`/api/compute-allocations/${encodeURIComponent(computeId)}/destroy`, {
              method: "POST",
              session,
              body: { accountId, confirm: true }
            });
          }
          if (!dryRun && storageId) {
            await request("/api/storage-volumes/destroy", {
              method: "POST",
              session,
              body: { accountId, storageId, confirmDataLoss: true }
            });
          }
          if (!dryRun && legacyComputeId) {
            summary.legacyCleanup = (await request("/api/operator/cleanup-workspace-access", {
              method: "POST",
              session,
              body: {
                accountId,
                legacyComputeAllocationIds: [legacyComputeId],
                cloudCleanupConfirmed,
                reason: "legacy_compute_cloud_cleanup_confirmed"
              }
            })).payload;
          }

          const after = await request(`/api/state?accountId=${encodeURIComponent(accountId)}`, { session });
          summary.after = {
            compute: (computeId || legacyComputeId) ? (after.payload.computeAllocations || []).find((item) => item.id === (computeId || legacyComputeId)) || null : null,
            storage: storageId ? (after.payload.storageVolumes || []).find((item) => item.id === storageId) || null : null
          };
          console.log(`CONSOLE_RESOURCE_CLEANUP_SUMMARY=${JSON.stringify(summary)}`);
          NODE
