- name: Configure one OPL Workspace server
  hosts: all
  become: true
  vars:
    workspace_id: "{{ workspace_id }}"
    workspace_slug: "{{ workspace_slug }}"
    workspace_token: "{{ workspace_token }}"
    workspace_domain: "{{ workspace_domain }}"
    opl_image: "{{ opl_image | default('ghcr.io/gaofeng21cn/one-person-lab-webui:latest') }}"
  tasks:
    - name: Ensure Caddy is installed
      ansible.builtin.package:
        name:
          - caddy
        state: present

    - name: Ensure runtime directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /opt/opl-cloud
        - /data/opl
        - /data/opl/data
        - /data/opl/projects
        - /etc/caddy/conf.d

    - name: Write Caddy root config
      ansible.builtin.copy:
        dest: /etc/caddy/Caddyfile
        mode: "0644"
        content: |
          {
            admin localhost:2019
          }

          import /etc/caddy/conf.d/*.caddy

    - name: Find attached CBS data disk
      ansible.builtin.shell: |
        set -euo pipefail
        lsblk -ndo NAME,TYPE,MOUNTPOINT | awk '$2 == "disk" && $3 == "" && $1 != "vda" { print "/dev/" $1; exit }'
      args:
        executable: /bin/bash
      register: cbs_data_device
      changed_when: false
      failed_when: cbs_data_device.stdout == ""

    - name: Format CBS data disk when it has no filesystem
      ansible.builtin.filesystem:
        fstype: ext4
        dev: "{{ cbs_data_device.stdout }}"

    - name: Mount CBS data disk for OPL Workspace data
      ansible.builtin.mount:
        path: /data/opl
        src: "{{ cbs_data_device.stdout }}"
        fstype: ext4
        opts: defaults,nofail
        state: mounted

    - name: Write Docker Compose file
      ansible.builtin.copy:
        dest: /opt/opl-cloud/docker-compose.yml
        mode: "0644"
        content: |
          services:
            opl:
              image: {{ opl_image }}
              restart: unless-stopped
              environment:
                OPL_WORKSPACE_ID: "{{ workspace_id }}"
                OPL_WORKSPACE_NAME: "{{ workspace_slug }}"
                OPL_SHARE_TOKEN: "{{ workspace_token }}"
                DATA_DIR: /data
                AIONUI_DATA_DIR: /data
                OPL_PROJECTS_DIR: /projects
                ALLOW_REMOTE: "true"
                OPL_WEBUI_AUTH_MODE: none
                HOME: /data
                OPL_WORKSPACE_ROOT: /projects
                CODEX_HOME: /data/codex
              ports:
                - "127.0.0.1:3000:3000"
              volumes:
                - /data/opl/data:/data
                - /data/opl/projects:/projects

    - name: Start OPL Docker runtime
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: /opt/opl-cloud
      changed_when: true

    - name: Write Caddy workspace route
      ansible.builtin.template:
        src: Caddyfile.j2
        dest: /etc/caddy/conf.d/opl-workspace.caddy
        mode: "0644"

    - name: Enable and start Caddy
      ansible.builtin.command: systemctl enable --now caddy
      changed_when: true

    - name: Reload Caddy
      ansible.builtin.command: caddy reload --config /etc/caddy/Caddyfile
      changed_when: true
