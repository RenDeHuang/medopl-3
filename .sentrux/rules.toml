[constraints]
min_quality = 0.60
min_acyclicity = 1.00
max_cycles = 0
max_upward_violations = 0
no_god_files = true

[[layers]]
name = "truth_and_docs"
paths = [
  "docs/*",
  "docs/**/*",
  "packages/contracts/*",
  "packages/contracts/**/*",
  "deploy/*",
  "deploy/**/*",
  "PRODUCT_DESIGN.md",
  "README.md",
  "packages/README.md"
]
order = 6

[[layers]]
name = "frontend"
paths = ["apps/console-ui/*", "apps/console-ui/**/*", "index.html", "vite.config.js"]
order = 1

[[layers]]
name = "control_plane"
paths = ["services/control-plane/*", "services/control-plane/**/*"]
order = 3

[[layers]]
name = "fabric"
paths = ["services/fabric/*", "services/fabric/**/*", "packages/fabric/*", "packages/fabric/**/*"]
order = 4

[[layers]]
name = "ledger"
paths = ["services/ledger/*", "services/ledger/**/*", "packages/ledger/*", "packages/ledger/**/*"]
order = 4

[[layers]]
name = "ops_tools"
paths = ["tools/*", "tools/**/*", ".github/workflows/*", ".github/workflows/**/*"]
order = 2

[[layers]]
name = "verification"
paths = ["tests/*", "tests/**/*", "package.json"]
order = 0

[[boundaries]]
from = "services/control-plane/**/*"
to = "apps/console-ui/**/*"
reason = "Control Plane must not import Console UI implementation."

[[boundaries]]
from = "apps/console-ui/**/*"
to = "services/fabric/**/*"
reason = "Console UI must call API routes instead of importing runtime providers."

[[boundaries]]
from = "apps/console-ui/**/*"
to = "services/ledger/**/*"
reason = "Console UI must call Control Plane routes instead of importing Ledger internals."

[[boundaries]]
from = "services/fabric/**/*"
to = "apps/console-ui/**/*"
reason = "Runtime providers must not depend on UI code."

[[boundaries]]
from = "tools/**/*"
to = "apps/console-ui/**/*"
reason = "Operator tools verify deployed APIs and must not import Console UI implementation."
